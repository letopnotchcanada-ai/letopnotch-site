<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — Shop</title>
  <meta name="description" content="Discover the Le Top Notch collection." />
  <style>
    :root{
      --bg:#f7f4ef;
      --paper:#f5f1eb;
      --white:#ffffff;
      --text:#171717;
      --muted:#6e675f;
      --line:#e7e0d7;
      --max:1380px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:"Helvetica Neue", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    img{display:block;width:100%;height:auto}
    a{text-decoration:none;color:inherit}
    button{
      font:inherit;
      border:none;
      background:none;
      cursor:pointer;
      color:inherit;
    }

    .container{
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;
    }

    .announcement{
      min-height:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:4px 14px;
      background:#ebe4da;
      border-bottom:1px solid var(--line);
      font-size:9px;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:90;
      background:rgba(247,244,239,.97);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);
    }

    .header-inner{
      min-height:54px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:18px;
    }

    .brand{
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .main-nav{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.12em;
      white-space:nowrap;
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:14px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.12em;
      white-space:nowrap;
    }

    .nav-item{
      position:relative;
    }

    .nav-dropdown{
      display:flex;
      align-items:center;
    }

    .dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      min-width:190px;
      display:none;
      flex-direction:column;
      background:rgba(247,244,239,.99);
      border:1px solid var(--line);
      box-shadow:0 14px 34px rgba(0,0,0,.06);
      z-index:200;
      padding:8px 0;
    }

    .dropdown-menu a{
      display:block;
      padding:11px 16px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.12em;
      white-space:nowrap;
    }

    .dropdown-menu a:hover{
      background:#efe9e0;
    }

    .nav-dropdown:hover .dropdown-menu{
      display:flex;
    }

    .page{
      padding:18px 0 40px;
    }

    .breadcrumbs{
      padding:4px 0 18px;
      font-size:8px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
      display:flex;
      flex-wrap:wrap;
      gap:5px;
    }

    .page-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:20px;
      margin-bottom:24px;
    }

    .page-title{
      font-size:34px;
      line-height:.95;
      font-weight:500;
      letter-spacing:-.03em;
    }

    .results-count{
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
    }

    .filter-bar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:22px;
      padding-bottom:14px;
      border-bottom:1px solid var(--line);
    }

    .filter-btn{
      min-height:32px;
      padding:0 14px;
      border:1px solid var(--line);
      background:#fff;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    .filter-btn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .shop-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:22px 16px;
    }

    .product-card{
      display:block;
    }

    .product-image-wrap{
      background:#fff;
      border:1px solid rgba(0,0,0,.05);
      margin-bottom:10px;
      overflow:hidden;
    }

    .product-image{
      aspect-ratio:4 / 5;
      object-fit:cover;
      background:#fff;
    }

    .product-name{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.06em;
      line-height:1.35;
      margin-bottom:4px;
    }

    .product-price{
      font-size:10px;
      color:var(--muted);
    }

    .empty-state,
    .loading-state{
      padding:40px 0;
      font-size:12px;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .header-inner{
        grid-template-columns:1fr;
        justify-items:center;
        padding:12px 0;
        min-height:auto;
      }

      .main-nav,.header-actions{
        flex-wrap:wrap;
        justify-content:center;
      }

      .shop-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }

      .page-head{
        flex-direction:column;
        align-items:flex-start;
      }

      .dropdown-menu{
        left:50%;
        transform:translateX(-50%);
      }
    }

    @media (max-width: 640px){
      .shop-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="announcement">Complimentary shipping on orders over CA$250</div>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">LE TOP NOTCH</a>

      <nav class="main-nav" aria-label="Primary navigation">
        <div class="nav-item nav-dropdown">
          <a href="shop.html">Shop</a>
          <div class="dropdown-menu">
            <a href="shop.html?category=Tops">Tops</a>
            <a href="shop.html?category=Dresses">Dresses</a>
            <a href="shop.html?category=Jackets">Jackets</a>
            <a href="shop.html?category=Knitwear">Knitwear</a>
            <a href="shop.html?category=Trousers">Trousers</a>
            <a href="shop.html?category=Skirts">Skirts</a>
          </div>
        </div>

        <a href="shop.html">New In</a>
        <a href="shop.html">Best Sellers</a>
        <a href="index.html#editorial">Editorial</a>
        <a href="about.html">About</a>
      </nav>

      <div class="header-actions">
        <a href="shop.html">Search</a>
        <a href="cart.html" id="cartCountLink">Cart (0)</a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div class="breadcrumbs">
        <a href="index.html">Home</a>
        <span>/</span>
        <span id="breadcrumbLabel">Shop</span>
      </div>

      <div class="page-head">
        <h1 class="page-title" id="pageTitle">Shop</h1>
        <div class="results-count" id="resultsCount">Loading products</div>
      </div>

      <div class="filter-bar" id="filterBar"></div>

      <div class="loading-state" id="loadingState">Loading collection…</div>
      <div class="empty-state" id="emptyState" style="display:none;">No products found.</div>
      <div class="shop-grid" id="shopGrid"></div>
    </div>
  </main>

  <script>
    const API_URL = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
    const CART_KEY = "letopnotch_cart";

    let allProducts = [];
    let activeCategory = "All";

    function getCart() {
      try {
        const raw = localStorage.getItem(CART_KEY);
        const cart = raw ? JSON.parse(raw) : [];
        return Array.isArray(cart) ? cart : [];
      } catch (error) {
        return [];
      }
    }

    function updateCartCount() {
      const cart = getCart();
      const count = cart.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
      const link = document.getElementById("cartCountLink");
      if (link) link.textContent = `Cart (${count})`;
    }

    function formatPrice(value) {
      const num = Number(value);
      if (!Number.isFinite(num) || num <= 0) return "CAD —";
      return `CAD $${num.toFixed(2).replace(".00", "")}`;
    }

    function titleCase(value) {
      return String(value || "")
        .replace(/[-_]/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function normalizeCategory(value) {
      return String(value || "").trim();
    }

    function inferCategory(product) {
      const text = `${product.name || ""} ${product.slug || ""}`.toLowerCase();

      if (text.includes("dress")) return "Dresses";
      if (text.includes("jacket") || text.includes("coat") || text.includes("blazer")) return "Jackets";
      if (text.includes("pant") || text.includes("trouser")) return "Trousers";
      if (text.includes("skirt")) return "Skirts";
      if (text.includes("knit") || text.includes("sweater") || text.includes("cardigan")) return "Knitwear";
      if (text.includes("shirt") || text.includes("top") || text.includes("blouse")) return "Tops";

      return "Shop";
    }

    function normalizeProducts(data) {
      return (Array.isArray(data) ? data : [])
        .map(item => {
          const category = normalizeCategory(item.category) || inferCategory(item);

          return {
            slug: item.slug || "",
            name: titleCase(item.name || item.slug || "Product"),
            price: Number(item.price) || 0,
            image: item.image || "",
            category
          };
        })
        .filter(item => item.slug && item.image && item.name);
    }

    function readInitialCategory() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("category");
      return raw ? decodeURIComponent(raw).trim() : "All";
    }

    function getVisibleProducts() {
      if (activeCategory === "All") return allProducts;
      return allProducts.filter(product => product.category === activeCategory);
    }

    function updatePageLabels() {
      const pageTitle = document.getElementById("pageTitle");
      const breadcrumbLabel = document.getElementById("breadcrumbLabel");

      if (activeCategory === "All") {
        pageTitle.textContent = "Shop";
        breadcrumbLabel.textContent = "Shop";
      } else {
        pageTitle.textContent = activeCategory;
        breadcrumbLabel.textContent = activeCategory;
      }
    }

    function renderFilters() {
      const filterBar = document.getElementById("filterBar");
      const categories = ["All", ...new Set(allProducts.map(product => product.category).filter(Boolean))];

      filterBar.innerHTML = categories.map(category => `
        <button class="filter-btn ${category === activeCategory ? "active" : ""}" data-category="${category}">
          ${category}
        </button>
      `).join("");

      filterBar.querySelectorAll(".filter-btn").forEach(button => {
        button.addEventListener("click", () => {
          const selectedCategory = button.dataset.category;
          const url = new URL(window.location.href);

          if (selectedCategory === "All") {
            url.searchParams.delete("category");
          } else {
            url.searchParams.set("category", selectedCategory);
          }

          window.location.href = url.toString();
        });
      });
    }

    function renderProducts() {
      const grid = document.getElementById("shopGrid");
      const emptyState = document.getElementById("emptyState");
      const resultsCount = document.getElementById("resultsCount");
      const visibleProducts = getVisibleProducts();

      resultsCount.textContent = `${visibleProducts.length} products`;

      if (!visibleProducts.length) {
        grid.innerHTML = "";
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      grid.innerHTML = visibleProducts.map(product => `
        <a class="product-card" href="product.html?slug=${encodeURIComponent(product.slug)}">
          <div class="product-image-wrap">
            <img class="product-image" src="${product.image}" alt="${product.name}">
          </div>
          <div class="product-name">${product.name}</div>
          <div class="product-price">${formatPrice(product.price)}</div>
        </a>
      `).join("");
    }

    async function loadProducts() {
      const loadingState = document.getElementById("loadingState");
      const grid = document.getElementById("shopGrid");

      try {
        const response = await fetch(API_URL, { cache: "no-store" });
        const data = await response.json();

        allProducts = normalizeProducts(data);
        activeCategory = readInitialCategory();

        if (activeCategory !== "All" && !allProducts.some(product => product.category === activeCategory)) {
          activeCategory = "All";
        }

        loadingState.style.display = "none";

        updatePageLabels();
        renderFilters();
        renderProducts();
      } catch (error) {
        loadingState.textContent = "Unable to load collection.";
        grid.innerHTML = "";
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateCartCount();
      loadProducts();
    });

    window.addEventListener("pageshow", () => {
      updateCartCount();
    });
  </script>
</body>
</html>
