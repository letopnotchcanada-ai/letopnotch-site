<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — Collection</title>
  <meta name="description" content="Explore the Le Top Notch collection." />
  <style>
    :root{
      --bg:#f7f4ef;
      --text:#171717;
      --muted:#6e675f;
      --line:#e7e0d7;
      --banner:#ebe4da;
      --header-bg:rgba(247,244,239,.94);
      --white:#ffffff;
      --max:1180px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:"Helvetica Neue", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      width:100%;
      height:auto;
    }

    .announcement{
      min-height:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:4px 14px;
      background:var(--banner);
      border-bottom:1px solid var(--line);
      font-size:9px;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:100;
      background:var(--header-bg);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(231,224,215,.75);
    }

    .header-inner{
      width:min(1600px, calc(100% - 36px));
      margin:0 auto;
      min-height:56px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:18px;
    }

    .brand{
      font-size:13px;
      letter-spacing:.20em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .main-nav{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.13em;
      white-space:nowrap;
    }

    .header-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.13em;
      white-space:nowrap;
    }

    .main-nav a,
    .header-actions a,
    .brand{
      position:relative;
    }

    .main-nav a::after,
    .header-actions a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-3px;
      width:0;
      height:1px;
      background:currentColor;
      transition:width .2s ease;
    }

    .main-nav a:hover::after,
    .header-actions a:hover::after,
    .main-nav a.active::after{
      width:100%;
    }

    .page{
      padding:18px 0 42px;
    }

    .page-wrap{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
    }

    .page-title{
      text-align:center;
      font-size:clamp(34px, 5vw, 58px);
      line-height:.92;
      font-weight:600;
      letter-spacing:-.04em;
      text-transform:uppercase;
      margin-bottom:18px;
    }

    .mosaic{
      display:grid;
      grid-template-columns:1.05fr .92fr .92fr;
      grid-template-areas:
        "tops dresses jewelry"
        "skirts leather knitwear"
        "shoes jackets trousers"
        "tees denim sunglasses";
      gap:4px;
      background:var(--bg);
    }

    .tile{
      position:relative;
      display:block;
      overflow:hidden;
      background:#d8d1c7;
      min-height:220px;
    }

    .tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .4s ease;
    }

    .tile::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,.18), rgba(0,0,0,.02));
      z-index:1;
    }

    .tile:hover img{
      transform:scale(1.03);
    }

    .tile-label{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      z-index:2;
      color:#fff;
      text-align:center;
      text-transform:uppercase;
      font-size:14px;
      font-weight:700;
      letter-spacing:.08em;
      line-height:1.05;
      text-shadow:0 2px 10px rgba(0,0,0,.18);
      white-space:nowrap;
    }

    .tops{grid-area:tops; min-height:380px;}
    .dresses{grid-area:dresses; min-height:380px;}
    .jewelry{grid-area:jewelry; min-height:185px;}
    .skirts{grid-area:skirts; min-height:155px;}
    .leather{grid-area:leather; min-height:155px;}
    .knitwear{grid-area:knitwear; min-height:310px;}
    .shoes{grid-area:shoes; min-height:155px;}
    .jackets{grid-area:jackets; min-height:155px;}
    .trousers{grid-area:trousers; min-height:155px;}
    .tees{grid-area:tees; min-height:115px;}
    .denim{grid-area:denim; min-height:115px;}
    .sunglasses{grid-area:sunglasses; min-height:115px;}

    .site-footer{
      padding:22px 0 26px;
      background:var(--bg);
    }

    .footer-inner{
      width:min(1600px, calc(100% - 36px));
      margin:0 auto;
      border-top:1px solid var(--line);
      padding-top:16px;
      text-align:center;
      font-size:11px;
      letter-spacing:.20em;
      text-transform:uppercase;
      color:#4a4a4a;
    }

    @media (max-width: 980px){
      .header-inner{
        grid-template-columns:1fr;
        justify-items:center;
        min-height:auto;
        padding:12px 0;
      }

      .main-nav,
      .header-actions{
        flex-wrap:wrap;
        justify-content:center;
      }

      .mosaic{
        grid-template-columns:1fr 1fr;
        grid-template-areas:
          "tops dresses"
          "knitwear trousers"
          "jackets skirts"
          "tees denim"
          "jewelry sunglasses"
          "leather shoes";
      }

      .tile{
        min-height:220px !important;
      }
    }

    @media (max-width: 640px){
      .page-wrap{
        width:min(var(--max), calc(100% - 18px));
      }

      .mosaic{
        grid-template-columns:1fr;
        grid-template-areas:
          "tops"
          "dresses"
          "knitwear"
          "jackets"
          "trousers"
          "skirts"
          "tees"
          "denim"
          "jewelry"
          "sunglasses"
          "leather"
          "shoes";
      }

      .tile{
        min-height:260px !important;
      }

      .tile-label{
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="announcement">Complimentary shipping on orders over CA$250</div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">LE TOP NOTCH</a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="shop.html" class="active">Shop</a>
        <a href="new-in.html">New In</a>
        <a href="best-sellers.html">Best Sellers</a>
        <a href="last-chance.html">Last Chance</a>
        <a href="about.html">About</a>
      </nav>

      <div class="header-actions">
        <a href="cart.html" id="cartCountLink">Cart (0)</a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="page-wrap">
      <h1 class="page-title">Collection</h1>

      <section class="mosaic">
        <a class="tile tops" href="products.html?group=shop-all&category=tops">
          <img src="https://via.placeholder.com/900x1200/e7dfd5/7d746a?text=TOPS" alt="Tops">
          <span class="tile-label">Tops</span>
        </a>

        <a class="tile dresses" href="products.html?group=shop-all&category=dresses">
          <img src="https://via.placeholder.com/900x1200/e7dfd5/7d746a?text=DRESSES" alt="Dresses">
          <span class="tile-label">Dresses</span>
        </a>

        <a class="tile jewelry" href="best-sellers.html">
          <img src="https://via.placeholder.com/900x700/e7dfd5/7d746a?text=BEST+SELLERS" alt="Best Sellers">
          <span class="tile-label">Best Sellers</span>
        </a>

        <a class="tile skirts" href="products.html?group=shop-all&category=skirts">
          <img src="https://via.placeholder.com/900x700/e7dfd5/7d746a?text=SKIRTS" alt="Skirts">
          <span class="tile-label">Skirts</span>
        </a>

        <a class="tile leather" href="new-in.html">
          <img src="https://via.placeholder.com/900x700/e7dfd5/7d746a?text=NEW+IN" alt="New In">
          <span class="tile-label">New In</span>
        </a>

        <a class="tile knitwear" href="products.html?group=shop-all&category=knitwear">
          <img src="https://via.placeholder.com/900x1200/e7dfd5/7d746a?text=KNITWEAR" alt="Knitwear">
          <span class="tile-label">Knitwear</span>
        </a>

        <a class="tile shoes" href="last-chance.html">
          <img src="https://via.placeholder.com/900x700/e7dfd5/7d746a?text=LAST+CHANCE" alt="Last Chance">
          <span class="tile-label">Last Chance</span>
        </a>

        <a class="tile jackets" href="products.html?group=shop-all&category=jackets">
          <img src="https://via.placeholder.com/900x700/e7dfd5/7d746a?text=JACKETS" alt="Jackets">
          <span class="tile-label">Jackets</span>
        </a>

        <a class="tile trousers" href="products.html?group=shop-all&category=trousers">
          <img src="https://via.placeholder.com/900x700/e7dfd5/7d746a?text=TROUSERS" alt="Trousers">
          <span class="tile-label">Trousers</span>
        </a>

        <a class="tile tees" href="products.html?group=shop-all&category=tops">
          <img src="https://via.placeholder.com/900x500/e7dfd5/7d746a?text=SHIRTS+%26+BLOUSES" alt="Shirts and Blouses">
          <span class="tile-label">Shirts &amp; Blouses</span>
        </a>

        <a class="tile denim" href="products.html?group=shop-all&category=trousers">
          <img src="https://via.placeholder.com/900x500/e7dfd5/7d746a?text=SHOP+ALL" alt="Shop All">
          <span class="tile-label">Shop All</span>
        </a>

        <a class="tile sunglasses" href="products.html?group=shop-all&category=shop-all">
          <img src="https://via.placeholder.com/900x500/e7dfd5/7d746a?text=ALL+PRODUCTS" alt="All Products">
          <span class="tile-label">All Products</span>
        </a>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>LE TOP NOTCH</p>
    </div>
  </footer>

  <script>
    const CART_KEY = "letopnotch_cart";

    function getCart() {
      try {
        const raw = localStorage.getItem(CART_KEY);
        const cart = raw ? JSON.parse(raw) : [];
        return Array.isArray(cart) ? cart : [];
      } catch (error) {
        return [];
      }
    }

    function updateCartCount() {
      const count = getCart().reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
      const link = document.getElementById("cartCountLink");
      if (link) link.textContent = `Cart (${count})`;
    }

    document.addEventListener("DOMContentLoaded", updateCartCount);
    window.addEventListener("pageshow", updateCartCount);
  </script>
</body>
</html>
