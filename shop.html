<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — Shop</title>
  <meta name="description" content="Shop the Le Top Notch collection." />
  <style>
    :root{
      --bg:#f7f4ef;
      --text:#171717;
      --muted:#6e675f;
      --line:#e7e0d7;
      --banner:#ebe4da;
      --header-bg:rgba(247,244,239,.94);
      --white:#ffffff;
      --max:1600px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Helvetica Neue", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      width:100%;
      height:auto;
    }

    .announcement{
      min-height:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:4px 14px;
      background:var(--banner);
      border-bottom:1px solid var(--line);
      font-size:9px;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:100;
      background:var(--header-bg);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(231,224,215,.75);
    }

    .header-inner{
      width:min(var(--max), calc(100% - 36px));
      margin:0 auto;
      min-height:56px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:18px;
    }

    .brand{
      font-size:13px;
      letter-spacing:.20em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .main-nav{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.13em;
      white-space:nowrap;
    }

    .header-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.13em;
      white-space:nowrap;
    }

    .main-nav a,
    .header-actions a,
    .brand{
      position:relative;
    }

    .main-nav a::after,
    .header-actions a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-3px;
      width:0;
      height:1px;
      background:currentColor;
      transition:width .2s ease;
    }

    .main-nav a:hover::after,
    .header-actions a:hover::after,
    .main-nav a.active::after{
      width:100%;
    }

    .hero{
      position:relative;
      min-height:58vh;
      background:#ddd;
      overflow:hidden;
      border-bottom:1px solid var(--line);
    }

    .hero-image{
      width:100%;
      height:58vh;
      object-fit:cover;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      background:linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.18));
    }

    .hero-content{
      color:var(--white);
    }

    .hero-title{
      font-size:clamp(44px, 6vw, 92px);
      line-height:.92;
      font-weight:500;
      letter-spacing:-.05em;
      text-transform:uppercase;
      margin-bottom:12px;
    }

    .hero-subtitle{
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      opacity:.95;
    }

    .section-head{
      width:min(var(--max), calc(100% - 36px));
      margin:0 auto;
      padding:28px 0 16px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
    }

    .section-title{
      font-size:clamp(28px, 4vw, 54px);
      line-height:.95;
      font-weight:500;
      letter-spacing:-.04em;
      text-transform:uppercase;
    }

    .section-note{
      font-size:10px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .category-grid{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:1px;
      background:var(--line);
    }

    .category-card{
      position:relative;
      display:block;
      min-height:320px;
      overflow:hidden;
      background:#d9d2c8;
    }

    .category-card.tall{
      min-height:430px;
    }

    .category-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .45s ease;
    }

    .category-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,.20), rgba(0,0,0,.03));
      z-index:1;
    }

    .category-card:hover img{
      transform:scale(1.03);
    }

    .category-label{
      position:absolute;
      left:22px;
      bottom:22px;
      z-index:2;
      color:var(--white);
      font-size:21px;
      line-height:1;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-shadow:0 2px 12px rgba(0,0,0,.18);
    }

    .site-footer{
      padding:22px 0 26px;
      background:var(--bg);
    }

    .footer-inner{
      width:min(var(--max), calc(100% - 36px));
      margin:0 auto;
      border-top:1px solid var(--line);
      padding-top:16px;
      text-align:center;
      font-size:11px;
      letter-spacing:.20em;
      text-transform:uppercase;
      color:#4a4a4a;
    }

    @media (max-width: 1100px){
      .category-grid{
        grid-template-columns:repeat(3, 1fr);
      }

      .category-card,
      .category-card.tall{
        min-height:340px;
      }
    }

    @media (max-width: 820px){
      .header-inner{
        grid-template-columns:1fr;
        justify-items:center;
        min-height:auto;
        padding:12px 0;
      }

      .main-nav,
      .header-actions{
        flex-wrap:wrap;
        justify-content:center;
      }

      .hero,
      .hero-image{
        min-height:48vh;
        height:48vh;
      }

      .category-grid{
        grid-template-columns:repeat(2, 1fr);
      }

      .section-head{
        align-items:flex-start;
        flex-direction:column;
      }
    }

    @media (max-width: 560px){
      .header-inner,
      .footer-inner,
      .section-head{
        width:min(var(--max), calc(100% - 22px));
      }

      .category-grid{
        grid-template-columns:1fr;
      }

      .category-card,
      .category-card.tall{
        min-height:360px;
      }

      .category-label{
        left:18px;
        bottom:18px;
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="announcement">Complimentary shipping on orders over CA$250</div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">LE TOP NOTCH</a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="shop.html" class="active">Shop</a>
        <a href="new-in.html">New In</a>
        <a href="best-sellers.html">Best Sellers</a>
        <a href="last-chance.html">Last Chance</a>
        <a href="about.html">About</a>
      </nav>

      <div class="header-actions">
        <a href="cart.html" id="cartCountLink">Cart (0)</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <img
        class="hero-image"
        src="https://via.placeholder.com/2000x1600/eee6dc/7d746a?text=SHOP+LANDING"
        alt="Shop the collection"
      />
      <div class="hero-overlay">
        <div class="hero-content">
          <h1 class="hero-title">Shop</h1>
          <div class="hero-subtitle">The collection</div>
        </div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">Categories</h2>
        <div class="section-note">Select a category</div>
      </div>

      <div class="category-grid">
        <a class="category-card tall" href="products.html?group=shop-all&category=tops">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=TOPS" alt="Tops">
          <span class="category-label">Tops</span>
        </a>

        <a class="category-card tall" href="products.html?group=shop-all&category=dresses">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=DRESSES" alt="Dresses">
          <span class="category-label">Dresses</span>
        </a>

        <a class="category-card tall" href="products.html?group=shop-all&category=jackets">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=JACKETS" alt="Jackets">
          <span class="category-label">Jackets</span>
        </a>

        <a class="category-card tall" href="products.html?group=shop-all&category=knitwear">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=KNITWEAR" alt="Knitwear">
          <span class="category-label">Knitwear</span>
        </a>

        <a class="category-card tall" href="products.html?group=shop-all&category=trousers">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=TROUSERS" alt="Trousers">
          <span class="category-label">Trousers</span>
        </a>

        <a class="category-card" href="products.html?group=shop-all&category=skirts">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=SKIRTS" alt="Skirts">
          <span class="category-label">Skirts</span>
        </a>

        <a class="category-card" href="products.html?group=shop-all&category=shop-all">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=SHOP+ALL" alt="Shop All">
          <span class="category-label">Shop All</span>
        </a>

        <a class="category-card" href="new-in.html">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=NEW+IN" alt="New In">
          <span class="category-label">New In</span>
        </a>

        <a class="category-card" href="best-sellers.html">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=BEST+SELLERS" alt="Best Sellers">
          <span class="category-label">Best Sellers</span>
        </a>

        <a class="category-card" href="last-chance.html">
          <img src="https://via.placeholder.com/1000x1400/e7dfd5/7d746a?text=LAST+CHANCE" alt="Last Chance">
          <span class="category-label">Last Chance</span>
        </a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>LE TOP NOTCH</p>
    </div>
  </footer>

  <script>
    const CART_KEY = "letopnotch_cart";

    function getCart() {
      try {
        const raw = localStorage.getItem(CART_KEY);
        const cart = raw ? JSON.parse(raw) : [];
        return Array.isArray(cart) ? cart : [];
      } catch (error) {
        return [];
      }
    }

    function updateCartCount() {
      const count = getCart().reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
      const link = document.getElementById("cartCountLink");
      if (link) link.textContent = `Cart (${count})`;
    }

    document.addEventListener("DOMContentLoaded", updateCartCount);
    window.addEventListener("pageshow", updateCartCount);
  </script>
</body>
</html>
