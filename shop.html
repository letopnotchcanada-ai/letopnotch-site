<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — Le Top Notch</title>
  <script src="/global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}
    .page-head{padding:56px 0 40px;text-align:center;border-bottom:1px solid #e7e0d7;}
    .page-h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(52px,8vw,110px);font-weight:400;line-height:.85;letter-spacing:-.02em;text-transform:uppercase;}
    .tiles{width:min(1600px,100%);margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
    .tile{position:relative;display:block;overflow:hidden;background:#e8e2d9;}
    .tile-img{aspect-ratio:3/4;overflow:hidden;}
    .tile-img img{width:100%;height:100%;object-fit:cover;object-position:center 20%;transition:transform .5s ease;}
    .tile:hover .tile-img img{transform:scale(1.04);}
    .tile-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;}
    .tile-label-text{font-size:clamp(18px,2.2vw,32px);font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.5);white-space:nowrap;}
    @media(max-width:980px){.tiles{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:640px){
      .page-head{padding:36px 0 28px;}
    }
  </style>
</head>
<body>
<div id="ltn-header"></div>
<div class="page-head"><h1 class="page-h1">Shop</h1></div>
<div class="tiles">
  <a class="tile" href="/new-in.html"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-new-in.webp" alt="New In"></div><div class="tile-label"><div class="tile-label-text">New In</div></div></a>
  <a class="tile" href="/best-sellers.html"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-best-sellers.webp" alt="Best Sellers"></div><div class="tile-label"><div class="tile-label-text">Best Sellers</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=dresses"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-dresses.webp" alt="Dresses"></div><div class="tile-label"><div class="tile-label-text">Dresses</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=tops"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-tops.webp" alt="Tops"></div><div class="tile-label"><div class="tile-label-text">Tops</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=jackets"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-jackets.webp" alt="Jackets & Coats"></div><div class="tile-label"><div class="tile-label-text">Jackets & Coats</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=knitwear"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-knitwear.webp" alt="Knitwear"></div><div class="tile-label"><div class="tile-label-text">Knitwear</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=trousers"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-trousers.webp" alt="Trousers"></div><div class="tile-label"><div class="tile-label-text">Trousers</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=skirts"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-skirts.webp" alt="Skirts"></div><div class="tile-label"><div class="tile-label-text">Skirts</div></div></a>
  <a class="tile" href="/last-chance.html"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-shop-all.webp" alt="Last Chance"></div><div class="tile-label"><div class="tile-label-text">Last Chance</div></div></a>
</div>
<div id="ltn-footer"></div>
<script>
document.addEventListener("DOMContentLoaded",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();});
window.addEventListener("pageshow",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();});
</script>
</body>
</html>
