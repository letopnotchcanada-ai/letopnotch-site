<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — Checkout</title>
  <meta name="description" content="Complete your order at Le Top Notch" />
  
  <!-- ✅ CLARITY FIRST - Must load before other scripts -->
  <script src="/clarity.js"></script>
  
  <script src="/global.js?v=6"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f4ef;
      color: #171717;
      -webkit-font-smoothing: antialiased;
    }

    .checkout-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 40px 100px;
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: 80px;
      align-items: start;
    }

    /* LEFT COLUMN - FORM */
    .checkout-form {
      max-width: 640px;
    }

    .page-header {
      margin-bottom: 48px;
    }

    .page-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 48px;
      font-weight: 400;
      letter-spacing: -.02em;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1;
    }

    .page-subtitle {
      font-size: 13px;
      color: #6e675f;
      letter-spacing: .02em;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 600;
      margin-bottom: 20px;
      color: #171717;
    }

    .form-section {
      margin-bottom: 40px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .02em;
      color: #171717;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e7e0d7;
      background: #fff;
      font-size: 14px;
      font-family: inherit;
      color: #171717;
      transition: border-color .2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #171717;
    }

    .form-group input::placeholder {
      color: #9a9186;
    }

    .phone-input {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
    }

    .phone-code {
      background: #f9f7f3;
      color: #6e675f;
      cursor: not-allowed;
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 13px;
      letter-spacing: .02em;
      display: none;
    }

    .shipping-notice {
      background: #f0f9ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 13px;
      letter-spacing: .02em;
      display: none;
    }

    /* RIGHT COLUMN - ORDER SUMMARY */
    .order-summary {
      position: sticky;
      top: 100px;
      background: #fff;
      border: 1px solid #e7e0d7;
      padding: 32px;
    }

    .summary-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -.01em;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e7e0d7;
    }

    .summary-items {
      margin-bottom: 24px;
    }

    .summary-item {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f4efe8;
    }

    .summary-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .item-image {
      width: 80px;
      height: 100px;
      background: #f4efe8;
      flex-shrink: 0;
      border: 1px solid #efe8de;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .item-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .02em;
      line-height: 1.4;
    }

    .item-meta {
      font-size: 12px;
      color: #6e675f;
      letter-spacing: .01em;
    }

    .item-price {
      font-size: 13px;
      font-weight: 500;
      margin-top: auto;
    }

    .summary-totals {
      padding-top: 20px;
      border-top: 1px solid #e7e0d7;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
      letter-spacing: .02em;
    }

    .summary-line span:first-child {
      color: #6e675f;
    }

    .summary-line.total {
      font-size: 16px;
      font-weight: 600;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e7e0d7;
      margin-bottom: 0;
    }

    .summary-line.total span:first-child {
      color: #171717;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 12px;
    }

    /* BUTTON */
    .checkout-button {
      width: 100%;
      padding: 18px 32px;
      background: #171717;
      color: #fff;
      border: none;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      font-family: inherit;
      margin-top: 32px;
    }

    .checkout-button:hover {
      opacity: .85;
    }

    .checkout-button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    /* TRUST INDICATORS */
    .trust-badges {
      display: flex;
      gap: 24px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #e7e0d7;
    }

    .trust-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: #6e675f;
      letter-spacing: .02em;
    }

    .trust-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    /* MOBILE */
    @media (max-width: 1024px) {
      .checkout-container {
        grid-template-columns: 1fr;
        gap: 40px;
        padding: 40px 24px 80px;
      }

      .order-summary {
        position: static;
        order: -1;
      }

      .checkout-form {
        max-width: none;
      }

      .page-title {
        font-size: 36px;
      }
    }

    @media (max-width: 640px) {
      .checkout-container {
        padding: 32px 20px 60px;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .page-title {
        font-size: 32px;
      }

      .order-summary {
        padding: 24px;
      }

      .item-image {
        width: 60px;
        height: 75px;
      }

      .trust-badges {
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="ltn-header"></div>

  <div class="checkout-container">
    <!-- LEFT: FORM -->
    <div class="checkout-form">
      <div class="page-header">
        <h1 class="page-title">Checkout</h1>
        <p class="page-subtitle">Complete your order details below</p>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="shipping-notice" id="shippingNotice"></div>

      <form id="shippingForm">
        <!-- CONTACT INFORMATION -->
        <div class="form-section">
          <h2 class="section-title">Contact Information</h2>
          
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" required placeholder="you@example.com">
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="phone-input">
              <input type="text" id="phoneCode" readonly class="phone-code" value="+1">
              <input type="tel" id="phone" placeholder="514 555 1234">
            </div>
          </div>
        </div>

        <!-- SHIPPING ADDRESS -->
        <div class="form-section">
          <h2 class="section-title">Shipping Address</h2>

          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name *</label>
              <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name *</label>
              <input type="text" id="lastName" required>
            </div>
          </div>

          <div class="form-group">
            <label for="address">Street Address *</label>
            <input type="text" id="address" required placeholder="123 Main Street">
          </div>

          <div class="form-group">
            <label for="address2">Apartment, Suite, etc. (optional)</label>
            <input type="text" id="address2" placeholder="Apt 4B">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="city">City *</label>
              <input type="text" id="city" required>
            </div>
            <div class="form-group">
              <label for="postalCode">Postal Code *</label>
              <input type="text" id="postalCode" required placeholder="H3A 1A1">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="country">Country *</label>
              <select id="country" required>
                <option value="">Select Country</option>
                <option value="CA" selected>Canada</option>
                <option value="US">United States</option>
                <option value="GB">United Kingdom</option>
                <option value="FR">France</option>
                <option value="DE">Germany</option>
                <option value="IT">Italy</option>
                <option value="ES">Spain</option>
                <option value="AU">Australia</option>
                <option value="JP">Japan</option>
              </select>
            </div>
            <div class="form-group" id="provinceGroup">
              <label for="province">Province *</label>
              <select id="province" required>
                <option value="">Select Province</option>
                <option value="AB">Alberta</option>
                <option value="BC">British Columbia</option>
                <option value="MB">Manitoba</option>
                <option value="NB">New Brunswick</option>
                <option value="NL">Newfoundland and Labrador</option>
                <option value="NT">Northwest Territories</option>
                <option value="NS">Nova Scotia</option>
                <option value="NU">Nunavut</option>
                <option value="ON">Ontario</option>
                <option value="PE">Prince Edward Island</option>
                <option value="QC">Quebec</option>
                <option value="SK">Saskatchewan</option>
                <option value="YT">Yukon</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" class="checkout-button" id="checkoutButton">
          Continue to Payment
        </button>

        <div class="trust-badges">
          <div class="trust-badge">
            <span class="trust-icon">🔒</span>
            <span>Secure Checkout</span>
          </div>
          <div class="trust-badge">
            <span class="trust-icon">↩️</span>
            <span>Free Returns</span>
          </div>
          <div class="trust-badge">
            <span class="trust-icon">📦</span>
            <span id="shippingBadgeText">Free Shipping $250+</span>
          </div>
        </div>
      </form>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="order-summary">
      <h2 class="summary-title">Order Summary</h2>
      
      <div class="summary-items" id="summaryItems">
        <!-- Populated by JS -->
      </div>

      <div class="summary-totals">
        <div class="summary-line">
          <span>Subtotal</span>
          <span id="subtotalAmount">CAD $0.00</span>
        </div>
        <div class="summary-line">
          <span>Shipping</span>
          <span id="shippingAmount">Calculated</span>
        </div>
        <div class="summary-line">
          <span>Tax</span>
          <span id="taxAmount">Calculated at payment</span>
        </div>
        <div class="summary-line total">
          <span>Total</span>
          <span id="totalAmount">CAD $0.00</span>
        </div>
      </div>
    </div>
  </div>

  <div id="ltn-footer"></div>

  <script>
    // Constants
    const FREE_SHIPPING_THRESHOLD = 250;
    
    // Country codes
    const COUNTRY_CODES = {
      'CA': '+1', 'US': '+1', 'GB': '+44', 'FR': '+33', 'DE': '+49',
      'IT': '+39', 'ES': '+34', 'AU': '+61', 'JP': '+81'
    };

    const PROVINCES_CA = {
      'AB': 'Alberta', 'BC': 'British Columbia', 'MB': 'Manitoba',
      'NB': 'New Brunswick', 'NL': 'Newfoundland and Labrador',
      'NT': 'Northwest Territories', 'NS': 'Nova Scotia', 'NU': 'Nunavut',
      'ON': 'Ontario', 'PE': 'Prince Edward Island', 'QC': 'Quebec',
      'SK': 'Saskatchewan', 'YT': 'Yukon'
    };

    const STATES_US = {
      'AL': 'Alabama', 'AK': 'Alaska', 'AZ': 'Arizona', 'AR': 'Arkansas',
      'CA': 'California', 'CO': 'Colorado', 'CT': 'Connecticut', 'DE': 'Delaware',
      'FL': 'Florida', 'GA': 'Georgia', 'HI': 'Hawaii', 'ID': 'Idaho',
      'IL': 'Illinois', 'IN': 'Indiana', 'IA': 'Iowa', 'KS': 'Kansas',
      'KY': 'Kentucky', 'LA': 'Louisiana', 'ME': 'Maine', 'MD': 'Maryland',
      'MA': 'Massachusetts', 'MI': 'Michigan', 'MN': 'Minnesota', 'MS': 'Mississippi',
      'MO': 'Missouri', 'MT': 'Montana', 'NE': 'Nebraska', 'NV': 'Nevada',
      'NH': 'New Hampshire', 'NJ': 'New Jersey', 'NM': 'New Mexico', 'NY': 'New York',
      'NC': 'North Carolina', 'ND': 'North Dakota', 'OH': 'Ohio', 'OK': 'Oklahoma',
      'OR': 'Oregon', 'PA': 'Pennsylvania', 'RI': 'Rhode Island', 'SC': 'South Carolina',
      'SD': 'South Dakota', 'TN': 'Tennessee', 'TX': 'Texas', 'UT': 'Utah',
      'VT': 'Vermont', 'VA': 'Virginia', 'WA': 'Washington', 'WV': 'West Virginia',
      'WI': 'Wisconsin', 'WY': 'Wyoming'
    };

    // Update province field when country changes
    document.getElementById('country').addEventListener('change', function() {
      const provinceGroup = document.getElementById('provinceGroup');
      const phoneCodeField = document.getElementById('phoneCode');
      const country = this.value;
      
      phoneCodeField.value = COUNTRY_CODES[country] || '+1';
      
      if (country === 'CA') {
        provinceGroup.innerHTML = `
          <label for="province">Province *</label>
          <select id="province" required>
            <option value="">Select Province</option>
            ${Object.entries(PROVINCES_CA).map(([code, name]) => 
              `<option value="${code}">${name}</option>`
            ).join('')}
          </select>
        `;
      } else if (country === 'US') {
        provinceGroup.innerHTML = `
          <label for="province">State *</label>
          <select id="province" required>
            <option value="">Select State</option>
            ${Object.entries(STATES_US).map(([code, name]) => 
              `<option value="${code}">${name}</option>`
            ).join('')}
          </select>
        `;
      } else {
        provinceGroup.innerHTML = `
          <label for="province">Province / Region</label>
          <input type="text" id="province" placeholder="Optional">
        `;
      }
    });

    // Load cart and display summary
    function loadCartSummary() {
      const cart = JSON.parse(localStorage.getItem('letopnotch_cart') || '[]');
      const summaryItems = document.getElementById('summaryItems');
      const subtotalElement = document.getElementById('subtotalAmount');
      const shippingElement = document.getElementById('shippingAmount');
      const totalElement = document.getElementById('totalAmount');
      const shippingNotice = document.getElementById('shippingNotice');

      if (cart.length === 0) {
        window.location.href = '/cart.html';
        return;
      }

      let subtotal = 0;
      let itemsHTML = '';

      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        subtotal += itemTotal;
        
        itemsHTML += `
          <div class="summary-item">
            <div class="item-image">
              <img src="${item.image || ''}" alt="${item.name}">
            </div>
            <div class="item-details">
              <div class="item-name">${item.name}</div>
              <div class="item-meta">${item.color || ''} ${item.size ? '· Size ' + item.size : ''}</div>
              <div class="item-meta">Qty: ${item.quantity}</div>
              <div class="item-price">CAD $${itemTotal.toFixed(2)}</div>
            </div>
          </div>
        `;
      });

      // Calculate shipping display
      let shippingText = '';
      
      if (subtotal >= FREE_SHIPPING_THRESHOLD) {
        shippingText = 'Free';
        shippingNotice.textContent = `🎉 You qualify for free shipping! Orders over CAD $${FREE_SHIPPING_THRESHOLD} ship free.`;
        shippingNotice.style.display = 'block';
      } else {
        const amountNeeded = (FREE_SHIPPING_THRESHOLD - subtotal).toFixed(2);
        shippingText = 'Calculated at checkout';
        shippingNotice.textContent = `Add CAD $${amountNeeded} more to your order to qualify for free shipping!`;
        shippingNotice.style.display = 'block';
      }

      // Total is just subtotal - Square handles shipping at their checkout
      const total = subtotal;

      summaryItems.innerHTML = itemsHTML;
      subtotalElement.textContent = `CAD $${subtotal.toFixed(2)}`;
      shippingElement.textContent = shippingText;
      totalElement.textContent = `CAD $${total.toFixed(2)}`;
    }

    // Handle form submission
    document.getElementById('shippingForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const button = document.getElementById('checkoutButton');
      const errorMessage = document.getElementById('errorMessage');
      
      button.disabled = true;
      button.textContent = 'Processing...';
      errorMessage.style.display = 'none';

      const cart = JSON.parse(localStorage.getItem('letopnotch_cart') || '[]');
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      
      // Check if qualifies for free shipping
      const qualifiesForFreeShipping = subtotal >= FREE_SHIPPING_THRESHOLD;
      
      // ✅ META PIXEL: Track InitiateCheckout (correct format)
      if (window.trackBeginCheckout && typeof window.trackBeginCheckout === 'function') {
        trackBeginCheckout(cart, subtotal);
      }
      
      const phoneCode = document.getElementById('phoneCode').value;
      const phoneNumber = document.getElementById('phone').value;
      let formattedPhone = '';
      if (phoneNumber && phoneNumber.trim()) {
        const digitsOnly = phoneNumber.replace(/\D/g, '');
        formattedPhone = phoneCode + digitsOnly;
      }
      
      const shippingData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: formattedPhone,
        address: document.getElementById('address').value,
        address2: document.getElementById('address2').value,
        city: document.getElementById('city').value,
        province: document.getElementById('province').value,
        postalCode: document.getElementById('postalCode').value,
        country: document.getElementById('country').value
      };

      try {
        const response = await fetch('https://letopnotch-api-v2.letopnotchcanada.workers.dev/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cart: cart,
            shipping: shippingData,
            freeShipping: qualifiesForFreeShipping
          })
        });

        const data = await response.json();

        if (data.ok && data.url) {
          // ✅ META PIXEL: Track Purchase (CORRECTED FORMAT - matches global.js)
          // global.js expects: trackPurchase(orderId, total, cart)
          if (window.trackPurchase && typeof window.trackPurchase === 'function') {
            const orderId = data.orderId || 'order_' + Date.now();
            trackPurchase(orderId, subtotal, cart);
          }
          
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Checkout failed');
        }
      } catch (error) {
        console.error('Checkout error:', error);
        errorMessage.textContent = error.message || 'Failed to create checkout. Please try again.';
        errorMessage.style.display = 'block';
        button.disabled = false;
        button.textContent = 'Continue to Payment';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // Initialize
    loadCartSummary();
  </script>
</body>
</html>
