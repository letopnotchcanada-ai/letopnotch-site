<!DOCTYPE html>
<html>
<head>
<title>Le Top Notch</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:#f7f5f2;
}

header{
padding:30px;
text-align:center;
font-size:28px;
letter-spacing:3px;
}

.hero{
height:70vh;
background:#e9e7e4;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

button{
padding:15px 30px;
border:none;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
padding:50px;
}

.card{
background:white;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<header>
LE TOP NOTCH
</header>

<section class="hero">
<h1>Italian Craftsmanship</h1>
<button>Shop New Arrivals</button>
</section>

<section class="products">

<div class="card">Product</div>
<div class="card">Product</div>
<div class="card">Product</div>
<div class="card">Product</div>

</section>

</body>
</html>
