<!DOCTYPE html>
<html lang="en">
<head>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — SS26</title>
  <meta name="description" content="Le Top Notch — SS26 collection." />
  
  <!-- ✅ CLARITY FIRST - Must load before other scripts -->
  <script src="/clarity.js"></script>
  
  <!-- Other scripts after -->
  <script src="/global.js?v=3"></script>
  <style>
    :root{
      --bg:#f7f4ef;
      --text:#171717;
      --line:#e7e0d7;
      --white:#ffffff;
      --hero-desktop:62vh;
      --hero-tablet:54vh;
      --hero-mobile:55vh;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:"Helvetica Neue",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{color:inherit;text-decoration:none}
    img{display:block;width:100%;height:auto}
    main{width:100%}

    .hero{
      position:relative;
      min-height:var(--hero-desktop);
      background:#d9d2c8;
      overflow:hidden;
      border-bottom:1px solid var(--line);
    }

    .hero-image{
      width:100%;
      height:var(--hero-desktop);
      object-fit:cover;
      object-position:center 18%;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      background:linear-gradient(to bottom, rgba(0,0,0,.05), rgba(0,0,0,.18));
    }

    .hero-content{color:var(--white)}

    .hero-title{
      font-size:clamp(56px,7vw,108px);
      line-height:.92;
      font-weight:500;
      letter-spacing:-.02em;
      text-transform:uppercase;
      margin-bottom:18px;
      font-family:"Cormorant Garamond",Georgia,serif;
    }

    .hero-button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:0 30px;
      border:1px solid rgba(255,255,255,.95);
      background:rgba(255,255,255,.04);
      color:var(--white);
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.16em;
      transition:background .2s,color .2s,border-color .2s;
    }

    .hero-button:hover{
      background:var(--white);
      color:#111;
      border-color:var(--white);
    }

    .category-section{background:var(--line)}

    .category-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:1px;
      background:var(--line);
    }

    .category-card{
      position:relative;
      display:block;
      min-height:220px;
      overflow:hidden;
      background:#d9d2c8;
      isolation:isolate;
    }

    .category-card.tall{
      min-height:300px;
    }

    .category-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center top;
      transition:transform .45s ease;
    }

    .category-card::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      background:linear-gradient(to top, rgba(0,0,0,.18), rgba(0,0,0,.03));
      transition:background .25s ease;
    }

    .category-card:hover img{
      transform:scale(1.03);
    }

    .category-card:hover::before{
      background:linear-gradient(to top, rgba(0,0,0,.24), rgba(0,0,0,.05));
    }

    .category-label{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:2;
      width:86%;
      color:var(--white);
      text-align:center;
      font-size:clamp(14px,1.8vw,34px);
      line-height:1.08;
      font-weight:500;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-shadow:0 2px 20px rgba(0,0,0,.28);
      font-family:"Cormorant Garamond",Georgia,serif;
      white-space:normal;
      overflow-wrap:break-word;
      word-break:break-word;
      padding:0 8px;
    }

    @media (max-width:1100px){
      .category-grid{
        grid-template-columns:repeat(3,1fr);
      }

      .category-card,
      .category-card.tall{
        min-height:250px;
      }

      .hero,
      .hero-image{
        min-height:var(--hero-tablet);
        height:var(--hero-tablet);
      }
    }

    @media (max-width:820px){
      .category-grid{
        grid-template-columns:repeat(2,1fr);
      }

      .category-card,
      .category-card.tall{
        min-height:260px;
      }

      .hero,
      .hero-image{
        min-height:50vh;
        height:50vh;
      }

      .category-label{
        width:88%;
        font-size:clamp(18px,4vw,28px);
      }
    }

    @media (max-width:560px){
      .category-grid{
        grid-template-columns:1fr;
      }

      .category-card,
      .category-card.tall{
        min-height:360px;
      }

      .category-label{
        left:50%;
        top:50%;
        right:auto;
        bottom:auto;
        transform:translate(-50%,-50%);
        width:88%;
        text-align:center;
        white-space:normal;
        overflow-wrap:break-word;
        word-break:break-word;
        line-height:1.08;
        font-size:clamp(22px,7vw,34px);
        letter-spacing:.05em;
        padding:0 10px;
      }

      .hero-title{
        font-size:clamp(40px,14vw,80px);
      }

      .hero-button{
        min-height:42px;
        font-size:9px;
        padding:0 22px;
      }

      .hero,
      .hero-image{
        min-height:var(--hero-mobile);
        height:var(--hero-mobile);
      }
    }
  </style>
</head>
<body>
  <div id="ltn-header"></div>

  <main>
    <section class="hero">
      <img class="hero-image" src="https://letopnotch-site.pages.dev/images/hero-home.webp" alt="SS26 collection" />
      <div class="hero-overlay">
        <div class="hero-content">
          <h1 class="hero-title">SS26</h1>
          <a href="/new-in.html" class="hero-button">Discover</a>
        </div>
      </div>
    </section>

    <section class="category-section">
      <div class="category-grid">
        <a class="category-card tall" href="/new-in.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-new-in.webp" alt="New In">
          <span class="category-label">New In</span>
        </a>

        <a class="category-card tall" href="/products.html?group=shop-all&category=tops">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-tops.webp" alt="Tops">
          <span class="category-label">Tops</span>
        </a>

        <a class="category-card tall" href="/products.html?group=shop-all&category=dresses">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-dresses.webp" alt="Dresses">
          <span class="category-label">Dresses</span>
        </a>

        <a class="category-card tall" href="/products.html?group=shop-all&category=jackets">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-jackets.webp" alt="Jackets">
          <span class="category-label">Jackets</span>
        </a>

        <a class="category-card tall" href="/products.html?group=shop-all&category=knitwear">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-knitwear.webp" alt="Knitwear">
          <span class="category-label">Knitwear</span>
        </a>

        <a class="category-card" href="/products.html?group=shop-all&category=trousers">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-trousers.webp" alt="Trousers">
          <span class="category-label">Trousers</span>
        </a>

        <a class="category-card" href="/products.html?group=shop-all&category=skirts">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-skirts.webp" alt="Skirts">
          <span class="category-label">Skirts</span>
        </a>

        <a class="category-card" href="/shop.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-shop-all.webp" alt="Shop All">
          <span class="category-label">Shop All</span>
        </a>

        <a class="category-card" href="/best-sellers.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-best-sellers.webp" alt="Best Sellers">
          <span class="category-label">Best Sellers</span>
        </a>

        <a class="category-card" href="/last-chance.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-last-chance.webp" alt="Last Chance">
          <span class="category-label">Last Chance</span>
        </a>
      </div>
    </section>
  </main>

  <div id="ltn-footer"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof ltn_updateCartCount === "function") ltn_updateCartCount();
    });

    window.addEventListener("pageshow", () => {
      if (typeof ltn_updateCartCount === "function") ltn_updateCartCount();
    });
  </script>
</body>
</html>
