<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch</title>
  <meta name="description" content="Le Top Notch — SS26 collection." />
  <script src="/global.js"></script>
  <style>
    :root{--bg:#f7f4ef;--text:#171717;--muted:#6e675f;--line:#e7e0d7;--banner:#ebe4da;--white:#ffffff;--max:1600px;}
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.45;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%;height:auto}
    .hero{position:relative;min-height:78vh;background:#d9d2c8;overflow:hidden;border-bottom:1px solid var(--line);}
    .hero-image{width:100%;height:78vh;object-fit:cover;object-position:center top;}
    .hero-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background:linear-gradient(to bottom, rgba(0,0,0,.06), rgba(0,0,0,.22));}
    .hero-content{color:var(--white)}
    .hero-title{font-size:clamp(52px,7vw,112px);line-height:.92;font-weight:500;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:18px;font-family:"Cormorant Garamond",Georgia,serif;}
    .hero-button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 30px;border:1px solid rgba(255,255,255,.95);background:rgba(255,255,255,.04);color:var(--white);font-size:10px;text-transform:uppercase;letter-spacing:.16em;transition:background .2s,color .2s;}
    .hero-button:hover{background:var(--white);color:#111;}
    .category-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);}
    .category-card{position:relative;display:block;min-height:320px;overflow:hidden;background:#d9d2c8;}
    .category-card.tall{min-height:430px}
    .category-card img{width:100%;height:100%;object-fit:cover;object-position:center top;transition:transform .45s ease;}
    .category-card::before{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.20),rgba(0,0,0,.03));z-index:1;}
    .category-card:hover img{transform:scale(1.03)}
    .category-label{position:absolute;left:50%;bottom:50%;transform:translate(-50%,50%);z-index:2;color:var(--white);font-size:clamp(13px,1.8vw,42px);line-height:1.1;font-weight:500;letter-spacing:.08em;text-transform:uppercase;text-shadow:0 2px 20px rgba(0,0,0,.30);font-family:"Cormorant Garamond",Georgia,serif;white-space:nowrap;text-align:center;}
    @media(max-width:1100px){.category-grid{grid-template-columns:repeat(3,1fr)}.category-card,.category-card.tall{min-height:340px}}
    @media(max-width:820px){.hero,.hero-image{min-height:62vh;height:62vh;}.category-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.category-grid{grid-template-columns:1fr}.category-card,.category-card.tall{min-height:360px}.category-label{left:18px;bottom:18px;font-size:18px;}}
  </style>
</head>
<body>
  <div id="ltn-header"></div>

  <main>
    <section class="hero">
      <img class="hero-image" src="https://letopnotch-site.pages.dev/images/hero-home.webp" alt="SS26 collection" />
      <div class="hero-overlay">
        <div class="hero-content">
          <h1 class="hero-title">SS26</h1>
          <a href="/new-in.html" class="hero-button">Discover</a>
        </div>
      </div>
    </section>
    <section class="category-section">
      <div class="category-grid">
        <a class="category-card tall" href="/new-in.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-new-in.webp" alt="New In">
          <span class="category-label">New In</span>
        </a>
        <a class="category-card tall" href="/products.html?group=shop-all&category=tops">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-tops.webp" alt="Tops">
          <span class="category-label">Tops</span>
        </a>
        <a class="category-card tall" href="/products.html?group=shop-all&category=dresses">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-dresses.webp" alt="Dresses">
          <span class="category-label">Dresses</span>
        </a>
        <a class="category-card tall" href="/products.html?group=shop-all&category=jackets">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-jackets.webp" alt="Jackets">
          <span class="category-label">Jackets</span>
        </a>
        <a class="category-card tall" href="/products.html?group=shop-all&category=knitwear">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-knitwear.webp" alt="Knitwear">
          <span class="category-label">Knitwear</span>
        </a>
        <a class="category-card" href="/products.html?group=shop-all&category=trousers">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-trousers.webp" alt="Trousers">
          <span class="category-label">Trousers</span>
        </a>
        <a class="category-card" href="/products.html?group=shop-all&category=skirts">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-skirts.webp" alt="Skirts">
          <span class="category-label">Skirts</span>
        </a>
        <a class="category-card" href="/shop.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-shop-all.webp" alt="Shop All">
          <span class="category-label">Shop All</span>
        </a>
        <a class="category-card" href="/best-sellers.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-best-sellers.webp" alt="Best Sellers">
          <span class="category-label">Best Sellers</span>
        </a>
        <a class="category-card" href="/last-chance.html">
          <img src="https://letopnotch-site.pages.dev/images/home-tile-last-chance.webp" alt="Last Chance">
          <span class="category-label">Last Chance</span>
        </a>
      </div>
    </section>
  </main>

  <div id="ltn-footer"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof ltn_updateCartCount === "function") ltn_updateCartCount();
    });
    window.addEventListener("pageshow", () => {
      if (typeof ltn_updateCartCount === "function") ltn_updateCartCount();
    });
  </script>
</body>
</html>
