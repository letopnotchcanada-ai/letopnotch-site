<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Le Top Notch — Premium Italian Womenswear</title>
  <script src="/global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}
    .hero{position:relative;height:90vh;overflow:hidden;background:#d9d2c8;}
    .hero img{width:100%;height:100%;object-fit:cover;object-position:center 30%;}
    .hero-over{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.02),rgba(0,0,0,.32));display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .hero-sub{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:16px;}
    .hero-h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(72px,12vw,168px);font-weight:400;line-height:.8;letter-spacing:-.02em;text-transform:uppercase;color:#fff;text-align:center;}
    .hero-cta{display:inline-flex;height:52px;align-items:center;padding:0 36px;background:#fff;color:#171717;font-size:10px;text-transform:uppercase;letter-spacing:.16em;margin-top:32px;transition:opacity .2s;}
    .hero-cta:hover{opacity:.85;}
    .tiles{width:min(1600px,100%);margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
    .tile{position:relative;display:block;overflow:hidden;background:#e8e2d9;}
    .tile-img{aspect-ratio:3/4;overflow:hidden;}
    .tile-img img{width:100%;height:100%;object-fit:cover;object-position:center 20%;transition:transform .5s ease;}
    .tile:hover .tile-img img{transform:scale(1.04);}
    .tile-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;}
    .tile-label-text{font-size:clamp(18px,2.2vw,32px);font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.5);white-space:nowrap;}
    @media(max-width:980px){.tiles{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:640px){
      .hero{height:70vh;}
      .hero-h1{font-size:clamp(52px,16vw,110px);}
      .hero-cta{height:48px;padding:0 28px;font-size:9px;}
    }
  </style>
</head>
<body>
<div id="ltn-header"></div>
<section class="hero">
  <img src="https://letopnotch-site.pages.dev/images/home-tile-shop-all.webp" alt="Le Top Notch Collection" loading="eager" fetchpriority="high">
  <div class="hero-over">
    <div class="hero-sub">Spring / Summer 2026</div>
    <h1 class="hero-h1">Le Top<br>Notch</h1>
    <a href="/shop.html" class="hero-cta">Shop The Collection</a>
  </div>
</section>
<div class="tiles">
  <a class="tile" href="/new-in.html"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-new-in.webp" alt="New In" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">New In</div></div></a>
  <a class="tile" href="/best-sellers.html"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-best-sellers.webp" alt="Best Sellers" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">Best Sellers</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=dresses"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-dresses.webp" alt="Dresses" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">Dresses</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=tops"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-tops.webp" alt="Tops" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">Tops</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=jackets"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-jackets.webp" alt="Jackets" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">Jackets & Coats</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=knitwear"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-knitwear.webp" alt="Knitwear" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">Knitwear</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=trousers"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-trousers.webp" alt="Trousers" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">Trousers</div></div></a>
  <a class="tile" href="/products.html?group=shop-all&category=skirts"><div class="tile-img"><img src="https://letopnotch-site.pages.dev/images/home-tile-skirts.webp" alt="Skirts" loading="lazy"></div><div class="tile-label"><div class="tile-label-text">Skirts</div></div></a>
</div>
<div id="ltn-footer"></div>
<script>
document.addEventListener("DOMContentLoaded",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();});
window.addEventListener("pageshow",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();});
</script>
</body>
</html>
