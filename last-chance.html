<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Last Chance — Le Top Notch</title>
  <script src="/global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}

    /* HERO */
    .hero{position:relative;height:82vh;overflow:hidden;background:#d9d2c8;}
    .hero img{width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block;}
    .hero-over{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(0,0,0,.04),rgba(0,0,0,.35));}
    .hero-tag{font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:14px;}
    .hero-h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(68px,11vw,160px);font-weight:400;line-height:.82;letter-spacing:-.02em;text-transform:uppercase;color:#fff;text-align:center;margin-bottom:28px;}
    .hero-cta{height:46px;padding:0 38px;border:1px solid rgba(255,255,255,.88);color:#fff;display:inline-flex;align-items:center;font-size:9px;text-transform:uppercase;letter-spacing:.22em;transition:background .2s,color .2s;}
    .hero-cta:hover{background:#fff;color:#111;}

    /* URGENCY BANNER */
    .urgency{background:#171717;color:#fff;text-align:center;padding:16px;font-size:9px;letter-spacing:.24em;text-transform:uppercase;}
    .urgency span{color:#c8a96a;}

    /* FILTER BAR */
    .filter-bar{display:flex;align-items:center;gap:8px;padding:36px 40px 0;flex-wrap:wrap;}
    .filter-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#9a9186;margin-right:8px;}
    .f-btn{height:32px;padding:0 16px;border:1px solid #e7e0d7;background:transparent;font-size:9px;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;font-family:inherit;color:#6e675f;transition:all .2s;}
    .f-btn:hover,.f-btn.active{background:#171717;color:#fff;border-color:#171717;}

    /* MOSAIC — editorial full-bleed layout */
    .mosaic{display:flex;flex-direction:column;gap:3px;padding:3px;}
    .row{display:flex;gap:3px;}

    /* Mosaic cards — cover is correct for editorial hero images (lifestyle shots) */
    .mc{position:relative;overflow:hidden;background:#e8e2d9;display:block;cursor:pointer;}
    .mc img{width:100%;height:100%;object-fit:cover;object-position:center 12%;display:block;transition:transform .65s cubic-bezier(.25,.46,.45,.94);}
    .mc:hover img{transform:scale(1.04);}
    .mc-info{position:absolute;bottom:0;left:0;right:0;padding:32px 18px 18px;background:linear-gradient(to top,rgba(0,0,0,.62),transparent);color:#fff;opacity:0;transition:opacity .28s;pointer-events:none;}
    .mc:hover .mc-info{opacity:1;}
    .mc-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
    .mc-price{font-size:11px;opacity:.82;}

    /* Row patterns */
    .pA{height:82vh;}
    .pA .big{flex:0 0 58%;}
    .pA .stk{flex:1;display:flex;flex-direction:column;gap:3px;}
    .pA .stk .mc{flex:1;}
    .pB .mc{flex:1;aspect-ratio:2/3;}
    .pC .mc{flex:1;aspect-ratio:3/4;}
    .pD{min-height:66vh;align-items:stretch;}
    .pD-text{flex:0 0 36%;display:flex;flex-direction:column;justify-content:center;padding:64px 56px;background:#e8e0d6;}
    .pD .mc{flex:1;min-height:66vh;}
    .pD-lbl{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:#9a9186;margin-bottom:14px;}
    .pD-h{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(32px,3.8vw,58px);font-weight:400;letter-spacing:-.02em;line-height:1;text-transform:uppercase;margin-bottom:18px;}
    .pD-p{font-size:12px;color:#6e675f;line-height:1.9;max-width:30ch;margin-bottom:28px;}
    .pD-a{font-size:9px;text-transform:uppercase;letter-spacing:.18em;border-bottom:1px solid #171717;padding-bottom:2px;display:inline-block;color:#171717;}
    .pE{height:76vh;}
    .pE .wide{flex:0 0 62%;}
    .pE .stk{flex:1;display:flex;flex-direction:column;gap:3px;}
    .pE .stk .mc{flex:1;}
    .pF{height:74vh;}
    .pF .mc{flex:1;}
    .pI{height:70vh;}
    .pI .narrow{flex:0 0 32%;}
    .pI .wide{flex:1;}

    /* Skeleton */
    .sk{background:linear-gradient(90deg,#ede8e0 25%,#e2dbd3 50%,#ede8e0 75%);background-size:400% 100%;animation:sh 1.8s ease infinite;}
    @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

    /* CATEGORY SECTIONS — same framing as products.html */
    .cats{max-width:1400px;margin:0 auto;padding:0 40px 80px;}
    .cat-sec{padding-bottom:64px;}
    .cat-head{display:flex;align-items:flex-end;justify-content:space-between;padding:52px 0 28px;border-top:1px solid #e7e0d7;}
    .cat-left .cat-lbl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#9a9186;margin-bottom:8px;}
    .cat-left .cat-ttl{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(34px,4vw,64px);font-weight:400;letter-spacing:-.02em;text-transform:uppercase;line-height:.9;}
    .cat-lnk{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#6e675f;border-bottom:1px solid currentColor;padding-bottom:2px;white-space:nowrap;margin-bottom:6px;}
    .cat-lnk:hover{color:#111;border-color:#111;}
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px 14px;}
    .pc{display:block;}

    /* Product card framing — IDENTICAL to products.html */
    .pc-img{
      aspect-ratio:2/3;
      overflow:hidden;
      background:#f5f2ee;
      margin-bottom:11px;
      position:relative;
    }
    .pc-img img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center center;
      background:#f5f2ee;
      display:block;
      transition:transform .5s ease;
    }
    .pc:hover .pc-img img{transform:scale(1.03);}
    .pc-name{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:3px;}
    .pc-color{font-size:11px;color:#6e675f;margin-bottom:2px;}
    .pc-price{font-size:11px;color:#6e675f;}

    @media(max-width:1024px){
      .cat-grid{grid-template-columns:repeat(2,1fr);}
      .pA,.pE,.pF,.pI{height:auto;}
      .pA .big,.pE .wide,.pF .mc{height:60vw;flex:none;width:100%;}
      .filter-bar,.cats{padding-left:20px;padding-right:20px;}
    }
    @media(max-width:700px){
      .row{flex-direction:column;}
      .pD{flex-direction:column;}
      .pD-text{padding:32px 20px;}
      .pD-h{font-size:clamp(28px,7vw,44px);}
      .hero{height:65vh;}
      .hero-h1{font-size:clamp(56px,14vw,120px);}
      .pI{flex-direction:column;}
      .pI .narrow,.pI .wide{height:75vw;flex:none;}
      .pA .stk,.pE .stk{flex-direction:row;}
      .pA .stk .mc,.pE .stk .mc{height:45vw;}
      .cat-grid{grid-template-columns:repeat(2,1fr);gap:14px 10px;}
      .filter-bar,.cats{padding-left:16px;padding-right:16px;}
      .f-btn{height:38px;font-size:10px;padding:0 12px;}
      .pc-name{font-size:12px;}
      .pc-color,.pc-price{font-size:12px;}
      .cat-ttl{font-size:clamp(28px,7vw,44px);}
      .cat-head{padding:32px 0 20px;flex-direction:column;align-items:flex-start;gap:10px;}
      .urgency{font-size:8px;letter-spacing:.14em;padding:12px;}
      .hero-tag{font-size:8px;letter-spacing:.20em;}
      .hero-cta{height:42px;padding:0 28px;}
    }
  </style>
</head>
<body>

<div class="urgency">Final pieces — <span>while stocks last</span> — free returns on all orders</div>

<div id="ltn-header"></div>

<section class="hero">
  <img src="https://letopnotch-site.pages.dev/images/home-tile-last-chance.webp" alt="Last Chance">
  <div class="hero-over">
    <div class="hero-tag">Final Pieces — Limited Quantities</div>
    <h1 class="hero-h1">Last<br>Chance</h1>
    <a href="#shop" class="hero-cta">Shop Final Pieces</a>
  </div>
</section>

<div id="shop">
  <div class="filter-bar">
    <span class="filter-label">Filter by</span>
    <button class="f-btn active" data-cat="all">All</button>
    <button class="f-btn" data-cat="tops">Tops</button>
    <button class="f-btn" data-cat="dresses">Dresses</button>
    <button class="f-btn" data-cat="knitwear">Knitwear</button>
    <button class="f-btn" data-cat="jackets">Jackets</button>
    <button class="f-btn" data-cat="trousers">Trousers</button>
    <button class="f-btn" data-cat="skirts">Skirts</button>
  </div>

  <div id="mosaic" class="mosaic">
    <div class="row pA sk" style="height:82vh;"></div>
    <div class="row pB sk" style="aspect-ratio:3/1;"></div>
  </div>

  <div id="cats" class="cats"></div>
</div>

<div id="ltn-footer"></div>

<script>
const API    = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
const ASSETS = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/assets";

let allPool = [];
let activeFilter = "all";

function fmt(v){const n=Number(v);return(!isFinite(n)||n<=0)?"":"CAD $"+n.toFixed(2).replace(".00","");}
function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function sl(p){return encodeURIComponent(p.slug||p.id||"");}

function normCat(p){
  const r=String(p.category||"").trim().toLowerCase().replace(/[^a-z]/g,"");
  if(r.includes("dress")) return "dresses";
  if(r.includes("jacket")||r.includes("coat")||r.includes("blazer")) return "jackets";
  if(r.includes("trouser")||r.includes("pant")) return "trousers";
  if(r.includes("skirt")) return "skirts";
  if(r.includes("knit")||r.includes("sweater")) return "knitwear";
  const n=(p.name||"").toLowerCase();
  if(n.includes("dress")) return "dresses";
  if(n.includes("jacket")||n.includes("coat")) return "jackets";
  if(n.includes("trouser")) return "trousers";
  if(n.includes("skirt")) return "skirts";
  if(n.includes("knit")||n.includes("sweater")) return "knitwear";
  return "tops";
}

function isLastChance(p){
  return p.last_chance===true||p.last_chance===1||p.last_chance==="true"||p.last_chance==="checked";
}

const COLOR_ORDER=["white","beige","black","blue","pink","grey","red","green","navy","brown","purple","yellow","orange","multi","neutral"];
const CF={
  white:["white","cream","ivory","off white","ecru","snow"],
  black:["black","charcoal","ebony","graphite"],
  beige:["beige","camel","sand","tan","nude","taupe","khaki","cafe","coffee","cream orange","cream beige"],
  grey:["grey","gray","silver","slate","ash","pewter"],
  navy:["navy","navy blue","midnight","indigo"],
  blue:["blue","light blue","sky","teal","turquoise","cobalt"],
  green:["green","olive","sage","forest","emerald","mint","olive green"],
  red:["red","burgundy","bordeaux","wine","crimson","scarlet","maroon"],
  pink:["pink","blush","light pink","mauve","fuchsia","salmon","peach","cream rose","rose"],
  brown:["brown","chocolate","mocha","rust","sienna","amber","copper","dark brown"],
  purple:["purple","lavender","lilac","violet","plum"],
  yellow:["yellow","mustard","gold","amber","ochre"],
  orange:["orange","terracotta","coral"],
  multi:["multi","print","stripe","floral","check"],
};

function getFamily(p){
  const s=((Array.isArray(p.colors)?p.colors:[p.color||""]).join(" ")+" "+(p.name||"")).toLowerCase();
  for(const[f,ks] of Object.entries(CF)){if(ks.some(k=>s.includes(k))) return f;}
  return "neutral";
}

function colorSort(products){
  const groups={};
  for(const p of products){const f=getFamily(p);if(!groups[f])groups[f]=[];groups[f].push(p);}
  for(const g of Object.values(groups))g.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const queues={};
  for(const f of COLOR_ORDER){if(groups[f]?.length)queues[f]=[...groups[f]];}
  for(const[f,arr] of Object.entries(groups)){if(!queues[f]&&arr.length)queues[f]=[...arr];}
  const fams=Object.keys(queues),out=[];
  let fi=0;
  while(fams.some(f=>queues[f]?.length)){
    const f=fams[fi%fams.length];
    if(queues[f]?.length)out.push(queues[f].shift());
    fi++;if(fi>20000)break;
  }
  return out;
}

function mc(p){
  if(!p)return`<div class="mc sk"></div>`;
  return`<a class="mc" href="/product.html?slug=${sl(p)}">
    <img src="${p.image}" alt="${tc(p.name)}" loading="lazy">
    <div class="mc-info"><div class="mc-name">${tc(p.name)}</div><div class="mc-price">${fmt(p.price)}</div></div>
  </a>`;
}

function pc(p){
  const color=Array.isArray(p.colors)&&p.colors.length?p.colors[0]:(p.color||"");
  return`<a class="pc" href="/product.html?slug=${sl(p)}">
    <div class="pc-img"><img src="${p.image}" alt="${tc(p.name)}" loading="lazy"></div>
    <div class="pc-name">${tc(p.name)}</div>
    ${color?`<div class="pc-color">${tc(color)}</div>`:""}
    <div class="pc-price">${fmt(p.price)}</div>
  </a>`;
}

const editorials=[
  {lbl:"Last Chance — Final Edit",h:"Before<br>They're<br>Gone",p:"These are the final pieces from the season — each one offered while stock remains. Once they're gone, they're gone.",lnk:"Shop All Last Chance",href:"/products.html?group=last-chance"},
  {lbl:"Final Pieces",h:"The Last<br>of Each",p:"A curated selection of season-end finds at their final availability. Refined silhouettes, limited quantities.",lnk:"Discover Final Pieces",href:"/products.html?group=last-chance"},
];
let editIdx=0;
function editPanel(){
  const e=editorials[editIdx%editorials.length];editIdx++;
  return`<div class="pD-text"><div class="pD-lbl">${e.lbl}</div><div class="pD-h">${e.h}</div><div class="pD-p">${e.p}</div><a href="${e.href}" class="pD-a">${e.lnk}</a></div>`;
}

function buildMosaic(pool){
  let html="",i=0,patIdx=0;
  const n=pool.length;
  const patterns=[
    ()=>{const[a,b,c]=[pool[i],pool[i+1],pool[i+2]];i+=3;return`<div class="row pA"><div class="big">${mc(a)}</div><div class="stk">${mc(b)}${mc(c)}</div></div>`;},
    ()=>{const[a,b,c]=[pool[i],pool[i+1],pool[i+2]];i+=3;return`<div class="row pB">${mc(a)}${mc(b)}${mc(c)}</div>`;},
    ()=>{const a=pool[i];i+=1;return`<div class="row pD">${editPanel()}${mc(a)}</div>`;},
    ()=>{const[a,b,c,d]=[pool[i],pool[i+1],pool[i+2],pool[i+3]];i+=4;return`<div class="row pC">${mc(a)}${mc(b)}${mc(c)}${mc(d)}</div>`;},
    ()=>{const[a,b,c]=[pool[i],pool[i+1],pool[i+2]];i+=3;return`<div class="row pE"><div class="wide">${mc(a)}</div><div class="stk">${mc(b)}${mc(c)}</div></div>`;},
    ()=>{const[a,b]=[pool[i],pool[i+1]];i+=2;return`<div class="row pF">${mc(a)}${mc(b)}</div>`;},
    ()=>{const[a,b,c]=[pool[i],pool[i+1],pool[i+2]];i+=3;return`<div class="row pB">${mc(a)}${mc(b)}${mc(c)}</div>`;},
    ()=>{const a=pool[i];i+=1;return`<div class="row pD">${editPanel()}${mc(a)}</div>`;},
    ()=>{const[a,b]=[pool[i],pool[i+1]];i+=2;return`<div class="row pI"><div class="narrow">${mc(a)}</div><div class="wide">${mc(b)}</div></div>`;},
    ()=>{const[a,b,c,d]=[pool[i],pool[i+1],pool[i+2],pool[i+3]];i+=4;return`<div class="row pC">${mc(a)}${mc(b)}${mc(c)}${mc(d)}</div>`;},
  ];
  while(i<n){if(i>=n)break;html+=patterns[patIdx%patterns.length]();patIdx++;if(patIdx>5000)break;}
  return html;
}

function buildCats(reserved){
  const defs=[
    {key:"tops",title:"Tops",href:"/products.html?group=last-chance&category=tops"},
    {key:"dresses",title:"Dresses",href:"/products.html?group=last-chance&category=dresses"},
    {key:"knitwear",title:"Knitwear",href:"/products.html?group=last-chance&category=knitwear"},
    {key:"jackets",title:"Jackets & Coats",href:"/products.html?group=last-chance&category=jackets"},
    {key:"trousers",title:"Trousers",href:"/products.html?group=last-chance&category=trousers"},
    {key:"skirts",title:"Skirts",href:"/products.html?group=last-chance&category=skirts"},
  ];
  let html="";
  defs.forEach(({key,title,href})=>{
    const items=reserved[key]||[];
    if(!items.length)return;
    html+=`<div class="cat-sec">
      <div class="cat-head">
        <div class="cat-left"><div class="cat-lbl">Last Chance</div><div class="cat-ttl">${title}</div></div>
        <a href="${href}" class="cat-lnk">Shop All ${title}</a>
      </div>
      <div class="cat-grid">${items.map(pc).join("")}</div>
    </div>`;
  });
  return html||`<div style="padding:60px 0;text-align:center;font-size:11px;color:#9a9186;letter-spacing:.14em;text-transform:uppercase;">All last chance items are shown above.</div>`;
}

function renderFiltered(){
  const pool=activeFilter==="all"?allPool:allPool.filter(p=>normCat(p)===activeFilter);
  const cats=["tops","dresses","knitwear","jackets","trousers","skirts"];
  const reserved={};const reservedIds=new Set();
  cats.forEach(cat=>{
    const items=pool.filter(p=>normCat(p)===cat);
    reserved[cat]=items.slice(-4);
    reserved[cat].forEach(p=>reservedIds.add(p.id||p.slug||p.name));
  });
  const mosaicPool=colorSort(pool.filter(p=>!reservedIds.has(p.id||p.slug||p.name)));
  document.getElementById("mosaic").innerHTML=buildMosaic(mosaicPool)||`<div style="padding:60px 40px;font-size:11px;color:#9a9186;letter-spacing:.14em;text-transform:uppercase;">No items in this category.</div>`;
  document.getElementById("cats").innerHTML=buildCats(reserved);
}

document.querySelectorAll(".f-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter=btn.dataset.cat;
    renderFiltered();
  });
});

async function load(){
  try{
    try{
      const ar=await fetch(ASSETS);
      const assets=await ar.json();
      const h=assets["last-chance-tile-shop-all"]||assets["home-tile-last-chance"];
      if(h?.url)document.querySelector(".hero img").src=h.url;
    }catch(e){}
    const res=await fetch(API);
    const all=await res.json();
    let pool=all.filter(p=>isLastChance(p)&&p.image);
    if(pool.length<4)pool=all.filter(p=>p.image).slice(0,80);
    pool.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    allPool=pool;
    renderFiltered();
  }catch(e){
    document.getElementById("mosaic").innerHTML=`<div style="padding:80px 40px;font-size:11px;color:#9a9186;text-align:center;">Unable to load products.</div>`;
  }
}

document.addEventListener("DOMContentLoaded",load);
window.addEventListener("pageshow",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();});
</script>
</body>
</html>
