<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Chance — Le Top Notch</title>
  <meta name="description" content="Final pieces before they're gone." />
  <link rel="stylesheet" href="/mobile-fixes.css">
  <script src="/global.js"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --text: #171717;
      --muted: #6e675f;
      --line: #e7e0d7;
      --white: #ffffff;
      --max: 1600px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .lastchance-hero {
      min-height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #d9d2c8;
      border-bottom: 1px solid var(--line);
    }

    .lastchance-hero-content {
      padding: 24px;
    }

    .lastchance-hero-title {
      font-size: clamp(42px, 6vw, 92px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    .lastchance-hero-subtitle {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .lastchance-main {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      padding: 48px 0;
    }

    @media (max-width: 620px) {
      .lastchance-main {
        padding: 32px 0;
        width: calc(100% - 28px);
      }
    }
  </style>

  <!-- Auto redirect to products page with last-chance group -->
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      window.location.href = "/products.html?group=last-chance&category=shop-all";
    });
  </script>
</head>
<body>

  <!-- Inject global header -->
  <div id="ltn-header"></div>

  <main>
    <section class="lastchance-hero">
      <div class="lastchance-hero-content">
        <h1 class="lastchance-hero-title">Last Chance</h1>
        <p class="lastchance-hero-subtitle">Loading...</p>
      </div>
    </section>
  </main>

  <!-- Inject global footer -->
  <div id="ltn-footer"></div>

</body>
</html>
