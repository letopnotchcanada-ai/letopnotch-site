<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — About</title>
  <meta name="description" content="About Le Top Notch..." />
  
  <!-- ✅ CLARITY FIRST - Must load before other scripts -->
  <script src="/clarity.js"></script>
  
src="/global.js?v=5"></script>.
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}

    .urgency{background:#171717;color:#fff;text-align:center;padding:14px;font-size:9px;letter-spacing:.24em;text-transform:uppercase;}
    .urgency span{color:#c8a96a;}

    .page-head{padding:48px 0 32px;text-align:center;border-bottom:1px solid #e7e0d7;}
    .page-tag{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#9a9186;margin-bottom:12px;}
    .page-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(52px,8vw,110px);font-weight:400;line-height:.85;letter-spacing:-.02em;text-transform:uppercase;color:#171717;}

    /* CATEGORY NAV */
    .cat-nav{
      border-bottom:1px solid #e7e0d7;
      overflow:hidden;
      background:#f7f4ef;
    }
    .cat-nav-inner{
      display:flex;
      align-items:center;
      width:min(1600px,calc(100% - 40px));
      margin:0 auto;
      gap:0;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      overscroll-behavior-x:contain;
    }
    .cat-nav-inner::-webkit-scrollbar{display:none;}
    .cat-nav a{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:#6e675f;
      padding:16px 20px;
      border-bottom:1.5px solid transparent;
      white-space:nowrap;
      transition:color .15s,border-color .15s;
      transform:translateZ(0);
      backface-visibility:hidden;
      -webkit-font-smoothing:antialiased;
    }
    .cat-nav a:hover,.cat-nav a.active{color:#171717;border-bottom-color:#171717;}

    .tiles-wrap{width:min(1600px,calc(100% - 40px));margin:0 auto;padding:36px 0 64px;}
    .tiles-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
    .tile{position:relative;display:block;overflow:hidden;background:#e8e2d9;cursor:pointer;}
    .tile-img{aspect-ratio:3/4;overflow:hidden;}
    .tile-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .55s ease;}
    .tile:hover .tile-img img{transform:scale(1.04);}
    .tile-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;pointer-events:none;}
    .tile-label-text{
      font-size:clamp(16px,2vw,28px);
      font-family:"Cormorant Garamond",Georgia,serif;
      font-weight:500;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:#fff;
      text-shadow:0 2px 20px rgba(0,0,0,.45);
      white-space:normal;
      line-height:1.08;
    }
    .tile-label-count{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.8);margin-top:6px;}

    .products-section{width:min(1600px,calc(100% - 40px));margin:0 auto;padding:0 0 80px;}
    .products-head{display:flex;align-items:flex-end;justify-content:space-between;padding:40px 0 28px;border-top:1px solid #e7e0d7;}
    .products-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(32px,4vw,60px);font-weight:400;letter-spacing:-.02em;text-transform:uppercase;line-height:.9;}
    .products-count{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#9a9186;}
    .products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px 16px;}

    .product-card{display:block;position:relative;}
    .product-image-wrap{aspect-ratio:4/5;overflow:hidden;background:#f4efe8;margin-bottom:11px;position:relative;padding:22px;display:flex;align-items:center;justify-content:center;border:1px solid #efe8de;}
    .product-image-wrap img{width:calc(100% - 44px);height:calc(100% - 44px);position:absolute;inset:22px;object-fit:contain;object-position:center center;display:block;transition:transform .5s ease;background:transparent;}
    .product-image-wrap .img-secondary{position:absolute;inset:22px;width:calc(100% - 44px);height:calc(100% - 44px);opacity:0;transition:opacity .4s ease;}
    .product-card.has-hover:hover .img-primary{opacity:0;}
    .product-card.has-hover:hover .img-secondary{opacity:1;}
    .product-card:hover .product-image-wrap img{transform:scale(1.03);}
    .prod-info{padding:12px 2px 0;}
    .prod-name{font-size:11px;text-transform:uppercase;letter-spacing:.065em;font-weight:500;margin-bottom:3px;line-height:1.3;}
    .prod-color{font-size:11px;color:#6e675f;margin-bottom:2px;line-height:1.35;}
    .prod-price{font-size:11px;color:#6e675f;line-height:1.35;}

    .qs-panel{position:absolute;left:0;right:0;bottom:0;background:rgba(247,244,239,.98);backdrop-filter:blur(6px);border-top:1px solid #e7e0d7;padding:14px 14px 12px;z-index:4;transform:translateY(102%);transition:transform .28s cubic-bezier(.22,.61,.36,1);pointer-events:none;}
    .product-card:hover .qs-panel{transform:translateY(0);pointer-events:auto;}
    .qs-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;line-height:1.3;}
    .qs-price{font-size:11px;color:#6e675f;margin-bottom:8px;}
    .qs-colors{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#6e675f;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .qs-colors strong{color:#171717;}
    .qs-sizes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
    .qs-sz{min-width:32px;height:28px;border:1px solid #e7e0d7;background:#fff;font-size:9px;letter-spacing:.06em;padding:0 6px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
    .qs-sz:hover,.qs-sz.selected{background:#171717;color:#fff;border-color:#171717;}
    .qs-sz.sold-out{color:#c8c0b8;cursor:not-allowed;text-decoration:line-through;}
    .qs-btn{width:100%;min-height:36px;background:#171717;color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.16em;transition:opacity .2s;display:flex;align-items:center;justify-content:center;padding:0 14px;}
    .qs-btn:hover{opacity:.84;}
    .qs-btn:disabled{opacity:.45;cursor:not-allowed;}
    .wl-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:5;opacity:0;transition:opacity .2s;color:#171717;border:1px solid rgba(231,224,215,.8);}
    .product-card:hover .wl-btn{opacity:1;}
    .wl-btn.active{color:#c0392b;opacity:1;}
    #ltn-qs-toast{position:fixed;bottom:28px;right:28px;background:#171717;color:#fff;padding:14px 20px;font-size:10px;text-transform:uppercase;letter-spacing:.14em;z-index:9000;transform:translateY(20px);opacity:0;transition:all .28s ease;pointer-events:none;}
    #ltn-qs-toast.on{transform:translateY(0);opacity:1;}

    .sk{background:linear-gradient(90deg,#ede8e0 25%,#e2dbd3 50%,#ede8e0 75%);background-size:400% 100%;animation:sh 1.8s ease infinite;}
    @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
    .tile.sk{aspect-ratio:3/4;}

    .state-msg{grid-column:1/-1;text-align:center;padding:60px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9a9186;}

    @media(max-width:1100px){
      .tiles-grid{grid-template-columns:repeat(3,1fr);}
      .products-grid{grid-template-columns:repeat(3,1fr);}
    }

    @media(max-width:700px){
      .tiles-grid{grid-template-columns:repeat(2,1fr);}
      .products-grid{grid-template-columns:repeat(2,1fr);gap:16px 10px;}
      .page-head{padding:32px 0 24px;}
      .products-head{flex-direction:column;align-items:flex-start;gap:8px;padding:28px 0 20px;}
      .cat-nav{
        overflow:visible;
      }
      .cat-nav-inner{
        width:calc(100% - 24px);
        overflow:visible;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:0;
        padding:8px 0;
      }
      .cat-nav a{
        padding:12px 10px;
        font-size:9px;
        letter-spacing:.11em;
        border-bottom:none;
      }
      .cat-nav a.active{
        color:#171717;
        text-decoration:underline;
        text-underline-offset:4px;
      }
      .tile-label-count{display:none;}
      .urgency{font-size:8px;letter-spacing:.14em;padding:12px;}
      .product-image-wrap{padding:14px;}
      .product-image-wrap img,.product-image-wrap .img-secondary{inset:14px;width:calc(100% - 28px);height:calc(100% - 28px);}
    }

    @media(max-width:640px){
      .qs-panel{display:none;}
      .wl-btn{display:none;}
    }

    @media(max-width:440px){
      .tiles-grid{grid-template-columns:repeat(2,1fr);}
      .products-grid{grid-template-columns:repeat(2,1fr);gap:12px 8px;}
      .tiles-wrap,.products-section{width:calc(100% - 24px);}
      .cat-nav-inner{
        width:calc(100% - 20px);
      }
      .cat-nav a{
        padding:11px 8px;
        font-size:8px;
        letter-spacing:.1em;
      }
    }
  </style>
</head>
<body>

<div class="urgency">Final pieces — <span>while stocks last</span> — free returns on all orders</div>

<div id="ltn-header"></div>

<div class="page-head">
  <div class="page-tag">Final Pieces — Limited Quantities</div>
  <h1 class="page-title">Last Chance</h1>
</div>

<nav class="cat-nav">
  <div class="cat-nav-inner">
    <a href="#" class="active" data-cat="all">All</a>
    <a href="#" data-cat="tops">Tops</a>
    <a href="#" data-cat="dresses">Dresses</a>
    <a href="#" data-cat="knitwear">Knitwear</a>
    <a href="#" data-cat="jackets">Jackets &amp; Coats</a>
    <a href="#" data-cat="trousers">Trousers</a>
    <a href="#" data-cat="skirts">Skirts</a>
  </div>
</nav>

<div class="tiles-wrap">
  <div class="tiles-grid" id="tilesGrid">
    <div class="tile sk"></div>
    <div class="tile sk"></div>
    <div class="tile sk"></div>
    <div class="tile sk"></div>
    <div class="tile sk"></div>
    <div class="tile sk"></div>
  </div>
</div>

<div class="products-section" id="productsSection" style="display:none;">
  <div class="products-head">
    <div class="products-title" id="productsTitle">Tops</div>
    <div class="products-count" id="productsCount"></div>
  </div>
  <div class="products-grid shop-grid" id="productsGrid"></div>
</div>

<div id="ltn-footer"></div>
<div id="ltn-qs-toast">Added to basket</div>

<script>
const API = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
const CART_KEY = "letopnotch_cart";

let allPool = [];
let activeFilter = "all";

function fmt(v){const n=Number(v);return(!isFinite(n)||n<=0)?"":"CAD $"+n.toFixed(2).replace(".00","");}
function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function sl(p){return encodeURIComponent(p.slug||"");}

function normCat(p){
  const r=String(p.category||"").trim().toLowerCase().replace(/[^a-z]/g,"");
  if(r.includes("dress")) return "dresses";
  if(r.includes("jacket")||r.includes("coat")||r.includes("blazer")) return "jackets";
  if(r.includes("trouser")||r.includes("pant")) return "trousers";
  if(r.includes("skirt")) return "skirts";
  if(r.includes("knit")||r.includes("sweater")) return "knitwear";
  const n=(p.name||"").toLowerCase();
  if(n.includes("dress")) return "dresses";
  if(n.includes("jacket")||n.includes("coat")) return "jackets";
  if(n.includes("trouser")) return "trousers";
  if(n.includes("skirt")) return "skirts";
  if(n.includes("knit")||n.includes("sweater")) return "knitwear";
  return "tops";
}

function isLastChance(p){
  return p.last_chance===true||p.last_chance===1||p.last_chance==="true"||p.last_chance==="checked";
}

function parseSizeStock(val){
  const map={};
  if(!val)return map;
  String(val).split(",").forEach(part=>{
    const[size,qty]=part.trim().split(":");
    if(size)map[size.trim()]=Number(qty)||0;
  });
  return map;
}

function getCart(){
  try{
    const raw=localStorage.getItem(CART_KEY);
    const cart=raw?JSON.parse(raw):[];
    return Array.isArray(cart)?cart:[];
  }catch{
    return[];
  }
}

function saveCart(c){
  localStorage.setItem(CART_KEY,JSON.stringify(c));
}

function addToCart(item){
  const cart=getCart();
  const id=item.slug+"-"+(item.size||"one-size")+"-"+(item.color||"");
  const idx=cart.findIndex(x=>x.id===id);
  if(idx>=0)cart[idx].quantity+=1;
  else cart.push({...item,id,quantity:1});
  saveCart(cart);
  if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();
  showToast("Added to basket");
}

function showToast(msg){
  const t=document.getElementById("ltn-qs-toast");
  t.textContent=msg;
  t.classList.add("on");
  setTimeout(()=>t.classList.remove("on"),2200);
}

const CATS = [
  {key:"tops",      label:"Tops"},
  {key:"dresses",   label:"Dresses"},
  {key:"knitwear",  label:"Knitwear"},
  {key:"jackets",   label:"Jackets & Coats"},
  {key:"trousers",  label:"Trousers"},
  {key:"skirts",    label:"Skirts"},
];

function buildTiles(pool){
  const grid = document.getElementById("tilesGrid");
  const catImages = {};
  const catCounts = {};

  CATS.forEach(c => {
    const items = pool.filter(p => normCat(p) === c.key);
    catCounts[c.key] = items.length;
    catImages[c.key] = items[0]?.image || "";
  });

  const visibleCats = CATS.filter(c => catCounts[c.key] > 0);

  if(!visibleCats.length){
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1;">No last chance items available at this time.</div>`;
    return;
  }

  grid.innerHTML = visibleCats.map(c => `
    <a class="tile" href="#" data-cat="${c.key}">
      <div class="tile-img">
        <img src="${catImages[c.key]}" alt="${c.label}" loading="lazy">
      </div>
      <div class="tile-label">
        <div class="tile-label-text">${c.label}</div>
        <div class="tile-label-count">${catCounts[c.key]} piece${catCounts[c.key]!==1?"s":""}</div>
      </div>
    </a>
  `).join("");

  grid.querySelectorAll(".tile[data-cat]").forEach(tile => {
    tile.addEventListener("click", e => {
      e.preventDefault();
      showCategory(tile.dataset.cat);
    });
  });
}

function showCategory(cat){
  activeFilter = cat;

  document.querySelectorAll(".cat-nav a").forEach(a => {
    a.classList.toggle("active", a.dataset.cat === cat);
  });

  const pool = cat === "all" ? allPool : allPool.filter(p => normCat(p) === cat);
  const catDef = CATS.find(c => c.key === cat);
  const label = catDef ? catDef.label : "All Last Chance";

  const section = document.getElementById("productsSection");
  const grid = document.getElementById("productsGrid");
  const title = document.getElementById("productsTitle");
  const count = document.getElementById("productsCount");

  title.textContent = label;
  count.textContent = pool.length + " piece" + (pool.length !== 1 ? "s" : "");

  if(!pool.length){
    grid.innerHTML = `<div class="state-msg">No items in this category right now.</div>`;
  } else {
    grid.innerHTML = pool.map(p => {
      const color = Array.isArray(p.colors) && p.colors.length ? p.colors[0] : (p.color || "");
      const allColors = Array.isArray(p.colors) ? p.colors : (p.color ? [p.color] : []);
      const sec = p.secondImage || p.gallery_1 || "";
      const sizes = Array.isArray(p.sizes) ? p.sizes : [];
      const sizeStockMap = parseSizeStock(p.size_stock);
      const hasHover = sec ? " has-hover" : "";

      let sizeHTML = "";
      if(sizes.length > 0){
        sizeHTML = sizes.map(s => {
          const qty = Object.keys(sizeStockMap).length ? (sizeStockMap[s]||0) : (p.in_stock?1:0);
          const soldOut = qty === 0;
          const cls = soldOut ? "qs-sz sold-out" : "qs-sz";
          return `<button class="${cls}" data-size="${s}" data-slug="${sl(p)}" ${soldOut?"disabled":""}>${s}</button>`;
        }).join("");
      }

      return `<a class="product-card${hasHover}" href="/product.html?slug=${sl(p)}">
        <div class="product-image-wrap">
          <img class="img-primary" src="${p.image}" alt="${tc(p.name)}" loading="lazy">
          ${sec?`<img class="img-secondary" src="${sec}" alt="${tc(p.name)}" loading="lazy">`:""}
          <button class="wl-btn" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('active')">♡</button>
          <div class="qs-panel" onclick="event.preventDefault()">
            <div class="qs-name">${tc(p.name)}</div>
            <div class="qs-price">${fmt(p.price)}</div>
            ${allColors.length > 0 ? `<div class="qs-colors">Available in <strong>${tc(allColors[0])}</strong>${allColors.slice(1).map(c=>` | ${tc(c)}`).join("")}</div>` : ""}
            ${sizeHTML ? `<div class="qs-sizes">${sizeHTML}</div>` : ""}
            <button class="qs-btn" id="qs-add-${sl(p)}" ${!p.in_stock?"disabled":""} data-slug="${sl(p)}" ${sizes.length===0?`data-size="One Size"`:""}><span>${p.in_stock?"Quick Shop":"Out of Stock"}</span></button>
          </div>
        </div>
        <div class="prod-info">
          <div class="prod-name">${tc(p.name)}</div>
          ${color ? `<div class="prod-color">${tc(color)}</div>` : ""}
          <div class="prod-price">${fmt(p.price)}</div>
        </div>
      </a>`;
    }).join("");

    grid.querySelectorAll(".qs-sz:not(.sold-out)").forEach(btn=>{
      btn.addEventListener("click",e=>{
        e.preventDefault();
        e.stopPropagation();
        const panel=btn.closest(".qs-panel");
        panel.querySelectorAll(".qs-sz").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        const addBtn=panel.querySelector(".qs-btn");
        if(addBtn)addBtn.dataset.size=btn.dataset.size;
      });
    });

    grid.querySelectorAll(".qs-btn").forEach(btn=>{
      btn.addEventListener("click",e=>{
        e.preventDefault();
        e.stopPropagation();
        const slug=btn.dataset.slug;
        const size=btn.dataset.size||"One Size";
        const p=allPool.find(x=>encodeURIComponent(x.slug)===slug);
        if(!p||!p.in_stock)return;

        if(p.sizes&&p.sizes.length>0&&!btn.dataset.size){
          const panel=btn.closest(".qs-panel");
          panel.querySelectorAll(".qs-sz").forEach(s=>{s.style.borderColor="#c0392b"});
          setTimeout(()=>panel.querySelectorAll(".qs-sz").forEach(s=>{s.style.borderColor=""}),800);
          return;
        }

        addToCart({
          slug:p.slug,
          name:p.name,
          price:p.price,
          image:p.image,
          size:size,
          color:p.color||(Array.isArray(p.colors)&&p.colors[0])||"",
          category:p.rawCategory||p.category,
          in_stock:p.in_stock,
          currency:"CAD"
        });

        const label=btn.querySelector("span");
        const orig=label.textContent;
        label.textContent="Added ✓";
        btn.disabled=true;
        setTimeout(()=>{label.textContent=orig;btn.disabled=false},1800);
      });
    });
  }

  section.style.display = "block";
  setTimeout(() => section.scrollIntoView({behavior:"smooth", block:"start"}), 80);
}

function bindCategoryNav(){
  document.querySelectorAll(".cat-nav a").forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      const cat = a.dataset.cat;

      if(cat === "all"){
        activeFilter = "all";
        document.querySelectorAll(".cat-nav a").forEach(x => {
          x.classList.toggle("active", x.dataset.cat === "all");
        });
        document.getElementById("productsSection").style.display = "none";
        document.getElementById("tilesGrid").scrollIntoView({behavior:"smooth", block:"start"});
      } else {
        showCategory(cat);
      }
    });
  });
}

async function load(){
  try{
    const res = await fetch(API);
    const all = await res.json();

    let pool = all.filter(p => isLastChance(p) && p.image);
    if(pool.length < 4) pool = all.filter(p => p.image).slice(0, 80);

    pool.sort((a,b) => {
      if(a.in_stock !== b.in_stock) return b.in_stock ? 1 : -1;
      return (a.name||"").localeCompare(b.name||"");
    });

    allPool = pool;
    buildTiles(pool);
  } catch(e){
    document.getElementById("tilesGrid").innerHTML = `<div class="state-msg" style="grid-column:1/-1;">Unable to load. Please try again.</div>`;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  bindCategoryNav();
  load();
  if(typeof ltn_updateCartCount==="function") ltn_updateCartCount();
});

window.addEventListener("pageshow", () => {
  if(typeof ltn_updateCartCount==="function") ltn_updateCartCount();
});
</script>
</body>
</html>
