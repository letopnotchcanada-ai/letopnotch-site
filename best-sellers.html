<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Le Top Notch — Best Sellers</title>
  <meta name="description" content="Discover the best sellers at Le Top Notch." />
  <style>
    :root{
      --bg:#f7f4ef;
      --text:#171717;
      --muted:#6e675f;
      --line:#e7e0d7;
      --banner:#ebe4da;
      --header-bg:rgba(247,244,239,.94);
      --white:#ffffff;
      --max:1500px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Helvetica Neue", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      width:100%;
      height:auto;
    }

    .announcement{
      min-height:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:4px 14px;
      background:var(--banner);
      border-bottom:1px solid var(--line);
      font-size:9px;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:100;
      background:var(--header-bg);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(231,224,215,.75);
    }

    .header-inner{
      width:min(var(--max), calc(100% - 36px));
      margin:0 auto;
      min-height:56px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:18px;
    }

    .brand{
      font-size:13px;
      letter-spacing:.20em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .main-nav{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.13em;
      white-space:nowrap;
    }

    .header-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.13em;
      white-space:nowrap;
    }

    .main-nav a,
    .header-actions a,
    .brand{
      position:relative;
    }

    .main-nav a::after,
    .header-actions a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-3px;
      width:0;
      height:1px;
      background:currentColor;
      transition:width .2s ease;
    }

    .main-nav a:hover::after,
    .header-actions a:hover::after,
    .main-nav a.active::after{
      width:100%;
    }

    .hero{
      position:relative;
      min-height:54vh;
      overflow:hidden;
      border-bottom:1px solid var(--line);
      background:#d7d0c7;
    }

    .hero img{
      width:100%;
      height:54vh;
      object-fit:cover;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.18));
    }

    .hero-content{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      color:#fff;
    }

    .hero-title{
      font-size:clamp(44px, 6vw, 92px);
      line-height:.92;
      font-weight:500;
      letter-spacing:-.05em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .hero-sub{
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .section{
      width:min(1120px, calc(100% - 28px));
      margin:0 auto;
      padding:28px 0 44px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
      margin-bottom:18px;
    }

    .section-title{
      font-size:clamp(28px, 4vw, 54px);
      line-height:.95;
      font-weight:600;
      letter-spacing:-.04em;
      text-transform:uppercase;
    }

    .section-note{
      font-size:10px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .mosaic{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:4px;
    }

    .tile{
      position:relative;
      display:block;
      min-height:300px;
      overflow:hidden;
      background:#ddd4ca;
    }

    .tile.large{
      grid-column:span 2;
      min-height:430px;
    }

    .tile.medium{
      min-height:430px;
    }

    .tile.small{
      min-height:240px;
    }

    .tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .4s ease;
    }

    .tile::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,.22), rgba(0,0,0,.02));
      z-index:1;
    }

    .tile:hover img{
      transform:scale(1.03);
    }

    .tile-label{
      position:absolute;
      left:20px;
      bottom:20px;
      z-index:2;
      color:#fff;
      font-size:18px;
      line-height:1;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-shadow:0 2px 10px rgba(0,0,0,.18);
    }

    .cta{
      text-align:center;
      padding-top:24px;
    }

    .cta a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 26px;
      border:1px solid #111;
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
      background:#111;
      color:#fff;
    }

    .site-footer{
      padding:22px 0 26px;
      background:var(--bg);
    }

    .footer-inner{
      width:min(var(--max), calc(100% - 36px));
      margin:0 auto;
      border-top:1px solid var(--line);
      padding-top:16px;
      text-align:center;
      font-size:11px;
      letter-spacing:.20em;
      text-transform:uppercase;
      color:#4a4a4a;
    }

    @media (max-width: 980px){
      .header-inner{
        grid-template-columns:1fr;
        justify-items:center;
        min-height:auto;
        padding:12px 0;
      }

      .main-nav,
      .header-actions{
        flex-wrap:wrap;
        justify-content:center;
      }

      .mosaic{
        grid-template-columns:1fr 1fr;
      }

      .tile.large,
      .tile.medium{
        grid-column:span 1;
        min-height:320px;
      }

      .hero,
      .hero img{
        min-height:44vh;
        height:44vh;
      }

      .section-head{
        flex-direction:column;
        align-items:flex-start;
      }
    }

    @media (max-width: 640px){
      .section{
        width:min(1120px, calc(100% - 18px));
      }

      .mosaic{
        grid-template-columns:1fr;
      }

      .tile,
      .tile.large,
      .tile.medium,
      .tile.small{
        min-height:280px;
      }
    }
  </style>
</head>
<body>
  <div class="announcement">Complimentary shipping on orders over CA$250</div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">LE TOP NOTCH</a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="shop.html">Shop</a>
        <a href="new-in.html">New In</a>
        <a href="best-sellers.html" class="active">Best Sellers</a>
        <a href="last-chance.html">Last Chance</a>
        <a href="about.html">About</a>
      </nav>

      <div class="header-actions">
        <a href="cart.html" id="cartCountLink">Cart (0)</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <img src="https://via.placeholder.com/1800x1400/e8dfd4/7d746a?text=BEST+SELLERS" alt="Best sellers">
      <div class="hero-content">
        <div>
          <h1 class="hero-title">Best Sellers</h1>
          <div class="hero-sub">Most loved pieces</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Best Seller Categories</h2>
        <div class="section-note">Select a category</div>
      </div>

      <div class="mosaic">
        <a class="tile large" href="products.html?group=best-sellers&category=shop-all">
          <img src="https://via.placeholder.com/1200x1400/e7dfd5/7d746a?text=SHOP+ALL" alt="Shop All">
          <span class="tile-label">Shop All</span>
        </a>

        <a class="tile medium" href="products.html?group=best-sellers&category=tops">
          <img src="https://via.placeholder.com/900x1200/e7dfd5/7d746a?text=TOPS" alt="Tops">
          <span class="tile-label">Tops</span>
        </a>

        <a class="tile medium" href="products.html?group=best-sellers&category=dresses">
          <img src="https://via.placeholder.com/900x1200/e7dfd5/7d746a?text=DRESSES" alt="Dresses">
          <span class="tile-label">Dresses</span>
        </a>

        <a class="tile small" href="products.html?group=best-sellers&category=jackets">
          <img src="https://via.placeholder.com/900x900/e7dfd5/7d746a?text=JACKETS" alt="Jackets">
          <span class="tile-label">Jackets</span>
        </a>

        <a class="tile small" href="products.html?group=best-sellers&category=knitwear">
          <img src="https://via.placeholder.com/900x900/e7dfd5/7d746a?text=KNITWEAR" alt="Knitwear">
          <span class="tile-label">Knitwear</span>
        </a>

        <a class="tile small" href="products.html?group=best-sellers&category=trousers">
          <img src="https://via.placeholder.com/900x900/e7dfd5/7d746a?text=TROUSERS" alt="Trousers">
          <span class="tile-label">Trousers</span>
        </a>

        <a class="tile small" href="products.html?group=best-sellers&category=skirts">
          <img src="https://via.placeholder.com/900x900/e7dfd5/7d746a?text=SKIRTS" alt="Skirts">
          <span class="tile-label">Skirts</span>
        </a>
      </div>

      <div class="cta">
        <a href="products.html?group=best-sellers&category=shop-all">View All Best Sellers</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>LE TOP NOTCH</p>
    </div>
  </footer>

  <script>
    const CART_KEY = "letopnotch_cart";

    function getCart() {
      try {
        const raw = localStorage.getItem(CART_KEY);
        const cart = raw ? JSON.parse(raw) : [];
        return Array.isArray(cart) ? cart : [];
      } catch (error) {
        return [];
      }
    }

    function updateCartCount() {
      const count = getCart().reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
      const link = document.getElementById("cartCountLink");
      if (link) link.textContent = `Cart (${count})`;
    }

    document.addEventListener("DOMContentLoaded", updateCartCount);
    window.addEventListener("pageshow", updateCartCount);
  </script>
</body>
</html>
