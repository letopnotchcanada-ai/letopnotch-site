<!DOCTYPE html>
<html lang="en">
<head>
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — About</title>
  <meta name="description" content="About Le Top Notch..." />
  
  <!-- ✅ CLARITY FIRST - Must load before other scripts -->
  <script src="/clarity.js"></script>
  
  <script src="/global.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');

    /* HERO */
    .hero{position:relative;height:60vh;overflow:hidden;background:#d9d2c8;}
    .hero img{width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block;}
    .hero-over{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(0,0,0,.04),rgba(0,0,0,.28));}
    .hero-sub{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:12px;}
    .hero-h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(52px,8vw,120px);font-weight:400;line-height:.85;letter-spacing:-.02em;text-transform:uppercase;color:#fff;text-align:center;}

    /* PAGE */
    .page{width:min(1600px,calc(100% - 40px));margin:0 auto;}

    /* FILTER BAR */
    .filter-bar{display:flex;align-items:center;gap:8px;padding:36px 0 28px;flex-wrap:wrap;border-bottom:1px solid #e7e0d7;margin-bottom:36px;}
    .filter-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#9a9186;margin-right:8px;}
    .f-btn{height:34px;padding:0 18px;border:1px solid #e7e0d7;background:transparent;font-size:9px;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;font-family:inherit;color:#6e675f;transition:all .2s;}
    .f-btn:hover,.f-btn.active{background:#171717;color:#fff;border-color:#171717;}

    /* PRODUCT COUNT */
    .prod-count{font-size:10px;color:#9a9186;letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;}

    /* GRID */
    .prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px 16px;padding-bottom:80px;}
    .product-card{display:block;position:relative;}
    .product-image-wrap{aspect-ratio:4/5;overflow:hidden;background:#f4efe8;margin-bottom:14px;position:relative;padding:22px;display:flex;align-items:center;justify-content:center;border:1px solid #efe8de;}
    .product-image-wrap img{width:calc(100% - 44px);height:calc(100% - 44px);position:absolute;inset:22px;object-fit:contain;object-position:center center;display:block;transition:transform .5s ease;background:transparent;}
    .product-image-wrap .img-secondary{position:absolute;inset:22px;width:calc(100% - 44px);height:calc(100% - 44px);opacity:0;transition:opacity .4s ease;}
    .product-card.has-hover:hover .img-primary{opacity:0;}
    .product-card.has-hover:hover .img-secondary{opacity:1;}
    .product-card:hover .product-image-wrap img{transform:scale(1.03);}
    .prod-badge{position:absolute;top:12px;left:12px;background:#171717;color:#fff;font-size:8px;letter-spacing:.14em;text-transform:uppercase;padding:4px 8px;z-index:2;}
    .prod-info{padding:12px 2px 0;}
    .prod-name{font-size:11px;text-transform:uppercase;letter-spacing:.065em;font-weight:500;margin-bottom:4px;line-height:1.3;}
    .prod-color{font-size:11px;color:#6e675f;margin-bottom:3px;line-height:1.35;}
    .prod-price{font-size:11px;color:#6e675f;line-height:1.35;}

    /* QUICK SHOP */
    .qs-panel{position:absolute;left:0;right:0;bottom:0;background:rgba(247,244,239,.98);backdrop-filter:blur(6px);border-top:1px solid #e7e0d7;padding:14px 14px 12px;z-index:4;transform:translateY(102%);transition:transform .28s cubic-bezier(.22,.61,.36,1);pointer-events:none;}
    .product-card:hover .qs-panel{transform:translateY(0);pointer-events:auto;}
    .qs-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;line-height:1.3;}
    .qs-price{font-size:11px;color:#6e675f;margin-bottom:8px;}
    .qs-colors{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#6e675f;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .qs-colors strong{color:#171717;}
    .qs-sizes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
    .qs-sz{min-width:32px;height:28px;border:1px solid #e7e0d7;background:#fff;font-size:9px;letter-spacing:.06em;padding:0 6px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
    .qs-sz:hover,.qs-sz.selected{background:#171717;color:#fff;border-color:#171717;}
    .qs-sz.sold-out{color:#c8c0b8;cursor:not-allowed;text-decoration:line-through;}
    .qs-btn{width:100%;min-height:36px;background:#171717;color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.16em;transition:opacity .2s;display:flex;align-items:center;justify-content:center;padding:0 14px;}
    .qs-btn:hover{opacity:.84;}
    .qs-btn:disabled{opacity:.45;cursor:not-allowed;}
    .wl-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:5;opacity:0;transition:opacity .2s;color:#171717;border:1px solid rgba(231,224,215,.8);}
    .product-card:hover .wl-btn{opacity:1;}
    .wl-btn.active{color:#c0392b;opacity:1;}
    #ltn-qs-toast{position:fixed;bottom:28px;right:28px;background:#171717;color:#fff;padding:14px 20px;font-size:10px;text-transform:uppercase;letter-spacing:.14em;z-index:9000;transform:translateY(20px);opacity:0;transition:all .28s ease;pointer-events:none;}
    #ltn-qs-toast.on{transform:translateY(0);opacity:1;}

    .empty{grid-column:1/-1;text-align:center;padding:80px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9a9186;}
    .loading{grid-column:1/-1;text-align:center;padding:80px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9a9186;}

    @media(max-width:1100px){.prod-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:700px){
      .prod-grid{grid-template-columns:repeat(2,1fr);gap:16px 10px;}
      .hero{height:45vh;}
      .hero-h1{font-size:clamp(42px,12vw,80px);}
      .filter-bar{padding:24px 0 20px;gap:6px;}
      .f-btn{height:38px;font-size:10px;padding:0 14px;}
      .prod-name{font-size:12px;}
      .prod-color,.prod-price{font-size:12px;}
      .prod-count{font-size:11px;}
      .product-image-wrap{padding:14px;}
      .product-image-wrap img,.product-image-wrap .img-secondary{inset:14px;width:calc(100% - 28px);height:calc(100% - 28px);}
    }
    @media(max-width:640px){
      .qs-panel{display:none;}
      .wl-btn{display:none;}
    }
    @media(max-width:400px){
      .prod-grid{grid-template-columns:repeat(2,1fr);gap:12px 8px;}
    }
  </style>
</head>
<body>
<div id="ltn-header"></div>

<section class="hero">
  <img src="https://letopnotch-site.pages.dev/images/home-tile-best-sellers.webp" alt="Best Sellers">
  <div class="hero-over">
    <div class="hero-sub">Le Top Notch — Most Loved</div>
    <h1 class="hero-h1">Best<br>Sellers</h1>
  </div>
</section>

<div class="page">
  <div class="filter-bar">
    <span class="filter-label">Shop by</span>
    <button class="f-btn active" data-cat="all">All</button>
    <button class="f-btn" data-cat="tops">Tops</button>
    <button class="f-btn" data-cat="dresses">Dresses</button>
    <button class="f-btn" data-cat="knitwear">Knitwear</button>
    <button class="f-btn" data-cat="jackets">Jackets & Coats</button>
    <button class="f-btn" data-cat="trousers">Trousers</button>
    <button class="f-btn" data-cat="skirts">Skirts</button>
  </div>

  <div class="prod-count" id="prodCount"></div>
  <div class="prod-grid shop-grid" id="prodGrid"><div class="loading">Loading…</div></div>
</div>

<div id="ltn-footer"></div>

<script>
const API = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
const CACHE_KEY  = "ltn_bs_v2";
const CACHE_WEEK = 7 * 24 * 60 * 60 * 1000;

let allProducts = [];
let activecat = "all";

function fmt(v){const n=Number(v);return(!isFinite(n)||n<=0)?"":"CAD $"+n.toFixed(2).replace(".00","");}
function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function sl(p){return encodeURIComponent(p.slug||p.id||"");}

function normCat(p){
  const r=String(p.category||"").trim().toLowerCase().replace(/[^a-z]/g,"");
  if(r.includes("dress")) return "dresses";
  if(r.includes("jacket")||r.includes("coat")||r.includes("blazer")) return "jackets";
  if(r.includes("trouser")||r.includes("pant")) return "trousers";
  if(r.includes("skirt")) return "skirts";
  if(r.includes("knit")||r.includes("sweater")) return "knitwear";
  const n=(p.name||"").toLowerCase();
  if(n.includes("dress")) return "dresses";
  if(n.includes("jacket")||n.includes("coat")) return "jackets";
  if(n.includes("trouser")) return "trousers";
  if(n.includes("skirt")) return "skirts";
  if(n.includes("knit")||n.includes("sweater")) return "knitwear";
  return "tops";
}

function isBestSeller(p){
  return p.best_seller===true||p.best_seller===1||p.best_seller==="true"||
         p.best_seller==="checked"||p.bestSeller===true||p["Best Seller"]===true;
}

function getCachedOrder(){
  try{
    const raw=localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const {ts,order}=JSON.parse(raw);
    if(Date.now()-ts>CACHE_WEEK) return null;
    return order;
  }catch(e){return null;}
}

function saveOrder(products){
  try{
    localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),order:products.map(p=>p.slug||p.id||p.name)}));
  }catch(e){}
}

function render(){
  const grid = document.getElementById("prodGrid");
  const count = document.getElementById("prodCount");
  const filtered = activecat==="all" ? allProducts : allProducts.filter(p=>normCat(p)===activecat);

  count.textContent = filtered.length + " piece" + (filtered.length!==1?"s":"");

  if(!filtered.length){
    grid.innerHTML = `<div class="empty">No best sellers in this category yet.</div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => {
    const color = Array.isArray(p.colors)&&p.colors.length?p.colors[0]:(p.color||"");
    const allColors = Array.isArray(p.colors) ? p.colors : (p.color ? [p.color] : []);
    const sec = p.gallery_2 || p.gallery_3 || (Array.isArray(p.gallery_1)&&p.gallery_1[0]?.url) || "";
    const sizes = Array.isArray(p.sizes) && p.sizes.length ? p.sizes : [];
    const hasHover = sec ? " has-hover" : "";
    const inStock = p.in_stock!==false;
    const loadAttr = i < 8 ? 'eager' : 'lazy';
    const fetchPri = i < 2 ? ' fetchpriority="high"' : '';
    
    let sizeHTML = "";
    if(sizes.length > 0){
      sizeHTML = sizes.map(s => {
        const sold = s.stock === 0 || s.in_stock === false;
        const cls = sold ? "qs-sz sold-out" : "qs-sz";
        return `<button class="${cls}" data-size="${s.size||s}" ${sold?"disabled":""}>${s.size||s}</button>`;
      }).join("");
    }
    
    return `<a class="product-card${hasHover}" href="/product.html?slug=${sl(p)}">
      <div class="product-image-wrap">
        <img class="img-primary" src="${p.image}" alt="${tc(p.name)}" loading="${loadAttr}"${fetchPri} decoding="async">
        ${sec?`<img class="img-secondary" src="${sec}" alt="${tc(p.name)}" loading="lazy">`:""}
        ${!inStock?`<div class="prod-badge">Out of Stock</div>`:""}
        <button class="wl-btn" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('active')">♡</button>
        <div class="qs-panel">
          <div class="qs-name">${tc(p.name)}</div>
          <div class="qs-price">${fmt(p.price)}</div>
          ${allColors.length > 0 ? `<div class="qs-colors">Color: <strong>${tc(allColors[0])}</strong></div>` : ""}
          ${sizeHTML ? `<div class="qs-sizes">${sizeHTML}</div>` : ""}
          <button class="qs-btn" data-slug="${sl(p)}" ${sizes.length===0?`data-size="One Size"`:""}>
            <span>Quick Shop</span>
          </button>
        </div>
      </div>
      <div class="prod-info">
        <div class="prod-name">${tc(p.name)}</div>
        ${color?`<div class="prod-color">${tc(color)}</div>`:""}
        <div class="prod-price">${fmt(p.price)}</div>
      </div>
    </a>`;
  }).join("");
  
  if(typeof ltn_initQuickShop === "function") {
    setTimeout(() => ltn_initQuickShop(), 100);
  }
}

// Filter buttons
document.querySelectorAll(".f-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activecat = btn.dataset.cat;
    render();
  });
});

async function load(){
  const res = await fetch(API);
  const all = await res.json();

  let pool = all.filter(p=>isBestSeller(p)&&p.image);
  if(pool.length<4) pool = all.filter(p=>p.image);

  const savedOrder = getCachedOrder();
  if(savedOrder){
    const map={};
    pool.forEach(p=>map[p.slug||p.id||p.name]=p);
    const ordered=[];
    for(const key of savedOrder){if(map[key]){ordered.push(map[key]);delete map[key];}}
    for(const p of Object.values(map)) ordered.push(p);
    allProducts=ordered;
  } else {
    pool.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    allProducts=pool;
    saveOrder(pool);
  }

  render();
}

document.addEventListener("DOMContentLoaded",load);
window.addEventListener("pageshow",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();});
</script>
</body>
</html>
