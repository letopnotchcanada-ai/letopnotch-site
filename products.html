<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — Le Top Notch</title>
  <link rel="preconnect" href="https://letopnotch-api-v2.letopnotchcanada.workers.dev">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="/global.js" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}

    .page-head{padding:56px 0 40px;text-align:center;border-bottom:1px solid #e7e0d7;}
    .page-tag{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#9a9186;margin-bottom:14px;}
    .page-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(52px,8vw,110px);font-weight:400;line-height:.85;letter-spacing:-.02em;text-transform:uppercase;color:#171717;}

    .page-wrap{width:min(1600px,calc(100% - 40px));margin:0 auto;padding:48px 0 80px;}

    .prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px 16px;}
    .prod-card{display:block;}
    .prod-img{aspect-ratio:2/3;overflow:hidden;background:#f5f2ee;margin-bottom:11px;position:relative;}
    .prod-img img{width:100%;height:100%;object-fit:contain;object-position:center center;display:block;transition:opacity .4s ease,transform .5s ease;}
    .prod-img .img-secondary{position:absolute;inset:0;opacity:0;transition:opacity .4s ease;}
    .prod-card:hover .img-secondary{opacity:1;}
    .prod-name{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:3px;}
    .prod-color{font-size:11px;color:#6e675f;margin-bottom:2px;}
    .prod-price{font-size:11px;color:#6e675f;}

    .sk-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:28px 16px;}
    .sk-card .prod-img{background:linear-gradient(90deg,#ede8e0 25%,#e2dbd3 50%,#ede8e0 75%);background-size:400% 100%;animation:sh 1.8s ease infinite;}
    .sk-line{height:10px;border-radius:2px;margin-bottom:6px;background:linear-gradient(90deg,#ede8e0 25%,#e2dbd3 50%,#ede8e0 75%);background-size:400% 100%;animation:sh 1.8s ease infinite;}
    @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

    .empty{text-align:center;padding:80px 20px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9a9186;}

    @media(max-width:1100px){
      .prod-grid{grid-template-columns:repeat(3,1fr);}
      .sk-wrap{grid-template-columns:repeat(3,1fr);}
    }
    @media(max-width:700px){
      .prod-grid{grid-template-columns:repeat(2,1fr);gap:16px 10px;}
      .sk-wrap{grid-template-columns:repeat(2,1fr);gap:16px 10px;}
      .page-head{padding:36px 0 28px;}
      .page-wrap{padding:28px 0 60px;}
    }
    @media(max-width:400px){
      .prod-grid{gap:12px 6px;}
      .page-wrap{width:calc(100% - 20px);}
    }
  </style>
</head>
<body>
<div id="ltn-header"></div>

<div class="page-head">
  <div class="page-tag" id="pageTag">Shop All</div>
  <h1 class="page-title" id="pageTitle">Products</h1>
</div>

<div class="page-wrap">
  <div id="content">
    <div class="sk-wrap" id="skeleton">
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:65%"></div><div class="sk-line" style="width:40%"></div></div>
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:55%"></div><div class="sk-line" style="width:35%"></div></div>
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:42%"></div></div>
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:60%"></div><div class="sk-line" style="width:38%"></div></div>
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:50%"></div><div class="sk-line" style="width:36%"></div></div>
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:68%"></div><div class="sk-line" style="width:44%"></div></div>
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:58%"></div><div class="sk-line" style="width:40%"></div></div>
      <div class="sk-card prod-card"><div class="prod-img"></div><div class="sk-line" style="width:62%"></div><div class="sk-line" style="width:37%"></div></div>
    </div>
  </div>
</div>

<div id="ltn-footer"></div>

<script>
const API = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
const params = new URLSearchParams(window.location.search);
const group = params.get("group") || "shop-all";
const category = params.get("category") || "all";

function fmt(v){const n=Number(v);return(!isFinite(n)||n<=0)?"":"CAD $"+n.toFixed(2).replace(".00","");}
function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function sl(p){return encodeURIComponent(p.slug||"");}

function normCat(p){
  const r=String(p.category||"").trim().toLowerCase().replace(/[^a-z]/g,"");
  if(r.includes("dress")) return "dresses";
  if(r.includes("jacket")||r.includes("coat")||r.includes("blazer")) return "jackets";
  if(r.includes("trouser")||r.includes("pant")) return "trousers";
  if(r.includes("skirt")) return "skirts";
  if(r.includes("knit")||r.includes("sweater")) return "knitwear";
  const n=(p.name||"").toLowerCase();
  if(n.includes("dress")) return "dresses";
  if(n.includes("jacket")||n.includes("coat")) return "jackets";
  if(n.includes("trouser")) return "trousers";
  if(n.includes("skirt")) return "skirts";
  if(n.includes("knit")||n.includes("sweater")) return "knitwear";
  return "tops";
}

function cardHTML(p){
  const color = Array.isArray(p.colors)&&p.colors.length ? p.colors[0] : (p.color||"");
  const sec = p.gallery_2 || p.gallery_3 || (Array.isArray(p.gallery_1)&&p.gallery_1[0]?.url) || "";
  return `<a class="prod-card" href="/product.html?slug=${sl(p)}">
    <div class="prod-img">
      <img src="${p.image}" alt="${tc(p.name)}" loading="lazy">
      ${sec?`<img class="img-secondary" src="${sec}" alt="${tc(p.name)}" loading="lazy">`:""}
    </div>
    <div class="prod-name">${tc(p.name)}</div>
    ${color?`<div class="prod-color">${tc(color)}</div>`:""}
    <div class="prod-price">${fmt(p.price)}</div>
  </a>`;
}

async function load(){
  try{
    const res = await fetch(API);
    const all = await res.json();
    
    let filtered = all.filter(p=>p.image&&p.in_stock!==false);
    
    if(category !== "all"){
      filtered = filtered.filter(p=>normCat(p)===category);
    }
    
    // Update page title
    const catLabel = {
      tops:"Tops",
      dresses:"Dresses",
      knitwear:"Knitwear",
      jackets:"Jackets & Coats",
      trousers:"Trousers",
      skirts:"Skirts"
    }[category] || "All Products";
    
    document.getElementById("pageTitle").textContent = catLabel;
    document.getElementById("pageTag").textContent = group === "new-in" ? "New Arrivals" : "Shop All";
    
    const content = document.getElementById("content");
    
    if(!filtered.length){
      content.innerHTML = `<div class="empty">No products found in this category.</div>`;
      return;
    }
    
    filtered.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    
    content.innerHTML = `<div class="prod-grid">${filtered.map(cardHTML).join("")}</div>`;
  } catch(e){
    document.getElementById("content").innerHTML = `<div class="empty">Unable to load products. Please refresh.</div>`;
  }
}

document.addEventListener("DOMContentLoaded", load);
window.addEventListener("pageshow", ()=>{ if(typeof ltn_updateCartCount==="function") ltn_updateCartCount(); });
</script>
</body>
</html>
