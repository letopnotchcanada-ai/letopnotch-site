<script>
const API_URL="https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
const CART_KEY="letopnotch_cart";
const BATCH_SIZE=16;
let allProducts=[],filteredProducts=[],displayedProducts=[],isLoadingMore=false,allLoaded=false;

function formatPrice(v){const n=Number(v);if(!Number.isFinite(n)||n<=0)return"CAD —";return"CAD $"+n.toFixed(2).replace(".00","")}
function titleCase(v){return String(v||"").replace(/[-_]/g," ").replace(/\s+/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase())}
function normalizeSlug(v){return String(v||"").trim().toLowerCase()}
function normalizeCategory(item){const raw=String(item.category||"").trim();if(raw){const lo=raw.toLowerCase().replace(/[^a-z]/g,"");if(lo==="tops"||lo==="top"||lo==="shirts"||lo==="blouses")return"tops";if(lo==="dresses"||lo==="dress")return"dresses";if(lo==="knitwear"||lo==="knit"||lo==="sweaters"||lo==="sweater")return"knitwear";if(lo.includes("jacket")||lo.includes("coat")||lo.includes("blazer"))return"jackets";if(lo==="trousers"||lo==="trouser"||lo.includes("pant"))return"trousers";if(lo==="skirts"||lo==="skirt")return"skirts"}const text=(String(item.name||"")+" "+String(item.slug||"")).toLowerCase();if(text.includes("dress"))return"dresses";if(text.includes("jacket")||text.includes("coat")||text.includes("blazer"))return"jackets";if(text.includes("pant")||text.includes("trouser"))return"trousers";if(text.includes("skirt"))return"skirts";if(text.includes("knit")||text.includes("sweater")||text.includes("cardigan"))return"knitwear";return"tops"}
function normalizeSizes(v){if(Array.isArray(v))return[...new Set(v.map(x=>String(x||"").trim()).filter(Boolean))];return[...new Set(String(v||"").split(",").map(x=>x.trim()).filter(Boolean))]}
function normalizeColors(v){if(Array.isArray(v))return v.map(x=>String(x||"").trim()).filter(Boolean);return String(v||"").split(",").map(x=>x.trim()).filter(Boolean)}
function parseSizeStock(val){const map={};if(!val)return map;String(val).split(",").forEach(part=>{const[size,qty]=part.trim().split(":");if(size)map[size.trim()]=Number(qty)||0});return map}

function normalizeProducts(data){
  return(Array.isArray(data)?data:[]).map(item=>{
    let g1="";
    if(Array.isArray(item.gallery_1)&&item.gallery_1.length>0){g1=item.gallery_1[0].url||""}else if(typeof item.gallery_1==="string"){g1=item.gallery_1||""}
    const g2=item.gallery_2||"";
    const g3=item.gallery_3||"";
    const secondImage=g1||g2||g3||item.image||"";
    return{
      slug:item.slug||"",
      name:titleCase(item.name||item.slug||"Product"),
      price:Number(item.price)||0,
      image:item.image||"",
      secondImage,
      category:normalizeCategory(item),
      rawCategory:titleCase(item.category||normalizeCategory(item)),
      new_in:Boolean(item.new_in),
      best_seller:Boolean(item.best_seller),
      last_chance:Boolean(item.last_chance),
      color:String(item.color||"").trim(),
      colors:normalizeColors(item.colors),
      in_stock:Boolean(item.in_stock),
      sizes:normalizeSizes(item.sizes),
      size_stock:item.size_stock||"",
      aspectRatio:item.aspectRatio||1.25,
      colorBrightness:item.colorBrightness||150
    }
  }).filter(item=>item.slug&&item.image&&item.name)
}

function getCart(){try{const raw=localStorage.getItem(CART_KEY);const cart=raw?JSON.parse(raw):[];return Array.isArray(cart)?cart:[]}catch{return[]}}
function saveCart(c){localStorage.setItem(CART_KEY,JSON.stringify(c))}
function addToCart(item){const cart=getCart();const id=item.slug+"-"+(item.size||"one-size")+"-"+(item.color||"");const idx=cart.findIndex(x=>x.id===id);if(idx>=0)cart[idx].quantity+=1;else cart.push({...item,id,quantity:1});saveCart(cart);if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();showToast("Added to basket")}
function showToast(msg){const t=document.getElementById("ltn-qs-toast");t.textContent=msg;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),2200)}
function getParams(){const p=new URLSearchParams(window.location.search);return{group:normalizeSlug(p.get("group")||"shop-all"),category:normalizeSlug(p.get("category")||"shop-all"),q:(p.get("q")||"").trim().toLowerCase()}}
function groupLabel(g){if(g==="new-in")return"New In";if(g==="best-sellers")return"Best Sellers";if(g==="last-chance")return"Last Chance";return"Shop All"}
function categoryLabel(c){if(!c||c==="shop-all")return"All Categories";return titleCase(c)}
function updatePageLabels(group,category,q){let title=category&&category!=="shop-all"?`${groupLabel(group)} — ${categoryLabel(category)}`:groupLabel(group);if(q)title=`Search: "${q}"`;document.title="Le Top Notch — "+title;document.getElementById("pageTitle").textContent=title;document.getElementById("breadcrumbLabel").textContent=title;document.getElementById("groupPill").textContent=groupLabel(group);document.getElementById("categoryPill").textContent=categoryLabel(category)}
function applyGroupFilter(products,group){if(group==="new-in")return products.filter(p=>p.new_in);if(group==="best-sellers")return products.filter(p=>p.best_seller);if(group==="last-chance")return products.filter(p=>p.last_chance);return products.filter(p=>!p.last_chance||p.new_in||p.best_seller)}
function applyCategoryFilter(products,category){if(!category||category==="shop-all")return products;const cat=normalizeSlug(category);const matched=products.filter(p=>p.category===cat);return matched.length>0?matched:products}
function applySizeFilter(products,size){if(!size)return products;return products.filter(p=>p.sizes.includes(size))}
function applyColorFilter(products,color){if(!color)return products;return products.filter(p=>normalizeSlug(p.color)===normalizeSlug(color))}
function applyStockFilter(products,stock){if(stock==="in-stock")return products.filter(p=>p.in_stock);if(stock==="out-of-stock")return products.filter(p=>!p.in_stock);return products}

function getUserPrefs(){
  try{
    const p=localStorage.getItem("ltn_user_prefs");
    return p?JSON.parse(p):{viewedCategories:{},viewedProducts:[],lastVisit:Date.now()}
  }catch{
    return{viewedCategories:{},viewedProducts:[],lastVisit:Date.now()}
  }
}

function saveUserPrefs(prefs){
  localStorage.setItem("ltn_user_prefs",JSON.stringify(prefs))
}

function trackCategoryView(category){
  const prefs=getUserPrefs();
  if(!prefs.viewedCategories)prefs.viewedCategories={};
  prefs.viewedCategories[category]=(prefs.viewedCategories[category]||0)+1;
  prefs.lastVisit=Date.now();
  saveUserPrefs(prefs)
}

function apply4LayerSort(products){
  const prefs=getUserPrefs();
  const preferredCategory=Object.keys(prefs.viewedCategories||{}).sort((a,b)=>(prefs.viewedCategories[b]||0)-(prefs.viewedCategories[a]||0))[0];

  return[...products].sort((a,b)=>{
    if(a.new_in!==b.new_in)return a.new_in?-1:1;

    const aRatio=a.aspectRatio||1.25;
    const bRatio=b.aspectRatio||1.25;
    const aTall=aRatio>1.35;
    const bTall=bRatio>1.35;
    const aSquare=aRatio>=1.15&&aRatio<=1.35;
    const bSquare=bRatio>=1.15&&bRatio<=1.35;

    if(aTall!==bTall)return aTall?-1:1;
    if(aSquare!==bSquare)return aSquare?-1:1;

    const aBright=a.colorBrightness||150;
    const bBright=b.colorBrightness||150;
    if(Math.abs(aBright-bBright)>30)return bBright-aBright;

    if(preferredCategory){
      const aPreferred=a.category===preferredCategory;
      const bPreferred=b.category===preferredCategory;
      if(aPreferred!==bPreferred)return aPreferred?-1:1
    }

    if(a.in_stock!==b.in_stock)return a.in_stock?-1:1;

    return a.name.localeCompare(b.name)
  })
}

function applySort(products,sort){
  const arr=[...products];
  if(sort==="price-low-high")return arr.sort((a,b)=>a.price-b.price);
  if(sort==="price-high-low")return arr.sort((a,b)=>b.price-a.price);
  if(sort==="in-stock-first")return arr.sort((a,b)=>Number(b.in_stock)-Number(a.in_stock));
  if(sort==="name-a-z")return arr.sort((a,b)=>a.name.localeCompare(b.name));
  if(sort==="name-z-a")return arr.sort((a,b)=>b.name.localeCompare(a.name));
  return apply4LayerSort(arr)
}

function renderFilterOptions(products){
  const sf=document.getElementById("sizeFilter");
  const cf=document.getElementById("colorFilter");
  const cs=sf.value;
  const cc=cf.value;
  const sizes=[...new Set(products.flatMap(p=>p.sizes))].sort((a,b)=>{const an=Number(a),bn=Number(b);if(Number.isFinite(an)&&Number.isFinite(bn))return an-bn;return String(a).localeCompare(String(b))});
  const colors=[...new Set(products.map(p=>p.color).filter(Boolean))].sort();
  sf.innerHTML='<option value="">All Sizes</option>'+sizes.map(s=>`<option value="${s}">${s}</option>`).join("");
  cf.innerHTML='<option value="">All Colors</option>'+colors.map(c=>`<option value="${c}">${titleCase(c)}</option>`).join("");
  sf.value=sizes.includes(cs)?cs:"";
  cf.value=colors.includes(cc)?cc:""
}

function buildQsPanel(p){
  const sizeStockMap=parseSizeStock(p.size_stock);
  const colorStr=p.colors.length?`<strong>${titleCase(p.colors[0])}</strong>${p.colors.slice(1).map(c=>` | ${titleCase(c)}`).join("")}`:(p.color?`<strong>${titleCase(p.color)}</strong>`:"");
  const sizesHtml=p.sizes.map(s=>{const qty=Object.keys(sizeStockMap).length?(sizeStockMap[s]||0):(p.in_stock?1:0);const soldOut=qty===0;return`<button class="qs-sz${soldOut?" sold-out":""}" data-size="${s}" data-slug="${p.slug}" ${soldOut?"disabled":""}>${s}</button>`}).join("");
  const noSizes=p.sizes.length===0;
  return`<div class="qs-panel" onclick="event.preventDefault()"><div class="qs-name">${p.name}</div><div class="qs-price">${formatPrice(p.price)}</div>${colorStr?`<div class="qs-colors">Available in ${colorStr}</div>`:""}${!noSizes?`<div class="qs-sizes">${sizesHtml}</div>`:""}<button class="qs-btn" id="qs-add-${p.slug}" ${!p.in_stock?"disabled":""} data-slug="${p.slug}"><span>${p.in_stock?"Quick Shop":"Out of Stock"}</span></button></div>`
}

function renderBatch(products,append=false){
  const grid=document.getElementById("shopGrid");
  const html=products.map((p,i)=>{
    const secondaryImg=p.secondImage||p.image;
    const hasHover=secondaryImg&&secondaryImg!==p.image;
    const globalIndex=displayedProducts.length-products.length+i;
    const loadAttr=globalIndex<8?"eager":"lazy";
    const fetchPri=globalIndex<2?' fetchpriority="high"':"";
    return`<a class="product-card${hasHover?" has-hover":""}" href="/product.html?slug=${encodeURIComponent(p.slug)}" data-slug="${p.slug}"><div class="product-image-wrap"><div class="product-image-stage"></div><img class="img-primary" src="${p.image}" alt="${p.name}" width="700" height="875" loading="${loadAttr}"${fetchPri} decoding="async"><img class="img-secondary" src="${secondaryImg}" alt="${p.name}" width="700" height="875" loading="lazy" decoding="async"><button class="wl-btn" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('active');" aria-label="Wishlist">♡</button>${buildQsPanel(p)}</div><div class="prod-info"><div class="prod-name">${p.name}</div>${p.color?`<div class="prod-color">${titleCase(p.color)}</div>`:""}<div class="prod-price">${formatPrice(p.price)}</div></div></a>`
  }).join("");
  
  if(append){
    grid.insertAdjacentHTML('beforeend',html)
  }else{
    grid.innerHTML=html
  }
  
  attachEventListeners()
}

function attachEventListeners(){
  const grid=document.getElementById("shopGrid");
  grid.querySelectorAll(".qs-sz:not(.sold-out)").forEach(btn=>{btn.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();const panel=btn.closest(".qs-panel");panel.querySelectorAll(".qs-sz").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");const addBtn=panel.querySelector(".qs-btn");if(addBtn)addBtn.dataset.size=btn.dataset.size})});
  grid.querySelectorAll(".qs-btn").forEach(btn=>{btn.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();const slug=btn.dataset.slug;const size=btn.dataset.size||"One Size";const p=allProducts.find(x=>x.slug===slug);if(!p||!p.in_stock)return;if(p.sizes.length>0&&!btn.dataset.size){const panel=btn.closest(".qs-panel");panel.querySelectorAll(".qs-sz").forEach(s=>{s.style.borderColor="#c0392b"});setTimeout(()=>panel.querySelectorAll(".qs-sz").forEach(s=>{s.style.borderColor=""}),800);return}addToCart({slug:p.slug,name:p.name,price:p.price,image:p.image,size:size,color:p.color||(p.colors[0]||""),category:p.rawCategory,in_stock:p.in_stock,currency:"CAD"});const label=btn.querySelector("span");const orig=label.textContent;label.textContent="Added ✓";btn.disabled=true;setTimeout(()=>{label.textContent=orig;btn.disabled=false},1800)})})
}

function showLoadingIndicator(){
  const grid=document.getElementById("shopGrid");
  let loader=document.getElementById("loader-indicator");
  if(!loader){
    loader=document.createElement("div");
    loader.id="loader-indicator";
    loader.style.cssText="grid-column:1/-1;text-align:center;padding:40px;font-size:12px;color:#6e675f";
    loader.textContent="Loading more...";
    grid.appendChild(loader)
  }
}

function hideLoadingIndicator(){
  const loader=document.getElementById("loader-indicator");
  if(loader)loader.remove()
}

function loadMoreProducts(){
  if(isLoadingMore||allLoaded)return;
  
  const remaining=filteredProducts.slice(displayedProducts.length);
  if(remaining.length===0){
    allLoaded=true;
    hideLoadingIndicator();
    return
  }
  
  isLoadingMore=true;
  showLoadingIndicator();
  
  const nextBatch=remaining.slice(0,BATCH_SIZE);
  displayedProducts.push(...nextBatch);
  
  setTimeout(()=>{
    renderBatch(nextBatch,true);
    hideLoadingIndicator();
    isLoadingMore=false;
    
    if(displayedProducts.length<filteredProducts.length){
      setTimeout(()=>loadMoreProducts(),100)
    }else{
      allLoaded=true
    }
  },100)
}

function setupInfiniteScroll(){
  let ticking=false;
  
  window.addEventListener("scroll",()=>{
    if(ticking)return;
    
    ticking=true;
    requestAnimationFrame(()=>{
      const scrollPosition=window.innerHeight+window.scrollY;
      const threshold=document.documentElement.scrollHeight-800;
      
      if(scrollPosition>=threshold&&!allLoaded&&!isLoadingMore){
        loadMoreProducts()
      }
      
      ticking=false
    })
  })
}

async function refreshView(){
  const{group,category,q}=getParams();
  let products=applyGroupFilter(allProducts,group);
  products=applyCategoryFilter(products,category);
  if(category&&category!=="shop-all")trackCategoryView(category);
  renderFilterOptions(products);
  products=applySizeFilter(products,document.getElementById("sizeFilter").value);
  products=applyColorFilter(products,document.getElementById("colorFilter").value);
  products=applyStockFilter(products,document.getElementById("stockFilter").value);
  if(q){products=products.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||p.rawCategory.toLowerCase().includes(q))}
  products=applySort(products,document.getElementById("sortSelect").value);
  filteredProducts=products;
  displayedProducts=[];
  allLoaded=false;
  updatePageLabels(group,category,q);
  
  const grid=document.getElementById("shopGrid");
  const empty=document.getElementById("emptyState");
  const count=document.getElementById("resultsCount");
  count.textContent=products.length+" products";
  
  if(!products.length){
    grid.innerHTML="";
    empty.style.display="block";
    return
  }
  
  empty.style.display="none";
  
  const firstBatch=filteredProducts.slice(0,BATCH_SIZE);
  displayedProducts.push(...firstBatch);
  renderBatch(firstBatch,false);
  
  setTimeout(()=>loadMoreProducts(),500)
}

async function loadProducts(){
  try{
    const res=await fetch(API_URL);
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    allProducts=normalizeProducts(data);
    document.getElementById("loadingState").style.display="none";
    refreshView();
    setupInfiniteScroll()
  }catch(e){
    document.getElementById("loadingState").textContent="Unable to load collection — "+e.message
  }
}

document.getElementById("sizeFilter").addEventListener("change",refreshView);
document.getElementById("colorFilter").addEventListener("change",refreshView);
document.getElementById("stockFilter").addEventListener("change",refreshView);
document.getElementById("sortSelect").addEventListener("change",refreshView);
document.addEventListener("DOMContentLoaded",()=>{loadProducts()});
window.addEventListener("pageshow",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount()});
</script>
