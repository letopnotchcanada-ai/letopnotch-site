<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Le Top Notch</title>
  <meta name="description" content="Browse our curated collection of timeless pieces.">
  <link rel="stylesheet" href="/mobile-fixes.css">
  <script src="/global.js"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --text: #171717;
      --muted: #6e675f;
      --line: #e7e0d7;
      --white: #ffffff;
      --max: 1600px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ───────────────────────────────────────────────────────────────
       Hero Section
    ─────────────────────────────────────────────────────────────── */
    .products-hero {
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #d9d2c8;
      border-bottom: 1px solid var(--line);
      padding: 24px;
    }

    .products-hero-content {
      max-width: 600px;
    }

    .products-hero-title {
      font-size: clamp(32px, 5vw, 72px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    .products-hero-subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ───────────────────────────────────────────────────────────────
       Filters (optional for future)
    ─────────────────────────────────────────────────────────────── */
    .products-filters {
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }

    .products-filters-inner {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .products-count {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .products-sort {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .products-sort label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .products-sort select {
      min-height: 34px;
      border: 1px solid var(--line);
      background: var(--white);
      padding: 0 28px 0 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23171717' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
    }

    /* ───────────────────────────────────────────────────────────────
       Product Grid
    ─────────────────────────────────────────────────────────────── */
    .products-main {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--line);
    }

    .product-card {
      position: relative;
      display: block;
      background: var(--white);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease;
    }

    .product-card:hover {
      /* Subtle lift */
    }

    .product-image-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 140%; /* 140% aspect ratio = taller than square */
      background: #d9d2c8;
      overflow: hidden;
    }

    .product-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-image {
      transform: scale(1.04);
    }

    .product-info {
      padding: 14px 12px;
    }

    .product-name {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }

    .product-price {
      font-size: 12px;
      color: var(--muted);
    }

    /* Badge (New In, Best Seller, etc.) */
    .product-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
      z-index: 2;
      color: #111;
    }

    /* ───────────────────────────────────────────────────────────────
       Loading / Empty States
    ─────────────────────────────────────────────────────────────── */
    .products-loading,
    .products-empty {
      text-align: center;
      padding: 60px 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .products-empty-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 28px;
      background: #171717;
      color: var(--white);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-top: 14px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .products-empty-btn:hover {
      opacity: 0.85;
    }

    /* ───────────────────────────────────────────────────────────────
       Responsive
    ─────────────────────────────────────────────────────────────── */
    @media (max-width: 1020px) {
      .products-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 720px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .products-main {
        width: calc(100% - 28px);
        padding: 32px 0;
      }

      .products-filters-inner {
        width: calc(100% - 28px);
      }
    }

    @media (max-width: 480px) {
      .products-filters-inner {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <!-- Inject global header -->
  <div id="ltn-header"></div>

  <main>
    <!-- Hero Section -->
    <section class="products-hero">
      <div class="products-hero-content">
        <h1 class="products-hero-title" id="page-title">Products</h1>
        <p class="products-hero-subtitle" id="page-subtitle"></p>
      </div>
    </section>

    <!-- Filters (optional) -->
    <section class="products-filters" style="display: none;">
      <div class="products-filters-inner">
        <div class="products-count" id="products-count">0 products</div>
        <div class="products-sort">
          <label for="sort-select">Sort</label>
          <select id="sort-select">
            <option value="featured">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A-Z</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Main Products Area -->
    <section class="products-main">
      <!-- Loading State -->
      <div class="products-loading" id="loading-state">
        Loading products...
      </div>

      <!-- Empty State -->
      <div class="products-empty" id="empty-state" style="display: none;">
        <p>No products found in this category.</p>
        <a href="/shop.html" class="products-empty-btn">Browse All Categories</a>
      </div>

      <!-- Product Grid -->
      <div class="products-grid" id="products-grid" style="display: none;"></div>
    </section>
  </main>

  <!-- Inject global footer -->
  <div id="ltn-footer"></div>

  <script>
    /**
     * Parse query params to determine which group & category to show
     * e.g. ?group=new-in&category=tops
     */
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        group: params.get('group') || 'shop-all',    // e.g. "new-in", "best-sellers", "last-chance", "shop-all"
        category: params.get('category') || 'shop-all', // e.g. "tops", "dresses", "knitwear", etc.
        q: params.get('q') || ''                      // search query (optional)
      };
    }

    /**
     * Fetch all products from the API
     */
    async function fetchProducts() {
      try {
        const response = await fetch(`${LTN.apiBase}/products`);
        const data = await response.json();
        return data.products || [];
      } catch (error) {
        console.error('Error fetching products:', error);
        return [];
      }
    }

    /**
     * Filter products based on group, category, and search query
     */
    function filterProducts(products, { group, category, q }) {
      let filtered = products;

      // 1. Filter by group (new-in, best-sellers, last-chance)
      if (group !== 'shop-all') {
        const groupField = group.replace('-', '_'); // e.g. "new-in" → "new_in"
        filtered = filtered.filter(p => p[groupField] === true);
      }

      // 2. Filter by category (tops, dresses, etc.)
      if (category !== 'shop-all') {
        filtered = filtered.filter(p => 
          p.category.toLowerCase() === category.toLowerCase()
        );
      }

      // 3. Filter by search query (name or category match)
      if (q) {
        const query = q.toLowerCase();
        filtered = filtered.filter(p => 
          p.name.toLowerCase().includes(query) ||
          p.category.toLowerCase().includes(query)
        );
      }

      return filtered;
    }

    /**
     * Render product cards into the grid
     */
    function renderProducts(products) {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';

      products.forEach(product => {
        const card = document.createElement('a');
        card.className = 'product-card';
        card.href = `/product.html?slug=${product.slug}`;

        // Badge logic
        let badgeHTML = '';
        if (product.new_in) {
          badgeHTML = '<span class="product-badge">New In</span>';
        } else if (product.best_seller) {
          badgeHTML = '<span class="product-badge">Best Seller</span>';
        } else if (product.last_chance) {
          badgeHTML = '<span class="product-badge">Last Chance</span>';
        }

        card.innerHTML = `
          ${badgeHTML}
          <div class="product-image-wrapper">
            <img class="product-image" src="${ltn_img(product.image, 600)}" alt="${product.name}" />
          </div>
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-price">$${product.price}</div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    /**
     * Update page title and subtitle based on group and category
     */
    function updatePageTitle({ group, category }) {
      const groupTitles = {
        'new-in': 'New In',
        'best-sellers': 'Best Sellers',
        'last-chance': 'Last Chance',
        'shop-all': 'Shop'
      };

      const categoryTitles = {
        'tops': 'Tops',
        'dresses': 'Dresses',
        'knitwear': 'Knitwear',
        'jackets': 'Jackets & Coats',
        'trousers': 'Trousers',
        'skirts': 'Skirts',
        'shop-all': 'All'
      };

      document.getElementById('page-title').textContent = 
        groupTitles[group] || 'Products';

      document.getElementById('page-subtitle').textContent = 
        categoryTitles[category] || '';
    }

    /**
     * Main initialization
     */
    async function initProductsPage() {
      const queryParams = getQueryParams();
      updatePageTitle(queryParams);

      // Show loading
      document.getElementById('loading-state').style.display = 'block';
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('products-grid').style.display = 'none';

      // Fetch and filter
      const allProducts = await fetchProducts();
      const filtered = filterProducts(allProducts, queryParams);

      // Hide loading
      document.getElementById('loading-state').style.display = 'none';

      if (filtered.length === 0) {
        // Show empty state
        document.getElementById('empty-state').style.display = 'block';
      } else {
        // Show products
        document.getElementById('products-grid').style.display = 'grid';
        renderProducts(filtered);
      }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initProductsPage();
      if (typeof ltn_updateCartCount === 'function') {
        ltn_updateCartCount();
      }
    });

    window.addEventListener('pageshow', () => {
      if (typeof ltn_updateCartCount === 'function') {
        ltn_updateCartCount();
      }
    });
  </script>

</body>
</html>
