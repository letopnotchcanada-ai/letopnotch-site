<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — Products</title>
  <meta name="description" content="Browse the Le Top Notch collection." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f4ef;
      --paper:#f5f1eb;
      --white:#ffffff;
      --text:#171717;
      --muted:#6e675f;
      --line:#e7e0d7;
      --banner:#ebe4da;
      --header-bg:rgba(247,244,239,.96);
      --max:1500px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    a{text-decoration:none;color:inherit}
    img{display:block;width:100%;height:auto}
    button,select{font:inherit}
    button{border:none;background:none;cursor:pointer;color:inherit}

    .announcement{min-height:24px;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px 14px;background:var(--banner);border-bottom:1px solid var(--line);font-size:9px;letter-spacing:.15em;text-transform:uppercase;}

    .site-header{position:sticky;top:0;z-index:300;background:var(--header-bg);backdrop-filter:blur(8px);border-bottom:1px solid rgba(231,224,215,.75);}
    .header-shell{position:relative}
    .header-inner{width:min(var(--max),calc(100% - 36px));margin:0 auto;min-height:56px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:18px;}.header-inner > 

  </style>
</head>
<body>
  <div id="ltn-header"></div>

  <main class="page">
    <div class="container">
      <div class="breadcrumbs">
        <a href="index.html">Home</a>
        <span>/</span>
        <a href="shop.html">Shop</a>
        <span>/</span>
        <span id="breadcrumbLabel">Products</span>
      </div>

      <div class="page-head">
        <h1 class="page-title" id="pageTitle">Products</h1>
        <div class="results-count" id="resultsCount">Loading products</div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="toolbar-pill" id="groupPill">Shop All</div>
          <div class="toolbar-pill" id="categoryPill">All Categories</div>
          <select class="toolbar-select" id="sizeFilter"><option value="">All Sizes</option></select>
          <select class="toolbar-select" id="colorFilter"><option value="">All Colors</option></select>
          <select class="toolbar-select" id="stockFilter">
            <option value="">All Stock</option>
            <option value="in-stock">In Stock</option>
            <option value="out-of-stock">Out of Stock</option>
          </select>
        </div>
        <div class="toolbar-right">
          <select class="toolbar-select" id="sortSelect">
            <option value="recommended">Recommended</option>
            <option value="price-low-high">Price: Low to High</option>
            <option value="price-high-low">Price: High to Low</option>
            <option value="in-stock-first">In Stock First</option>
            <option value="name-a-z">Name: A to Z</option>
            <option value="name-z-a">Name: Z to A</option>
          </select>
        </div>
      </div>

      <div class="loading-state" id="loadingState">Loading collection…</div>
      <div class="empty-state" id="emptyState" style="display:none;">No products found.</div>
      <div class="shop-grid" id="shopGrid"></div>
    </div>
  </main>

  <div id="ltn-footer"></div>

  <script src="/global.js"></script>
  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    const API_URL = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
    const CART_KEY = "letopnotch_cart";
    let allProducts = [], filteredProducts = [];

    function getCart(){try{const r=localStorage.getItem(CART_KEY);const c=r?JSON.parse(r):[];return Array.isArray(c)?c:[];}catch{return[];}}
    function updateCartCount(){ if(typeof ltn_updateCartCount==="function") ltn_updateCartCount(); }
    function formatPrice(v){const n=Number(v);if(!Number.isFinite(n)||n<=0)return"CAD —";return"CAD $"+n.toFixed(2).replace(".00","");}
    function titleCase(v){return String(v||"").replace(/[-_]/g," ").replace(/\s+/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
    function normalizeSlug(v){return String(v||"").trim().toLowerCase();}

    // ── CATEGORY NORMALIZATION — robust matching for Airtable values ──
    function normalizeCategory(item) {
      const raw = String(item.category || "").trim();
      if (raw) {
        const lo = raw.toLowerCase().replace(/[^a-z]/g, "");
        // Tops
        if (lo === "tops" || lo === "top" || lo === "shirts" || lo === "blouses") return "tops";
        // Dresses
        if (lo === "dresses" || lo === "dress") return "dresses";
        // Knitwear
        if (lo === "knitwear" || lo === "knit" || lo === "sweaters" || lo === "sweater" || lo === "knitwears") return "knitwear";
        // Jackets — catches "Jackets&Coats", "Jackets&coats", "Jacket&Coats", "Coats" etc
        if (lo.includes("jacket") || lo.includes("coat") || lo.includes("blazer")) return "jackets";
        // Trousers
        if (lo === "trousers" || lo === "trouser" || lo.includes("pant")) return "trousers";
        // Skirts
        if (lo === "skirts" || lo === "skirt") return "skirts";
        // Sets
        if (lo === "sets" || lo === "set") return "sets";
      }
      // Guess from name/slug as fallback
      const text = (String(item.name || "") + " " + String(item.slug || "")).toLowerCase();
      if (text.includes("dress")) return "dresses";
      if (text.includes("jacket") || text.includes("coat") || text.includes("blazer")) return "jackets";
      if (text.includes("pant") || text.includes("trouser")) return "trousers";
      if (text.includes("skirt")) return "skirts";
      if (text.includes("knit") || text.includes("sweater") || text.includes("cardigan")) return "knitwear";
      if (text.includes("shirt") || text.includes("top") || text.includes("blouse")) return "tops";
      return "other";
    }

    function normalizeSizes(v){
      if(Array.isArray(v))return[...new Set(v.map(x=>String(x||"").trim()).filter(Boolean))];
      return[...new Set(String(v||"").split(",").map(x=>x.trim()).filter(Boolean))];
    }

    function normalizeProducts(data){
      return(Array.isArray(data)?data:[]).map(item=>({
        slug:item.slug||"",
        name:titleCase(item.name||item.slug||"Product"),
        price:Number(item.price)||0,
        image:item.image||"",
        category:normalizeCategory(item),
        rawCategory:titleCase(item.category||normalizeCategory(item)),
        new_in:Boolean(item.new_in),
        best_seller:Boolean(item.best_seller),
        last_chance:Boolean(item.last_chance),
        color:String(item.color||"").trim(),
        stock_quantity:Number(item.stock_quantity)||0,
        in_stock:Boolean(item.in_stock),
        sizes:normalizeSizes(item.sizes)
      })).filter(item=>item.slug&&item.image&&item.name);
    }

    function getParams(){
      const p=new URLSearchParams(window.location.search);
      return{group:normalizeSlug(p.get("group")||"shop-all"),category:normalizeSlug(p.get("category")||"shop-all")};
    }

    function groupLabel(g){if(g==="new-in")return"New In";if(g==="best-sellers")return"Best Sellers";if(g==="last-chance")return"Last Chance";return"Shop All";}
    function categoryLabel(c){if(!c||c==="shop-all")return"All Categories";return titleCase(c);}

    function updatePageLabels(group,category){
      const title=category&&category!=="shop-all"?`${groupLabel(group)} — ${categoryLabel(category)}`:groupLabel(group);
      document.title="Le Top Notch — "+title;
      document.getElementById("pageTitle").textContent=title;
      document.getElementById("breadcrumbLabel").textContent=title;
      document.getElementById("groupPill").textContent=groupLabel(group);
      document.getElementById("categoryPill").textContent=categoryLabel(category);
    }

    function applyGroupFilter(products,group){
      if(group==="new-in")return products.filter(p=>p.new_in);
      if(group==="best-sellers")return products.filter(p=>p.best_seller);
      if(group==="last-chance")return products.filter(p=>p.last_chance);
      return products;
    }

    function applyCategoryFilter(products,category){
      if(!category||category==="shop-all")return products;
      const cat=normalizeSlug(category);
      // Try exact match first
      const matched=products.filter(p=>normalizeSlug(p.category)===cat);
      // If no matches (empty category field in Airtable), return all products in group
      return matched.length>0?matched:products;
    }

    function applySizeFilter(products,size){if(!size)return products;return products.filter(p=>p.sizes.includes(size));}
    function applyColorFilter(products,color){if(!color)return products;return products.filter(p=>normalizeSlug(p.color)===normalizeSlug(color));}
    function applyStockFilter(products,stock){if(stock==="in-stock")return products.filter(p=>p.in_stock);if(stock==="out-of-stock")return products.filter(p=>!p.in_stock);return products;}

    function applySort(products,sort){
      const arr=[...products];
      if(sort==="price-low-high")return arr.sort((a,b)=>a.price-b.price);
      if(sort==="price-high-low")return arr.sort((a,b)=>b.price-a.price);
      if(sort==="in-stock-first")return arr.sort((a,b)=>Number(b.in_stock)-Number(a.in_stock));
      if(sort==="name-a-z")return arr.sort((a,b)=>a.name.localeCompare(b.name));
      if(sort==="name-z-a")return arr.sort((a,b)=>b.name.localeCompare(a.name));
      return arr;
    }

    function renderFilterOptions(products){
      const sf=document.getElementById("sizeFilter"),cf=document.getElementById("colorFilter");
      const cs=sf.value,cc=cf.value;
      const sizes=[...new Set(products.flatMap(p=>p.sizes))].sort((a,b)=>{const an=Number(a),bn=Number(b);if(Number.isFinite(an)&&Number.isFinite(bn))return an-bn;return String(a).localeCompare(String(b));});
      const colors=[...new Set(products.map(p=>p.color).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      sf.innerHTML='<option value="">All Sizes</option>'+sizes.map(s=>`<option value="${s}">${s}</option>`).join("");
      cf.innerHTML='<option value="">All Colors</option>'+colors.map(c=>`<option value="${c}">${titleCase(c)}</option>`).join("");
      sf.value=sizes.includes(cs)?cs:"";
      cf.value=colors.includes(cc)?cc:"";
    }

    function renderProducts(products){
      const grid=document.getElementById("shopGrid"),empty=document.getElementById("emptyState"),count=document.getElementById("resultsCount");
      count.textContent=products.length+" products";
      if(!products.length){grid.innerHTML="";empty.style.display="block";return;}
      empty.style.display="none";
      grid.innerHTML=products.map(p=>{
        const badges=[];
        if(p.new_in)badges.push("New In");
        if(p.best_seller)badges.push("Best Seller");
        if(p.last_chance)badges.push("Last Chance");
        if(!p.in_stock)badges.push("Out of Stock");
        return`<a class="product-card" href="product.html?slug=${encodeURIComponent(p.slug)}">
          <div class="product-image-wrap">
            <div class="product-badges">${badges.map(b=>`<span class="badge">${b}</span>`).join("")}</div>
            <img class="product-image" src="${p.image}" alt="${p.name}">
          </div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${formatPrice(p.price)}</div>
          <div class="product-meta"><span>${p.rawCategory}</span>${p.color?`<span>${titleCase(p.color)}</span>`:""}<span>${p.in_stock?"In Stock":"Out of Stock"}</span></div>
        </a>`;
      }).join("");
    }

    function refreshView(){
      const{group,category}=getParams();
      const size=document.getElementById("sizeFilter").value;
      const color=document.getElementById("colorFilter").value;
      const stock=document.getElementById("stockFilter").value;
      const sort=document.getElementById("sortSelect").value;
      let products=applyGroupFilter(allProducts,group);
      products=applyCategoryFilter(products,category);
      renderFilterOptions(products);
      products=applySizeFilter(products,document.getElementById("sizeFilter").value||size);
      products=applyColorFilter(products,document.getElementById("colorFilter").value||color);
      products=applyStockFilter(products,stock);
      products=applySort(products,sort);
      filteredProducts=products;
      updatePageLabels(group,category);
      renderProducts(filteredProducts);
    }

    async function loadProducts(){
      try{
        const res=await fetch(API_URL,{cache:"no-store"});
        const data=await res.json();
        allProducts=normalizeProducts(data);
        document.getElementById("loadingState").style.display="none";
        refreshView();
      }catch(e){
        document.getElementById("loadingState").textContent="Unable to load collection.";
      }
    }

    document.getElementById("sizeFilter").addEventListener("change",refreshView);
    document.getElementById("colorFilter").addEventListener("change",refreshView);
    document.getElementById("stockFilter").addEventListener("change",refreshView);
    document.getElementById("sortSelect").addEventListener("change",refreshView);

    document.addEventListener("DOMContentLoaded", () => {
      updateCartCount();
      loadProducts();
    });
    window.addEventListener("pageshow", () => { updateCartCount(); });
  </script></body>
</html>
