<script>
  const API_URL = "https://letopnotch-api-v2.letopnotchcanada.workers.dev";
  const CART_KEY = "letopnotch_cart";
  const PLACEHOLDER_IMAGE = "https://via.placeholder.com/900x1125/ffffff/cccccc?text=Le+Top+Notch";

  function getCart() {
    try {
      const raw = localStorage.getItem(CART_KEY);
      const cart = raw ? JSON.parse(raw) : [];
      return Array.isArray(cart) ? cart : [];
    } catch (error) {
      return [];
    }
  }

  function saveCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  function updateCartCount() {
    const cart = getCart();
    const count = cart.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
    const link = document.getElementById("cartCountLink");
    if (link) {
      link.textContent = `Cart (${count})`;
    }
  }

  function formatPrice(value) {
    const num = Number(value);
    if (!Number.isFinite(num) || num <= 0) return "CAD —";
    return `CAD $${num.toFixed(2).replace(".00", "")}`;
  }

  function slugify(value) {
    return String(value || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim()
      .replace(/['"]/g, "")
      .replace(/&/g, "and")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function decodeParam(value) {
    if (!value) return "";
    try {
      return decodeURIComponent(value).trim();
    } catch (error) {
      return String(value).trim();
    }
  }

  function getProductIdentifier() {
    const params = new URLSearchParams(window.location.search);
    return decodeParam(
      params.get("slug") ||
      params.get("product") ||
      params.get("handle") ||
      params.get("id") ||
      ""
    );
  }

  function showFatalError(message) {
    document.body.innerHTML = `
      <div style="padding:40px;font-family:Arial,sans-serif;background:#f7f4ef;min-height:100vh;">
        <div style="max-width:760px;margin:0 auto;background:#fff;border:1px solid #e7e0d7;padding:24px;">
          <h2 style="margin:0 0 10px 0;font-size:20px;">Product page error</h2>
          <p style="margin:0;color:#444;line-height:1.6;">${message}</p>
        </div>
      </div>
    `;
  }

  function extractFirstValidUrl(value) {
    if (!value) return "";

    if (typeof value === "string") {
      const trimmed = value.trim();
      if (trimmed.startsWith("http://") || trimmed.startsWith("https://")) {
        return trimmed;
      }
      return "";
    }

    if (Array.isArray(value)) {
      for (const item of value) {
        const found = extractFirstValidUrl(item);
        if (found) return found;
      }
      return "";
    }

    if (typeof value === "object") {
      return (
        extractFirstValidUrl(value.url) ||
        extractFirstValidUrl(value.src) ||
        extractFirstValidUrl(value.href) ||
        extractFirstValidUrl(value.large) ||
        extractFirstValidUrl(value.original) ||
        extractFirstValidUrl(value.image) ||
        extractFirstValidUrl(value.thumbnails && value.thumbnails.large) ||
        extractFirstValidUrl(value.thumbnails && value.thumbnails.full) ||
        ""
      );
    }

    return "";
  }

  function extractImages(apiProduct) {
    const candidateKeys = [
      "front_image",
      "frontImage",
      "image",
      "image_url",
      "main_image",
      "mainImage",
      "gallery",
      "gallery_images",
      "galleryImages",
      "images",
      "photos",
      "attachments",
      "gallery_1",
      "gallery_2",
      "gallery_3",
      "gallery_4",
      "gallery1",
      "gallery2",
      "gallery3",
      "gallery4",
      "back_image",
      "backImage",
      "detail_image",
      "detailImage"
    ];

    const urls = [];

    for (const key of candidateKeys) {
      const rawValue = apiProduct[key];
      const found = extractFirstValidUrl(rawValue);
      if (found) urls.push(found);

      if (Array.isArray(rawValue)) {
        rawValue.forEach(item => {
          const url = extractFirstValidUrl(item);
          if (url) urls.push(url);
        });
      }
    }

    const uniqueUrls = [...new Set(urls.filter(Boolean))];
    return uniqueUrls.length ? uniqueUrls : [PLACEHOLDER_IMAGE];
  }

  function extractNumber(value) {
    if (value === null || value === undefined) return NaN;
    if (typeof value === "number") return value;

    const cleaned = String(value).replace(/[^0-9.-]/g, "");
    const num = Number(cleaned);
    return Number.isFinite(num) ? num : NaN;
  }

  function extractPrice(apiProduct) {
    const priceKeys = [
      "price_override",
      "price",
      "price_cad",
      "priceCAD",
      "retail_price",
      "retailPrice",
      "amount",
      "min_price",
      "minPrice"
    ];

    for (const key of priceKeys) {
      const num = extractNumber(apiProduct[key]);
      if (Number.isFinite(num) && num > 0) return num;
    }

    if (Array.isArray(apiProduct.variants)) {
      for (const variant of apiProduct.variants) {
        const candidates = [
          extractNumber(variant.price),
          extractNumber(variant.amount),
          extractNumber(variant.retail_price)
        ];
        const found = candidates.find(n => Number.isFinite(n) && n > 0);
        if (Number.isFinite(found) && found > 0) return found;
      }
    }

    return 0;
  }

  function extractText(apiProduct, keys, fallback = "") {
    for (const key of keys) {
      const value = apiProduct[key];
      if (typeof value === "string" && value.trim()) return value.trim();
    }
    return fallback;
  }

  function normalizeSizeLabel(value) {
    return String(value || "").trim();
  }

  function sortSizeLabels(labels) {
    return labels.sort((a, b) => {
      const aNum = Number(a);
      const bNum = Number(b);
      if (Number.isFinite(aNum) && Number.isFinite(bNum)) return aNum - bNum;
      return String(a).localeCompare(String(b));
    });
  }

  function extractSizes(apiProduct) {
    const sizeMap = {};

    function addSize(label, source = {}) {
      const cleanLabel = normalizeSizeLabel(label);
      if (!cleanLabel) return;

      if (!sizeMap[cleanLabel]) {
        sizeMap[cleanLabel] = {
          label: cleanLabel,
          sku: source.sku || source.SKU || cleanLabel,
          squareId: source.squareId || source.squareVariationId || source.id || source.itemVariationId || cleanLabel
        };
      }
    }

    if (apiProduct.sizes && typeof apiProduct.sizes === "object" && !Array.isArray(apiProduct.sizes)) {
      Object.entries(apiProduct.sizes).forEach(([key, value]) => {
        if (value && typeof value === "object") {
          addSize(value.label || value.size || key, value);
        } else {
          addSize(key, {});
        }
      });
    }

    const listCandidates = [
      apiProduct.variants,
      apiProduct.variations,
      apiProduct.size_variants,
      apiProduct.sizeVariants
    ];

    listCandidates.forEach(list => {
      if (!Array.isArray(list)) return;

      list.forEach(item => {
        if (!item || typeof item !== "object") return;
        addSize(
          item.size || item.label || item.name || item.option_value || item.optionValue,
          item
        );
      });
    });

    const simpleSizeFields = [
      apiProduct.available_sizes,
      apiProduct.availableSizes,
      apiProduct.size_list,
      apiProduct.sizeList,
      apiProduct.size_options,
      apiProduct.sizeOptions
    ];

    simpleSizeFields.forEach(value => {
      if (Array.isArray(value)) {
        value.forEach(item => addSize(item, {}));
      } else if (typeof value === "string" && value.trim()) {
        value
          .split(/[,\|\/]/)
          .map(s => s.trim())
          .filter(Boolean)
          .forEach(item => addSize(item, {}));
      }
    });

    if (!Object.keys(sizeMap).length) {
      ["36", "38", "40", "42"].forEach(size => addSize(size, {}));
    }

    const ordered = {};
    sortSizeLabels(Object.keys(sizeMap)).forEach(key => {
      ordered[key] = sizeMap[key];
    });

    return ordered;
  }

  function normalizeProduct(apiProduct) {
    const name =
      extractText(apiProduct, ["product_name_override", "name", "title", "product_name"], "Product");

    const category =
      extractText(apiProduct, ["category_override", "category", "product_type"], "Ready to Wear");

    const season =
      extractText(apiProduct, ["season_override", "season", "collection"], "Current Season");

    const description =
      extractText(apiProduct, ["description", "body_html", "details"], "");

    const composition =
      extractText(apiProduct, ["composition", "fabric", "material"], "");

    const care =
      extractText(apiProduct, ["care", "care_instructions", "careInstructions"], "");

    const rawSlug =
      extractText(apiProduct, ["slug", "handle"], "") || slugify(name);

    return {
      slug: slugify(rawSlug),
      name,
      price: extractPrice(apiProduct),
      description,
      composition,
      care,
      category,
      season,
      images: extractImages(apiProduct),
      sizes: extractSizes(apiProduct)
    };
  }

  function extractProductArray(payload) {
    if (Array.isArray(payload)) return payload;
    if (payload && Array.isArray(payload.products)) return payload.products;
    if (payload && Array.isArray(payload.items)) return payload.items;
    if (payload && Array.isArray(payload.data)) return payload.data;
    return [];
  }

  function findProduct(products, identifier) {
    const cleanIdentifier = slugify(identifier);
    if (!cleanIdentifier) return null;

    return products.find(p => {
      const slug = slugify(p.slug || p.handle || "");
      const name = slugify(p.product_name_override || p.name || p.title || p.product_name || "");
      const id = slugify(p.id || p.record_id || p.recordId || "");
      return slug === cleanIdentifier || name === cleanIdentifier || id === cleanIdentifier;
    }) || null;
  }

  const productName = document.getElementById("productName");
  const productPriceDisplay = document.getElementById("productPriceDisplay");
  const productDescription = document.getElementById("productDescription");
  const accordionDescription = document.getElementById("accordionDescription");
  const accordionComposition = document.getElementById("accordionComposition");
  const accordionCare = document.getElementById("accordionCare");
  const careSectionText = document.getElementById("careSectionText");
  const productCategoryLine = document.getElementById("productCategoryLine");
  const productSeasonLine = document.getElementById("productSeasonLine");
  const breadcrumbCategory = document.getElementById("breadcrumbCategory");
  const mainProductImage = document.getElementById("mainProductImage");
  const galleryThumbs = document.getElementById("galleryThumbs");
  const sizeGrid = document.getElementById("sizeGrid");
  const addToCartButton = document.getElementById("addToCartButton");
  const quantitySelector = document.getElementById("quantitySelector");
  const addFeedback = document.getElementById("addFeedback");

  const modal = document.getElementById("sizeGuideModal");
  const openModal = document.getElementById("openSizeGuide");
  const closeModal = document.getElementById("closeSizeGuide");
  const tabs = Array.from(document.querySelectorAll(".modal-tab"));
  const panels = {
    measurements: document.getElementById("panel-measurements"),
    conversion: document.getElementById("panel-conversion")
  };

  let product = null;
  let selectedSize = null;
  let currentImageIndex = 0;
  let galleryImages = [];

  function renderMainImage() {
    if (!galleryImages.length) {
      mainProductImage.src = PLACEHOLDER_IMAGE;
      mainProductImage.alt = "Le Top Notch product";
      return;
    }

    mainProductImage.src = galleryImages[currentImageIndex];
    mainProductImage.alt = product.name;
  }

  function updateThumbState() {
    const thumbs = galleryThumbs.querySelectorAll(".thumb");
    thumbs.forEach((thumb, index) => {
      thumb.classList.toggle("active", index === currentImageIndex);
    });
  }

  function renderGallery() {
    galleryThumbs.innerHTML = "";
    galleryImages = Array.isArray(product.images) && product.images.length ? product.images : [PLACEHOLDER_IMAGE];
    currentImageIndex = 0;

    galleryImages.forEach((image, index) => {
      const thumb = document.createElement("button");
      thumb.type = "button";
      thumb.className = "thumb" + (index === 0 ? " active" : "");
      thumb.innerHTML = `<img src="${image}" alt="${product.name} image ${index + 1}">`;

      thumb.addEventListener("click", () => {
        currentImageIndex = index;
        renderMainImage();
        updateThumbState();
      });

      galleryThumbs.appendChild(thumb);
    });

    renderMainImage();
  }

  function renderSizes() {
    sizeGrid.innerHTML = "";
    const sizeKeys = Object.keys(product.sizes || {});
    selectedSize = sizeKeys[0] || null;

    sizeKeys.forEach((sizeKey, index) => {
      const sizeData = product.sizes[sizeKey];
      const button = document.createElement("button");
      button.type = "button";
      button.className = "size-btn" + (index === 0 ? " active" : "");
      button.textContent = sizeData.label || sizeKey;

      button.addEventListener("click", () => {
        selectedSize = sizeKey;
        sizeGrid.querySelectorAll(".size-btn").forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
      });

      sizeGrid.appendChild(button);
    });
  }

  function renderProduct() {
    document.title = `Le Top Notch — ${product.name}`;
    productName.textContent = product.name;
    productPriceDisplay.textContent = formatPrice(product.price);
    productDescription.textContent = product.description || "A refined piece selected for the Le Top Notch wardrobe.";
    accordionDescription.textContent = product.description || "A refined piece selected for the Le Top Notch wardrobe.";
    accordionComposition.textContent = product.composition ? `Composition: ${product.composition}` : "";
    accordionCare.textContent = product.care ? `Care: ${product.care}` : "";
    careSectionText.textContent = product.care || "Store with care and handle delicate garments gently. Steam lightly when needed.";
    productCategoryLine.textContent = product.category;
    productSeasonLine.textContent = product.season;
    breadcrumbCategory.textContent = product.category;

    renderGallery();
    renderSizes();
    updateCartCount();
  }

  async function loadProduct() {
    try {
      const identifier = getProductIdentifier();

      if (!identifier) {
        showFatalError("No product slug was found in the URL. Your shop cards must link like product.html?slug=your-product-slug");
        return;
      }

      const response = await fetch(API_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`API request failed with status ${response.status}`);
      }

      const payload = await response.json();
      const products = extractProductArray(payload);

      if (!products.length) {
        showFatalError("The API returned no products.");
        return;
      }

      const found = findProduct(products, identifier);

      if (!found) {
        showFatalError(`Product not found for slug: ${identifier}`);
        return;
      }

      product = normalizeProduct(found);
      renderProduct();
    } catch (error) {
      showFatalError(`Unable to load product. ${error.message || ""}`.trim());
    }
  }

  document.getElementById("prevImage").addEventListener("click", () => {
    if (!galleryImages.length) return;
    currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
    renderMainImage();
    updateThumbState();
  });

  document.getElementById("nextImage").addEventListener("click", () => {
    if (!galleryImages.length) return;
    currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
    renderMainImage();
    updateThumbState();
  });

  addToCartButton.addEventListener("click", () => {
    if (!product || !selectedSize || !product.sizes[selectedSize]) return;

    const variation = product.sizes[selectedSize];
    const quantity = Number(quantitySelector.value) || 1;

    const cartItem = {
      id: `${product.slug}-${selectedSize}`,
      slug: product.slug,
      name: product.name,
      category: product.category,
      season: product.season,
      price: product.price,
      currency: "CAD",
      image: product.images[0] || PLACEHOLDER_IMAGE,
      size: selectedSize,
      sku: variation.sku || selectedSize,
      squareVariationId: variation.squareId || variation.id || selectedSize,
      quantity
    };

    const cart = getCart();
    const existingIndex = cart.findIndex(item =>
      item.slug === cartItem.slug &&
      item.size === cartItem.size &&
      item.squareVariationId === cartItem.squareVariationId
    );

    if (existingIndex >= 0) {
      cart[existingIndex].quantity += quantity;
    } else {
      cart.push(cartItem);
    }

    saveCart(cart);
    updateCartCount();

    addFeedback.classList.add("show");
    addToCartButton.textContent = "Added";
    addToCartButton.disabled = true;

    setTimeout(() => {
      window.location.href = "cart.html";
    }, 500);
  });

  openModal.addEventListener("click", () => {
    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  });

  closeModal.addEventListener("click", () => {
    modal.classList.remove("open");
    modal.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  });

  modal.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }
  });

  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(item => item.classList.remove("active"));
      Object.values(panels).forEach(panel => panel.classList.remove("active"));
      tab.classList.add("active");
      panels[tab.dataset.tab].classList.add("active");
    });
  });

  document.addEventListener("DOMContentLoaded", () => {
    updateCartCount();
    loadProduct();
  });

  window.addEventListener("pageshow", () => {
    updateCartCount();
  });
</script>
