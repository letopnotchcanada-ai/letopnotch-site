<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Le Top Notch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f7f4ef;
      --charcoal: #171717;
      --soft-grey: #6e675f;
      --light-border: #e7e0d7;
      --disabled-grey: #d4cfc7;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 30px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    /* Images */
    .product-images {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .product-images img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid var(--light-border);
    }

    /* Product Info */
    .product-info {
      position: sticky;
      top: 60px;
    }

    .product-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 42px;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .product-price {
      font-size: 18px;
      color: var(--soft-grey);
      margin-bottom: 40px;
    }

    /* Color Selector */
    .selector-group {
      margin-bottom: 30px;
    }

    .selector-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--soft-grey);
      margin-bottom: 12px;
      display: block;
    }

    .color-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .color-option {
      padding: 12px 20px;
      border: 1px solid var(--light-border);
      background: white;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
    }

    .color-option:hover {
      border-color: var(--charcoal);
    }

    .color-option.selected {
      background: var(--charcoal);
      color: white;
      border-color: var(--charcoal);
    }

    /* Size Selector */
    .size-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .size-option {
      min-width: 50px;
      padding: 12px 16px;
      border: 1px solid var(--light-border);
      background: white;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-align: center;
      transition: all 0.2s ease;
    }

    .size-option:hover:not(.disabled) {
      border-color: var(--charcoal);
    }

    .size-option.selected {
      background: var(--charcoal);
      color: white;
      border-color: var(--charcoal);
    }

    .size-option.disabled {
      background: var(--cream);
      color: var(--disabled-grey);
      border-color: var(--disabled-grey);
      cursor: not-allowed;
      opacity: 0.5;
      text-decoration: line-through;
    }

    /* Add to Cart */
    .add-to-cart {
      width: 100%;
      padding: 18px;
      background: var(--charcoal);
      color: white;
      border: none;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      cursor: pointer;
      margin-top: 30px;
      transition: background 0.2s ease;
    }

    .add-to-cart:hover:not(:disabled) {
      background: #2d2d2d;
    }

    .add-to-cart:disabled {
      background: var(--disabled-grey);
      cursor: not-allowed;
    }

    /* Product Details */
    .product-details {
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid var(--light-border);
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
      color: var(--charcoal);
    }

    .detail-content {
      font-size: 14px;
      color: var(--soft-grey);
      line-height: 1.7;
    }

    /* Stock Alert */
    .stock-alert {
      margin-top: 15px;
      padding: 12px 16px;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
      font-size: 13px;
      color: #856404;
    }

    .out-of-stock-alert {
      background: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }

    /* Error Message */
    .error-message {
      padding: 40px;
      text-align: center;
      color: var(--soft-grey);
    }

    /* Loading State */
    .loading {
      padding: 100px;
      text-align: center;
      color: var(--soft-grey);
    }

    @media (max-width: 900px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .product-info {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="app">
      <div class="loading">Loading product...</div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://letopnotch-api-v2.letopnotchcanada.workers.dev';
    
    // State
    let currentProduct = null;
    let selectedColor = null;
    let selectedSize = null;

    // Get product slug from URL
    function getProductSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get('slug') || params.get('product');
    }

    // Fetch product data
    async function fetchProduct(slug) {
      try {
        const response = await fetch(`${API_BASE}/products?view=detail`);
        if (!response.ok) throw new Error('Failed to fetch products');
        
        const products = await response.json();
        const product = products.find(p => p.slug === slug);
        
        if (!product) throw new Error('Product not found');
        return product;
      } catch (error) {
        console.error('Error fetching product:', error);
        throw error;
      }
    }

    // Get available sizes for selected color
    function getAvailableSizesForColor(product, color) {
      if (!product.color_size_inventory || !color) {
        // Fallback to old behavior if no color inventory
        return product.sizes || [];
      }

      const colorInventory = product.color_size_inventory[color];
      if (!colorInventory) return [];

      // Return all sizes, but we'll mark unavailable ones as disabled
      return Object.keys(colorInventory);
    }

    // Check if size is in stock for selected color
    function isSizeInStock(product, color, size) {
      if (!product.color_size_inventory || !color || !size) {
        return true; // Fallback
      }

      const colorInventory = product.color_size_inventory[color];
      if (!colorInventory) return false;

      const qty = colorInventory[size] || 0;
      return qty > 0;
    }

    // Get stock quantity for color+size
    function getStockQuantity(product, color, size) {
      if (!product.color_size_inventory || !color || !size) {
        return null;
      }

      const colorInventory = product.color_size_inventory[color];
      if (!colorInventory) return 0;

      return colorInventory[size] || 0;
    }

    // Render product
    function renderProduct(product) {
      currentProduct = product;
      
      // Auto-select first color if available
      if (!selectedColor && product.colors && product.colors.length > 0) {
        selectedColor = product.colors[0];
      }

      const app = document.getElementById('app');
      
      const images = [
        product.image_full || product.image,
        product.gallery_1,
        product.gallery_2,
        product.gallery_3,
        product.gallery_4,
        product.gallery_5
      ].filter(Boolean);

      const availableSizes = getAvailableSizesForColor(product, selectedColor);

      app.innerHTML = `
        <div class="product-grid">
          <!-- Images -->
          <div class="product-images">
            ${images.map(img => `<img src="${img}" alt="${product.name}" />`).join('')}
          </div>

          <!-- Product Info -->
          <div class="product-info">
            <h1 class="product-title">${product.name}</h1>
            <div class="product-price">$${product.price.toFixed(2)} CAD</div>

            <!-- Color Selector -->
            ${product.colors && product.colors.length > 0 ? `
              <div class="selector-group">
                <label class="selector-label">Color: ${selectedColor || 'Select'}</label>
                <div class="color-options">
                  ${product.colors.map(color => `
                    <button 
                      class="color-option ${selectedColor === color ? 'selected' : ''}"
                      onclick="selectColor('${color}')"
                    >
                      ${color}
                    </button>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            <!-- Size Selector -->
            ${availableSizes.length > 0 ? `
              <div class="selector-group">
                <label class="selector-label">Size: ${selectedSize || 'Select'}</label>
                <div class="size-options">
                  ${availableSizes.map(size => {
                    const inStock = isSizeInStock(product, selectedColor, size);
                    const qty = getStockQuantity(product, selectedColor, size);
                    return `
                      <button 
                        class="size-option ${selectedSize === size ? 'selected' : ''} ${!inStock ? 'disabled' : ''}"
                        onclick="selectSize('${size}')"
                        ${!inStock ? 'disabled' : ''}
                        title="${inStock ? `${qty} in stock` : 'Out of stock'}"
                      >
                        ${size}
                      </button>
                    `;
                  }).join('')}
                </div>
              </div>
            ` : ''}

            <!-- Stock Alert -->
            ${selectedColor && selectedSize ? `
              ${(() => {
                const qty = getStockQuantity(product, selectedColor, selectedSize);
                if (qty === 0) {
                  return `<div class="stock-alert out-of-stock-alert">Out of stock</div>`;
                } else if (qty && qty <= 3) {
                  return `<div class="stock-alert">Only ${qty} left in stock</div>`;
                }
                return '';
              })()}
            ` : ''}

            <!-- Add to Cart -->
            <button 
              class="add-to-cart" 
              onclick="addToCart()"
              ${!selectedSize || !isSizeInStock(product, selectedColor, selectedSize) ? 'disabled' : ''}
            >
              ${!selectedSize ? 'Select Size' : !isSizeInStock(product, selectedColor, selectedSize) ? 'Out of Stock' : 'Add to Cart'}
            </button>

            <!-- Product Details -->
            <div class="product-details">
              ${product.garment_composition ? `
                <div class="detail-section">
                  <div class="detail-title">Composition</div>
                  <div class="detail-content">${product.garment_composition}</div>
                </div>
              ` : ''}
              
              ${product.garment_care ? `
                <div class="detail-section">
                  <div class="detail-title">Care Instructions</div>
                  <div class="detail-content">${product.garment_care}</div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // Select color
    function selectColor(color) {
      selectedColor = color;
      selectedSize = null; // Reset size when color changes
      renderProduct(currentProduct);
    }

    // Select size
    function selectSize(size) {
      if (!isSizeInStock(currentProduct, selectedColor, size)) {
        return; // Don't select if out of stock
      }
      selectedSize = size;
      renderProduct(currentProduct);
    }

    // Add to cart
    function addToCart() {
      if (!selectedSize || !selectedColor) {
        alert('Please select a color and size');
        return;
      }

      if (!isSizeInStock(currentProduct, selectedColor, selectedSize)) {
        alert('This item is out of stock');
        return;
      }

      // Get existing cart
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');

      // Check if item already in cart
      const existingIndex = cart.findIndex(
        item => item.slug === currentProduct.slug && 
                item.size === selectedSize && 
                item.color === selectedColor
      );

      if (existingIndex >= 0) {
        // Increment quantity
        cart[existingIndex].quantity += 1;
      } else {
        // Add new item
        cart.push({
          slug: currentProduct.slug,
          name: currentProduct.name,
          price: currentProduct.price,
          size: selectedSize,
          color: selectedColor,
          image: currentProduct.image,
          quantity: 1
        });
      }

      // Save cart
      localStorage.setItem('cart', JSON.stringify(cart));

      // Show confirmation
      alert(`Added ${currentProduct.name} (${selectedColor}, ${selectedSize}) to cart!`);
      
      // Optionally redirect to cart page
      // window.location.href = '/cart.html';
    }

    // Initialize
    async function init() {
      const slug = getProductSlug();
      
      if (!slug) {
        document.getElementById('app').innerHTML = `
          <div class="error-message">
            <h2>No product specified</h2>
            <p>Please provide a product slug in the URL.</p>
          </div>
        `;
        return;
      }

      try {
        const product = await fetchProduct(slug);
        renderProduct(product);
      } catch (error) {
        document.getElementById('app').innerHTML = `
          <div class="error-message">
            <h2>Product not found</h2>
            <p>The product you're looking for doesn't exist or has been removed.</p>
          </div>
        `;
      }
    }

    // Run on page load
    init();
  </script>
</body>
</html>
