<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Le Top Notch</title>
  <meta name="description" content="Product details" />
  <link rel="stylesheet" href="/mobile-fixes.css">
  <script src="/global.js"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --text: #171717;
      --muted: #6e675f;
      --line: #e7e0d7;
      --white: #ffffff;
      --max: 1600px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    /* ───────────────────────────────────────────────────────────────
       Main Container
    ─────────────────────────────────────────────────────────────── */
    .product-container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      padding: 48px 0;
    }

    /* ───────────────────────────────────────────────────────────────
       Layout
    ─────────────────────────────────────────────────────────────── */
    .product-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 48px;
    }

    /* ───────────────────────────────────────────────────────────────
       Gallery
    ─────────────────────────────────────────────────────────────── */
    .product-gallery {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .product-gallery img {
      width: 100%;
      height: auto;
      display: block;
      background: #d9d2c8;
    }

    /* ───────────────────────────────────────────────────────────────
       Product Info
    ─────────────────────────────────────────────────────────────── */
    .product-info {
      position: sticky;
      top: 80px;
      align-self: start;
    }

    .product-name {
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.1;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    .product-price {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .product-description {
      font-size: 13px;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    /* ───────────────────────────────────────────────────────────────
       Options (Size, Color)
    ─────────────────────────────────────────────────────────────── */
    .product-option {
      margin-bottom: 20px;
    }

    .product-option-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
    }

    .product-select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      background: var(--white);
      padding: 0 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23171717' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }

    .product-select:focus {
      outline: none;
      border-color: #111;
    }

    /* ───────────────────────────────────────────────────────────────
       Add to Cart Button
    ─────────────────────────────────────────────────────────────── */
    .product-add-button {
      width: 100%;
      min-height: 46px;
      background: #171717;
      color: var(--white);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 12px;
    }

    .product-add-button:hover {
      opacity: 0.85;
    }

    .product-add-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .product-stock-info {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ───────────────────────────────────────────────────────────────
       Loading State
    ─────────────────────────────────────────────────────────────── */
    .product-loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ───────────────────────────────────────────────────────────────
       Responsive
    ─────────────────────────────────────────────────────────────── */
    @media (max-width: 920px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .product-info {
        position: static;
      }

      .product-container {
        width: calc(100% - 28px);
        padding: 32px 0;
      }
    }
  </style>
</head>
<body>

  <!-- Inject global header -->
  <div id="ltn-header"></div>

  <main class="product-container">
    <!-- Loading State -->
    <div class="product-loading" id="loading-state">
      Loading product...
    </div>

    <!-- Product Detail -->
    <div class="product-layout" id="product-detail" style="display: none;">
      <!-- Gallery -->
      <div class="product-gallery" id="product-gallery"></div>

      <!-- Info -->
      <div class="product-info">
        <h1 class="product-name" id="product-name"></h1>
        <div class="product-price" id="product-price"></div>
        <div class="product-description" id="product-description"></div>

        <!-- Size Option -->
        <div class="product-option" id="size-option" style="display: none;">
          <label class="product-option-label">Size</label>
          <select class="product-select" id="size-select">
            <option value="">Select size</option>
          </select>
        </div>

        <!-- Color Option -->
        <div class="product-option" id="color-option" style="display: none;">
          <label class="product-option-label">Color</label>
          <select class="product-select" id="color-select">
            <option value="">Select color</option>
          </select>
        </div>

        <!-- Add to Cart -->
        <button class="product-add-button" id="add-to-cart-button" onclick="addToCart()" disabled>
          Add to Cart
        </button>

        <div class="product-stock-info" id="stock-info"></div>
      </div>
    </div>
  </main>

  <!-- Inject global footer -->
  <div id="ltn-footer"></div>

  <script>
    let currentProduct = null;
    let selectedSize = null;
    let selectedColor = null;

    /**
     * Load product from API based on slug in URL
     */
    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        document.getElementById('loading-state').textContent = 'Product not found';
        return;
      }

      try {
        // Fetch all products
        const response = await fetch(`${LTN.apiBase}/products`);
        const data = await response.json();

        // Find the product with matching slug
        currentProduct = (data.products || []).find(p => p.slug === slug);

        if (!currentProduct) {
          document.getElementById('loading-state').textContent = 'Product not found';
          return;
        }

        // Hide loading, show product
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('product-detail').style.display = 'grid';

        // Populate product details
        document.getElementById('product-name').textContent = currentProduct.name;
        document.getElementById('product-price').textContent = '$' + currentProduct.price;
        document.getElementById('product-description').textContent = 
          currentProduct.name + ' — Premium quality.';

        // Populate gallery
        const gallery = document.getElementById('product-gallery');
        const images = [
          currentProduct.image,
          currentProduct.gallery_1,
          currentProduct.gallery_2,
          currentProduct.gallery_3
        ].filter(Boolean);

        images.forEach(url => {
          const img = document.createElement('img');
          img.src = ltn_img(url, 900);
          img.alt = currentProduct.name;
          gallery.appendChild(img);
        });

        // Populate size options
        if (currentProduct.sizes && currentProduct.sizes.length > 0) {
          document.getElementById('size-option').style.display = 'block';
          const sizeSelect = document.getElementById('size-select');
          currentProduct.sizes.forEach(size => {
            const option = document.createElement('option');
            option.value = size;
            option.textContent = size;
            sizeSelect.appendChild(option);
          });

          sizeSelect.addEventListener('change', () => {
            selectedSize = sizeSelect.value;
            checkIfReady();
          });
        }

        // Populate color options
        if (currentProduct.colors && currentProduct.colors.length > 0) {
          document.getElementById('color-option').style.display = 'block';
          const colorSelect = document.getElementById('color-select');
          currentProduct.colors.forEach(color => {
            const option = document.createElement('option');
            option.value = color;
            option.textContent = color;
            colorSelect.appendChild(option);
          });

          colorSelect.addEventListener('change', () => {
            selectedColor = colorSelect.value;
            checkIfReady();
          });
        }

        // Stock info
        document.getElementById('stock-info').textContent = 
          currentProduct.in_stock ? 'In stock' : 'Out of stock';

        // Check if button should be enabled
        checkIfReady();

      } catch (error) {
        document.getElementById('loading-state').textContent = 'Error loading product';
        console.error(error);
      }
    }

    /**
     * Check if all required options are selected
     */
    function checkIfReady() {
      const sizeOk = 
        !document.getElementById('size-option').style.display || 
        document.getElementById('size-option').style.display === 'none' || 
        selectedSize;

      const colorOk = 
        !document.getElementById('color-option').style.display || 
        document.getElementById('color-option').style.display === 'none' || 
        selectedColor;

      const button = document.getElementById('add-to-cart-button');
      button.disabled = !(sizeOk && colorOk && currentProduct.in_stock);
    }

    /**
     * Add product to cart
     */
    function addToCart() {
      if (!currentProduct) return;

      const cart = ltn_getCart();

      cart.push({
        slug: currentProduct.slug,
        name: currentProduct.name,
        price: currentProduct.price,
        image: currentProduct.image,
        size: selectedSize || '',
        color: selectedColor || '',
        quantity: 1
      });

      localStorage.setItem(LTN.cartKey, JSON.stringify(cart));
      ltn_updateCartCount();

      alert('Added to cart!');
      window.location.href = '/cart.html';
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadProduct();
    });
  </script>

</body>
</html>
