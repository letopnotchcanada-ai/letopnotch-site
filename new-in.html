<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New In — Le Top Notch</title>
  <script src="/global.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;line-height:1.45;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}
    .hero{position:relative;overflow:hidden;background:#d9d2c8;}
    .hero-img{width:100%;height:78vh;object-fit:cover;object-position:center top;display:block;}
    .hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(0,0,0,.03),rgba(0,0,0,.25));}
    .hero-tag{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.8);margin-bottom:14px;}
    .hero-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(64px,9vw,140px);font-weight:500;line-height:.9;letter-spacing:-.01em;text-transform:uppercase;color:#fff;text-align:center;margin-bottom:24px;}
    .hero-cta{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 28px;border:1px solid rgba(255,255,255,.9);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.18em;transition:background .2s,color .2s;}
    .hero-cta:hover{background:#fff;color:#111;}
    .container{width:min(1600px,calc(100% - 40px));margin:0 auto;}
    .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;padding-top:56px;}
    .section-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(28px,3vw,44px);font-weight:500;letter-spacing:-.01em;}
    .section-link{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#6e675f;border-bottom:1px solid #6e675f;padding-bottom:2px;}
    .prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px 16px;padding-bottom:56px;}
    .snippet{border-top:1px solid #e7e0d7;padding-bottom:56px;}
    .snippet-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#6e675f;margin-bottom:6px;padding-top:48px;}
    .snippet-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(32px,4vw,56px);font-weight:500;letter-spacing:-.01em;text-transform:uppercase;margin-bottom:28px;}
    .snippet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px 16px;}
    .snippet-cta{display:inline-flex;align-items:center;gap:8px;margin-top:24px;font-size:9px;text-transform:uppercase;letter-spacing:.18em;border-bottom:1px solid #171717;padding-bottom:3px;}
    .prod-card{display:block;}
    .prod-img{aspect-ratio:3/4;overflow:hidden;background:#ede8e0;margin-bottom:12px;}
    .prod-img img{width:100%;height:100%;object-fit:cover;object-position:center top;transition:transform .5s ease;}
    .prod-card:hover .prod-img img{transform:scale(1.04);}
    .prod-name{font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;font-weight:500;}
    .prod-color{font-size:11px;color:#6e675f;margin-bottom:3px;}
    .prod-price{font-size:11px;color:#6e675f;}
    .loading{grid-column:1/-1;text-align:center;padding:80px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#6e675f;}
    @media(max-width:1100px){.prod-grid,.snippet-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:640px){.prod-grid,.snippet-grid{grid-template-columns:repeat(2,1fr);gap:14px 10px;}.hero-img{height:60vh;}}
  </style>
</head>
<body>
  <div id="ltn-header"></div>

  <section class="hero">
    <img class="hero-img" src="https://letopnotch-site.pages.dev/images/home-tile-new-in.webp" alt="New In SS26">
    <div class="hero-overlay">
      <div class="hero-tag">Spring / Summer 2026</div>
      <h1 class="hero-title">New In</h1>
      <a href="#new-arrivals" class="hero-cta">Discover the Collection</a>
    </div>
  </section>

  <div id="new-arrivals" class="container">
    <div class="section-head">
      <div class="section-title">New Arrivals</div>
      <a href="/products.html?group=new-in&category=shop-all" class="section-link">Shop All</a>
    </div>
    <div class="prod-grid" id="allGrid"><div class="loading">Loading…</div></div>
  </div>

  <div class="snippet container">
    <div class="snippet-label">New In</div>
    <div class="snippet-title">Tops</div>
    <div class="snippet-grid" id="topsGrid"><div class="loading">Loading…</div></div>
    <a href="/products.html?group=new-in&category=tops" class="snippet-cta">Shop All Tops →</a>
  </div>

  <div class="snippet container">
    <div class="snippet-label">New In</div>
    <div class="snippet-title">Dresses</div>
    <div class="snippet-grid" id="dressesGrid"><div class="loading">Loading…</div></div>
    <a href="/products.html?group=new-in&category=dresses" class="snippet-cta">Shop All Dresses →</a>
  </div>

  <div class="snippet container">
    <div class="snippet-label">New In</div>
    <div class="snippet-title">Knitwear</div>
    <div class="snippet-grid" id="knitwearGrid"><div class="loading">Loading…</div></div>
    <a href="/products.html?group=new-in&category=knitwear" class="snippet-cta">Shop All Knitwear →</a>
  </div>

  <div class="snippet container">
    <div class="snippet-label">New In</div>
    <div class="snippet-title">Jackets</div>
    <div class="snippet-grid" id="jacketsGrid"><div class="loading">Loading…</div></div>
    <a href="/products.html?group=new-in&category=jackets" class="snippet-cta">Shop All Jackets →</a>
  </div>

  <div class="snippet container">
    <div class="snippet-label">New In</div>
    <div class="snippet-title">Trousers</div>
    <div class="snippet-grid" id="trousersGrid"><div class="loading">Loading…</div></div>
    <a href="/products.html?group=new-in&category=trousers" class="snippet-cta">Shop All Trousers →</a>
  </div>

  <div id="ltn-footer"></div>

  <script>
    const API = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";

    function fp(v){const n=Number(v);return(!Number.isFinite(n)||n<=0)?"CAD --":"CAD $"+n.toFixed(2).replace(".00","");}
    function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}

    function normalizeCategory(item) {
      const raw = String(item.category||"").trim().toLowerCase().replace(/[^a-z]/g,"");
      if(raw.includes("dress")) return "dresses";
      if(raw.includes("jacket")||raw.includes("coat")||raw.includes("blazer")) return "jackets";
      if(raw.includes("trouser")||raw.includes("pant")) return "trousers";
      if(raw.includes("skirt")) return "skirts";
      if(raw.includes("knit")||raw.includes("sweater")) return "knitwear";
      if(raw.includes("top")||raw.includes("shirt")||raw.includes("blouse")) return "tops";
      const text = (item.name||"").toLowerCase();
      if(text.includes("dress")) return "dresses";
      if(text.includes("jacket")||text.includes("coat")) return "jackets";
      if(text.includes("trouser")||text.includes("pant")) return "trousers";
      if(text.includes("skirt")) return "skirts";
      if(text.includes("knit")||text.includes("sweater")) return "knitwear";
      return "tops";
    }

    function prodCard(p) {
      const color = p.colors?.length ? p.colors[0] : (p.color||"");
      return `<a class="prod-card" href="/product.html?slug=${encodeURIComponent(p.slug)}">
        <div class="prod-img"><img src="${p.image}" alt="${tc(p.name)}" loading="lazy"></div>
        <div class="prod-name">${tc(p.name)}</div>
        ${color?`<div class="prod-color">${tc(color)}</div>`:""}
        <div class="prod-price">${fp(p.price)}</div>
      </a>`;
    }

    function emptyMsg(cat) {
      return `<div style="grid-column:1/-1;text-align:center;padding:40px;font-size:11px;color:#6e675f;letter-spacing:.12em;text-transform:uppercase;">No new ${cat} yet — check back soon.</div>`;
    }

    function fillGrid(id, items, cat) {
      const el = document.getElementById(id);
      if (!el) return;
      const filtered = items.filter(p => normalizeCategory(p) === cat).slice(0, 4);
      el.innerHTML = filtered.length ? filtered.map(prodCard).join("") : emptyMsg(cat);
    }

    async function loadProducts() {
      try {
        const res = await fetch(API);
        const data = await res.json();
        const newIn = (Array.isArray(data) ? data : []).filter(p => p.new_in && p.image);

        // All new in
        const allEl = document.getElementById("allGrid");
        allEl.innerHTML = newIn.length ? newIn.map(prodCard).join("") : emptyMsg("arrivals");

        // By category
        fillGrid("topsGrid", newIn, "tops");
        fillGrid("dressesGrid", newIn, "dresses");
        fillGrid("knitwearGrid", newIn, "knitwear");
        fillGrid("jacketsGrid", newIn, "jackets");
        fillGrid("trousersGrid", newIn, "trousers");

      } catch(e) {
        document.getElementById("allGrid").innerHTML = '<div style="grid-column:1/-1;padding:60px;text-align:center;color:#6e675f;">Unable to load products.</div>';
      }
    }

    document.addEventListener("DOMContentLoaded", () => { loadProducts(); });
    window.addEventListener("pageshow", () => { if(typeof ltn_updateCartCount==="function") ltn_updateCartCount(); });
  </script>
</body>
</html>
