<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Le Top Notch — New In</title>

  <style>
    :root{
      --bg:#f7f4ef;
      --text:#171717;
      --muted:#6e675f;
      --line:#e7e0d7;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:"Helvetica Neue", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    a{text-decoration:none;color:inherit}
    img{width:100%;display:block}

    /* HEADER */
    .header{
      padding:20px;
      text-align:center;
      font-size:12px;
      letter-spacing:.2em;
      text-transform:uppercase;
      border-bottom:1px solid var(--line);
    }

    /* HERO */
    .hero{
      position:relative;
      height:70vh;
      overflow:hidden;
    }

    .hero img{
      height:100%;
      object-fit:cover;
    }

    .hero-text{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      color:white;
      text-align:center;
    }

    .hero-title{
      font-size:50px;
      letter-spacing:.1em;
    }

    /* GRID */
    .grid{
      max-width:900px;
      margin:40px auto;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .tile{
      position:relative;
      overflow:hidden;
    }

    .tile img{
      height:100%;
      object-fit:cover;
    }

    .tile-label{
      position:absolute;
      bottom:20px;
      left:20px;
      color:white;
      font-size:14px;
      letter-spacing:.1em;
      text-transform:uppercase;
    }

    /* BUTTON */
    .cta{
      text-align:center;
      margin:40px 0;
    }

    .cta a{
      border:1px solid black;
      padding:12px 30px;
      font-size:10px;
      letter-spacing:.2em;
      text-transform:uppercase;
    }
  </style>
</head>

<body>

  <div class="header">LE TOP NOTCH</div>

  <section class="hero">
    <img src="https://via.placeholder.com/1400x1800/f1ece4/7d746a?text=NEW+IN" />
    <div class="hero-text">
      <div class="hero-title">New In</div>
    </div>
  </section>

  <section class="grid">

    <a class="tile" href="products.html?group=new-in&category=tops">
      <img src="https://via.placeholder.com/800x1000/e7dfd5/7d746a?text=TOPS">
      <span class="tile-label">Tops</span>
    </a>

    <a class="tile" href="products.html?group=new-in&category=dresses">
      <img src="https://via.placeholder.com/800x1000/e7dfd5/7d746a?text=DRESSES">
      <span class="tile-label">Dresses</span>
    </a>

    <a class="tile" href="products.html?group=new-in&category=jackets">
      <img src="https://via.placeholder.com/800x1000/e7dfd5/7d746a?text=JACKETS">
      <span class="tile-label">Jackets</span>
    </a>

    <a class="tile" href="products.html?group=new-in&category=knitwear">
      <img src="https://via.placeholder.com/800x1000/e7dfd5/7d746a?text=KNITWEAR">
      <span class="tile-label">Knitwear</span>
    </a>

  </section>

  <div class="cta">
    <a href="products.html?group=new-in">View All New In</a>
  </div>

</body>
</html>
