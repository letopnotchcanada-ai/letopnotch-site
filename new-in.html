<!DOCTYPE html>
<html lang="en">
<head>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Top Notch — About</title>
  <meta name="description" content="About Le Top Notch..." />
  
  <!-- ✅ CLARITY FIRST - Must load before other scripts -->
  <script src="/clarity.js"></script>
  
  <script src="/global.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}

    .page-head{padding:56px 0 40px;text-align:center;border-bottom:1px solid #e7e0d7;}
    .page-tag{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#9a9186;margin-bottom:14px;}
    .page-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(52px,8vw,110px);font-weight:400;line-height:.85;letter-spacing:-.02em;text-transform:uppercase;color:#171717;}

    .cat-nav{border-bottom:1px solid #e7e0d7;overflow-x:auto;scrollbar-width:none;}
    .cat-nav::-webkit-scrollbar{display:none;}
    .cat-nav-inner{display:flex;align-items:center;width:min(1600px,calc(100% - 40px));margin:0 auto;}
    .cat-nav a{flex-shrink:0;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#6e675f;padding:16px 20px;border-bottom:1.5px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;cursor:pointer;}
    .cat-nav a:hover,.cat-nav a.active{color:#171717;border-bottom-color:#171717;}

    .page-wrap{width:min(1600px,calc(100% - 40px));margin:0 auto;padding:48px 0 80px;}

    .cat-sec{margin-bottom:64px;}
    .cat-head{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:28px;border-bottom:1px solid #e7e0d7;margin-bottom:28px;}
    .cat-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(32px,4vw,60px);font-weight:400;letter-spacing:-.02em;text-transform:uppercase;line-height:.9;}
    .cat-count{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#9a9186;margin-bottom:6px;}
    .cat-lnk{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#6e675f;border-bottom:1px solid currentColor;padding-bottom:2px;white-space:nowrap;}
    .cat-lnk:hover{color:#171717;border-color:#171717;}

    .prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px 16px;}
    .product-card{display:block;position:relative;}
    .product-image-wrap{aspect-ratio:4/5;overflow:hidden;background:#f4efe8;margin-bottom:11px;position:relative;padding:22px;display:flex;align-items:center;justify-content:center;border:1px solid #efe8de;}
    .product-image-wrap img{width:calc(100% - 44px);height:calc(100% - 44px);position:absolute;inset:22px;object-fit:contain;object-position:center center;display:block;transition:opacity .4s ease,transform .5s ease;background:transparent;}
    .product-image-wrap .img-secondary{position:absolute;inset:22px;width:calc(100% - 44px);height:calc(100% - 44px);opacity:0;transition:opacity .4s ease;}
    .product-card.has-hover:hover .img-primary{opacity:0;}
    .product-card.has-hover:hover .img-secondary{opacity:1;}
    .prod-info{padding:12px 2px 0;}
    .prod-name{font-size:11px;text-transform:uppercase;letter-spacing:.065em;font-weight:500;margin-bottom:3px;line-height:1.3;}
    .prod-color{font-size:11px;color:#6e675f;margin-bottom:2px;line-height:1.35;}
    .prod-price{font-size:11px;color:#6e675f;line-height:1.35;}

    /* QUICK SHOP */
    .qs-panel{position:absolute;left:0;right:0;bottom:0;background:rgba(247,244,239,.98);backdrop-filter:blur(6px);border-top:1px solid #e7e0d7;padding:14px 14px 12px;z-index:4;transform:translateY(102%);transition:transform .28s cubic-bezier(.22,.61,.36,1);pointer-events:none;}
    .product-card:hover .qs-panel{transform:translateY(0);pointer-events:auto;}
    .qs-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;line-height:1.3;}
    .qs-price{font-size:11px;color:#6e675f;margin-bottom:8px;}
    .qs-colors{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#6e675f;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .qs-colors strong{color:#171717;}
    .qs-sizes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
    .qs-sz{min-width:32px;height:28px;border:1px solid #e7e0d7;background:#fff;font-size:9px;letter-spacing:.06em;padding:0 6px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
    .qs-sz:hover,.qs-sz.selected{background:#171717;color:#fff;border-color:#171717;}
    .qs-sz.sold-out{color:#c8c0b8;cursor:not-allowed;text-decoration:line-through;}
    .qs-btn{width:100%;min-height:36px;background:#171717;color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.16em;transition:opacity .2s;display:flex;align-items:center;justify-content:center;padding:0 14px;}
    .qs-btn:hover{opacity:.84;}
    .qs-btn:disabled{opacity:.45;cursor:not-allowed;}
    .wl-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:5;opacity:0;transition:opacity .2s;color:#171717;border:1px solid rgba(231,224,215,.8);}
    .product-card:hover .wl-btn{opacity:1;}
    .wl-btn.active{color:#c0392b;opacity:1;}
    #ltn-qs-toast{position:fixed;bottom:28px;right:28px;background:#171717;color:#fff;padding:14px 20px;font-size:10px;text-transform:uppercase;letter-spacing:.14em;z-index:9000;transform:translateY(20px);opacity:0;transition:all .28s ease;pointer-events:none;}
    #ltn-qs-toast.on{transform:translateY(0);opacity:1;}

    .sk-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:28px 16px;}
    .sk-card .product-image-wrap{background:linear-gradient(90deg,#ede8e0 25%,#e2dbd3 50%,#ede8e0 75%);background-size:400% 100%;animation:sh 1.8s ease infinite;}
    .sk-line{height:10px;border-radius:2px;margin-bottom:6px;background:linear-gradient(90deg,#ede8e0 25%,#e2dbd3 50%,#ede8e0 75%);background-size:400% 100%;animation:sh 1.8s ease infinite;}
    @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

    .empty{text-align:center;padding:80px 20px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9a9186;}

    @media(max-width:1100px){
      .prod-grid{grid-template-columns:repeat(3,1fr);}
      .sk-wrap{grid-template-columns:repeat(3,1fr);}
    }
    @media(max-width:700px){
      .prod-grid{grid-template-columns:repeat(2,1fr);gap:16px 10px;}
      .sk-wrap{grid-template-columns:repeat(2,1fr);gap:16px 10px;}
      .page-head{padding:36px 0 28px;}
      .cat-head{flex-direction:column;align-items:flex-start;gap:8px;padding-bottom:18px;margin-bottom:18px;}
      .cat-nav a{padding:14px 14px;font-size:9px;}
      .page-wrap{padding:28px 0 60px;}
      .cat-sec{margin-bottom:44px;}
      .product-image-wrap{padding:14px;}
      .product-image-wrap img,.product-image-wrap .img-secondary{inset:14px;width:calc(100% - 28px);height:calc(100% - 28px);}
    }
    @media(max-width:640px){
      .qs-panel{display:none;}
      .wl-btn{display:none;}
    }
    @media(max-width:400px){
      .prod-grid{gap:12px 6px;}
      .page-wrap{width:calc(100% - 20px);}
    }
  </style>
</head>
<body>
<div id="ltn-header"></div>

<div class="page-head">
  <div class="page-tag">Spring / Summer 2026</div>
  <h1 class="page-title">New In</h1>
</div>

<nav class="cat-nav">
  <div class="cat-nav-inner" id="catNav">
    <a class="active" onclick="filterCat('all',this)">All</a>
    <a onclick="filterCat('tops',this)">Tops</a>
    <a onclick="filterCat('dresses',this)">Dresses</a>
    <a onclick="filterCat('knitwear',this)">Knitwear</a>
    <a onclick="filterCat('jackets',this)">Jackets &amp; Coats</a>
    <a onclick="filterCat('trousers',this)">Trousers</a>
    <a onclick="filterCat('skirts',this)">Skirts</a>
  </div>
</nav>

<div class="page-wrap">
  <div id="content">
    <div class="cat-sec">
      <div class="sk-wrap" id="skeleton">
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:65%"></div><div class="sk-line" style="width:40%"></div></div>
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:55%"></div><div class="sk-line" style="width:35%"></div></div>
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:42%"></div></div>
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:60%"></div><div class="sk-line" style="width:38%"></div></div>
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:50%"></div><div class="sk-line" style="width:36%"></div></div>
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:68%"></div><div class="sk-line" style="width:44%"></div></div>
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:58%"></div><div class="sk-line" style="width:40%"></div></div>
        <div class="sk-card product-card"><div class="product-image-wrap"></div><div class="sk-line" style="width:62%"></div><div class="sk-line" style="width:37%"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="ltn-footer"></div>

<script>
const API = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
let allProducts = [];
let currentCat = "all";

const CAT_DEFS = [
  {key:"tops",     label:"Tops",            href:"/products.html?group=new-in&category=tops"},
  {key:"dresses",  label:"Dresses",         href:"/products.html?group=new-in&category=dresses"},
  {key:"knitwear", label:"Knitwear",        href:"/products.html?group=new-in&category=knitwear"},
  {key:"jackets",  label:"Jackets & Coats", href:"/products.html?group=new-in&category=jackets"},
  {key:"trousers", label:"Trousers",        href:"/products.html?group=new-in&category=trousers"},
  {key:"skirts",   label:"Skirts",          href:"/products.html?group=new-in&category=skirts"},
];

function fmt(v){const n=Number(v);return(!isFinite(n)||n<=0)?"":"CAD $"+n.toFixed(2).replace(".00","");}
function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function sl(p){return encodeURIComponent(p.slug||"");}

function normCat(p){
  const r=String(p.category||"").trim().toLowerCase().replace(/[^a-z]/g,"");
  if(r.includes("dress")) return "dresses";
  if(r.includes("jacket")||r.includes("coat")||r.includes("blazer")) return "jackets";
  if(r.includes("trouser")||r.includes("pant")) return "trousers";
  if(r.includes("skirt")) return "skirts";
  if(r.includes("knit")||r.includes("sweater")) return "knitwear";
  const n=(p.name||"").toLowerCase();
  if(n.includes("dress")) return "dresses";
  if(n.includes("jacket")||n.includes("coat")) return "jackets";
  if(n.includes("trouser")) return "trousers";
  if(n.includes("skirt")) return "skirts";
  if(n.includes("knit")||n.includes("sweater")) return "knitwear";
  return "tops";
}

function isNew(p){return p.new_in===true||p.new_in===1||p.new_in==="true";}

function cardHTML(p){
  const color = Array.isArray(p.colors)&&p.colors.length ? p.colors[0] : (p.color||"");
  const allColors = Array.isArray(p.colors) ? p.colors : (p.color ? [p.color] : []);
  const sec = p.gallery_2 || p.gallery_3 || (Array.isArray(p.gallery_1)&&p.gallery_1[0]?.url) || "";
  const sizes = Array.isArray(p.sizes) && p.sizes.length ? p.sizes : [];
  const hasHover = sec ? " has-hover" : "";
  
  let sizeHTML = "";
  if(sizes.length > 0){
    sizeHTML = sizes.map(s => {
      const sold = s.stock === 0 || s.in_stock === false;
      const cls = sold ? "qs-sz sold-out" : "qs-sz";
      return `<button class="${cls}" data-size="${s.size||s}" ${sold?"disabled":""}>${s.size||s}</button>`;
    }).join("");
  }
  
  return `<a class="product-card${hasHover}" href="/product.html?slug=${sl(p)}">
    <div class="product-image-wrap">
      <img class="img-primary" src="${p.image}" alt="${tc(p.name)}" loading="lazy">
      ${sec?`<img class="img-secondary" src="${sec}" alt="${tc(p.name)}" loading="lazy">`:""}
      <button class="wl-btn" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('active')">♡</button>
      <div class="qs-panel">
        <div class="qs-name">${tc(p.name)}</div>
        <div class="qs-price">${fmt(p.price)}</div>
        ${allColors.length > 0 ? `<div class="qs-colors">Color: <strong>${tc(allColors[0])}</strong></div>` : ""}
        ${sizeHTML ? `<div class="qs-sizes">${sizeHTML}</div>` : ""}
        <button class="qs-btn" data-slug="${sl(p)}" ${sizes.length===0?`data-size="One Size"`:""}>
          <span>Quick Shop</span>
        </button>
      </div>
    </div>
    <div class="prod-info">
      <div class="prod-name">${tc(p.name)}</div>
      ${color?`<div class="prod-color">${tc(color)}</div>`:""}
      <div class="prod-price">${fmt(p.price)}</div>
    </div>
  </a>`;
}

function render(){
  const content = document.getElementById("content");
  let html = "";

  if(currentCat === "all"){
    CAT_DEFS.forEach(({key,label,href})=>{
      const items = allProducts.filter(p=>normCat(p)===key);
      if(!items.length) return;
      html += `<div class="cat-sec">
        <div class="cat-head">
          <div>
            <div class="cat-count">${items.length} ${items.length===1?"piece":"pieces"}</div>
            <div class="cat-title">${label}</div>
          </div>
          <a href="${href}" class="cat-lnk">View All ${label}</a>
        </div>
        <div class="prod-grid shop-grid">${items.map(cardHTML).join("")}</div>
      </div>`;
    });
  } else {
    const def = CAT_DEFS.find(d=>d.key===currentCat);
    const items = allProducts.filter(p=>normCat(p)===currentCat);
    if(items.length){
      html = `<div class="cat-sec">
        <div class="cat-head">
          <div>
            <div class="cat-count">${items.length} ${items.length===1?"piece":"pieces"}</div>
            <div class="cat-title">${def?def.label:currentCat}</div>
          </div>
        </div>
        <div class="prod-grid shop-grid">${items.map(cardHTML).join("")}</div>
      </div>`;
    } else {
      html = `<div class="empty">No new arrivals in this category yet.</div>`;
    }
  }

  if(!html) html = `<div class="empty">No new arrivals yet — check back soon.</div>`;
  content.innerHTML = html;
  
  if(typeof ltn_initQuickShop === "function") {
    setTimeout(() => ltn_initQuickShop(), 100);
  }
}

function filterCat(cat, el){
  currentCat = cat;
  document.querySelectorAll("#catNav a").forEach(a=>a.classList.remove("active"));
  if(el) el.classList.add("active");
  render();
  const nav = document.querySelector(".cat-nav");
  if(nav) window.scrollTo({top: nav.offsetTop - 60, behavior:"smooth"});
}

async function load(){
  try{
    const res = await fetch(API);
    const all = await res.json();
    allProducts = all.filter(p=>isNew(p)&&p.image&&p.in_stock!==false);
    if(allProducts.length < 4) allProducts = all.filter(p=>p.image);
    allProducts.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    render();
  } catch(e){
    document.getElementById("content").innerHTML = `<div class="empty">Unable to load products. Please refresh.</div>`;
  }
}

document.addEventListener("DOMContentLoaded", load);
window.addEventListener("pageshow", ()=>{ if(typeof ltn_updateCartCount==="function") ltn_updateCartCount(); });
</script>
</body>
</html>
