<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New In — Le Top Notch</title>
  <script src="/global.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}

    /* HERO */
    .hero{position:relative;height:92vh;overflow:hidden;background:#d9d2c8;}
    .hero img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;}
    .hero-over{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(0,0,0,.03),rgba(0,0,0,.32));}
    .hero-sub{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:14px;}
    .hero-h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(82px,13vw,190px);font-weight:400;line-height:.8;letter-spacing:-.02em;text-transform:uppercase;color:#fff;text-align:center;}
    .hero-cta{margin-top:38px;height:46px;padding:0 40px;background:#111;color:#fff;display:inline-flex;align-items:center;font-size:9px;text-transform:uppercase;letter-spacing:.22em;transition:background .2s;}
    .hero-cta:hover{background:#333;}

    /* MOSAIC */
    .mosaic{display:flex;flex-direction:column;gap:3px;padding:3px;}
    .row{display:flex;gap:3px;}

    /* Shared card */
    .mc{position:relative;overflow:hidden;background:#e8e2d9;display:block;cursor:pointer;}
    .mc{height:100%;}
    .mc img{width:100%;height:100%;object-fit:cover;object-position:center 12%;display:block;transition:transform .65s cubic-bezier(.25,.46,.45,.94);}
    .mc:hover img{transform:scale(1.04);}
    .mc-info{position:absolute;bottom:0;left:0;right:0;padding:32px 18px 18px;background:linear-gradient(to top,rgba(0,0,0,.58),transparent);color:#fff;opacity:0;transition:opacity .28s;pointer-events:none;}
    .mc:hover .mc-info{opacity:1;}
    .mc-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
    .mc-price{font-size:11px;opacity:.82;}

    /* Color story label strip */
    .color-label{padding:28px 40px 0;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#9a9186;}

    /* ROW PATTERNS */
    /* A: big (58%) + 2 stacked */
    .pA{height:85vh;}
    .pA .big{flex:0 0 58%;}
    .pA .stk{flex:1;display:flex;flex-direction:column;gap:3px;}
    .pA .stk .mc{flex:1;}
    /* B: 3 equal portrait */
    .pB .mc{flex:1;aspect-ratio:2/3;}
    /* C: 4 equal portrait */
    .pC .mc{flex:1;aspect-ratio:3/4;}
    /* D: editorial text + tall image */
    .pD{min-height:68vh;align-items:stretch;}
    .pD-text{flex:0 0 38%;display:flex;flex-direction:column;justify-content:center;padding:64px 60px;background:#ebe6de;}
    .pD .mc{flex:1;min-height:68vh;}
    .pD-lbl{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:#9a9186;margin-bottom:14px;}
    .pD-h{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(32px,3.8vw,60px);font-weight:400;letter-spacing:-.02em;line-height:1;text-transform:uppercase;margin-bottom:18px;}
    .pD-p{font-size:12px;color:#6e675f;line-height:1.9;max-width:30ch;margin-bottom:28px;}
    .pD-a{font-size:9px;text-transform:uppercase;letter-spacing:.18em;border-bottom:1px solid #171717;padding-bottom:2px;display:inline-block;}
    .pD .mc{flex:1;}
    /* E: wide (62%) + 2 stacked */
    .pE{height:76vh;}
    .pE .wide{flex:0 0 62%;}
    .pE .stk{flex:1;display:flex;flex-direction:column;gap:3px;}
    .pE .stk .mc{flex:1;}
    /* F: 2 equal tall */
    .pF{height:78vh;}
    .pF .mc{flex:1;}
    /* G: 5 narrow */
    .pG .mc{flex:1;aspect-ratio:2/3;}
    /* H: 1 full width tall */
    .pH{height:70vh;}
    .pH .mc{flex:1;}
    /* I: narrow (30%) + wide (70%) */
    .pI{height:72vh;}
    .pI .narrow{flex:0 0 32%;}
    .pI .wide{flex:1;}

    /* Skeleton */
    .sk{background:linear-gradient(90deg,#ede8e0 25%,#e2dbd3 50%,#ede8e0 75%);background-size:400% 100%;animation:sh 1.8s ease infinite;}
    @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

    /* CATEGORY SECTIONS */
    .cats{max-width:1400px;margin:0 auto;padding:0 40px 80px;}
    .cats-intro{padding:72px 0 48px;border-top:1px solid #e7e0d7;}
    .cats-intro-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(28px,3vw,48px);font-weight:400;letter-spacing:-.015em;text-transform:uppercase;margin-bottom:10px;}
    .cats-intro-sub{font-size:12px;color:#6e675f;max-width:48ch;line-height:1.8;}
    .cat-sec{padding-bottom:64px;}
    .cat-head{display:flex;align-items:flex-end;justify-content:space-between;padding:48px 0 32px;border-top:1px solid #e7e0d7;}
    .cat-left .cat-lbl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#9a9186;margin-bottom:8px;}
    .cat-left .cat-ttl{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(34px,4vw,68px);font-weight:400;letter-spacing:-.02em;text-transform:uppercase;line-height:.9;}
    .cat-lnk{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#6e675f;border-bottom:1px solid currentColor;padding-bottom:2px;white-space:nowrap;margin-bottom:6px;}
    .cat-lnk:hover{color:#111;border-color:#111;}
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px 14px;}
    .pc{display:block;}
    .pc-img{aspect-ratio:2/3;overflow:hidden;background:#f5f2ee;margin-bottom:11px;}
    .pc-img img{width:100%;height:100%;object-fit:contain;object-position:center center;background:#f5f2ee;display:block;transition:transform .5s ease;}
    .pc:hover .pc-img img{transform:scale(1.03);}
    .pc-name{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:3px;}
    .pc-color{font-size:11px;color:#6e675f;margin-bottom:2px;}
    .pc-price{font-size:11px;color:#6e675f;}

    @media(max-width:1024px){
      .cat-grid{grid-template-columns:repeat(2,1fr);}
      .pA,.pE,.pF,.pH,.pI{height:auto;}
      .pA .big,.pE .wide,.pF .mc,.pH .mc{height:60vw;flex:none;width:100%;}
    }
    @media(max-width:700px){
      .row{flex-direction:column;}
      .pA,.pE,.pF,.pH{height:auto;}
      .pA .big,.pE .wide,.pF .mc,.pH .mc{height:75vw;flex:none;}
      .pI .narrow,.pI .wide{height:75vw;flex:none;}
      .pA .stk,.pE .stk{flex-direction:row;}
      .pA .stk .mc,.pE .stk .mc{height:45vw;}
      .pD{flex-direction:column;}
      .pD-text{padding:32px 20px;}
      .pD-h{font-size:clamp(28px,7vw,44px);}
      .cats{padding:0 16px 60px;}
      .cat-grid{grid-template-columns:repeat(2,1fr);gap:14px 10px;}
      .color-label{padding:18px 16px 0;}
      .hero{height:65vh;}
      .hero-h1{font-size:clamp(64px,16vw,130px);}
      .pI{flex-direction:column;}
      .pc-name{font-size:12px;}
      .pc-color,.pc-price{font-size:12px;}
      .cat-ttl{font-size:clamp(28px,7vw,44px);}
      .cats-intro-title{font-size:clamp(22px,5vw,36px);}
      .cats-intro-sub{font-size:11px;}
      .cat-head{padding:32px 0 20px;}
    }
  </style>
</head>
<body>
<div id="ltn-header"></div>

<section class="hero">
  <img id="heroImg" src="https://letopnotch-site.pages.dev/images/home-tile-new-in.webp" alt="New In SS26">
  <div class="hero-over">
    <div class="hero-sub">Spring / Summer 2026</div>
    <h1 class="hero-h1">New<br>In</h1>
    <a href="/products.html?group=new-in" class="hero-cta">Discover the Collection</a>
  </div>
</section>

<div id="mosaic" class="mosaic">
  <div class="row pA sk" style="height:85vh;"></div>
  <div class="row pB sk" style="aspect-ratio:3/1;"></div>
</div>

<div id="cats" class="cats"></div>

<div id="ltn-footer"></div>

<script>
const API   = "https://letopnotch-api-v2.letopnotchcanada.workers.dev/products";
const ASSETS= "https://letopnotch-api-v2.letopnotchcanada.workers.dev/assets";

function fmt(v){const n=Number(v);return(!isFinite(n)||n<=0)?"":"CAD $"+n.toFixed(2).replace(".00","");}
function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function sl(p){return encodeURIComponent(p.slug||p.id||"");}

// ── COLOR FAMILY CLASSIFICATION ──────────────────────────────────────────────
const COLOR_FAMILIES = {
  white:   ["white","cream","ivory","off white","offwhite","ecru","snow","chalk","milk","vanilla","cream white","cream beige","off-white"],
  black:   ["black","onyx","jet","charcoal","ebony","noir","graphite","dark"],
  beige:   ["beige","camel","sand","tan","nude","taupe","wheat","oat","latte","khaki","bone","cream orange","cream beige","cafe","coffee"],
  grey:    ["grey","gray","silver","slate","ash","pewter","smoke","dove","steel"],
  navy:    ["navy","navy blue","midnight","indigo","cobalt","marine","ocean","sapphire"],
  blue:    ["blue","light blue","sky","azure","powder blue","denim","teal","turquoise","aqua","cornflower"],
  green:   ["green","olive","sage","forest","emerald","mint","hunter","khaki","moss","olive green"],
  red:     ["red","burgundy","bordeaux","wine","crimson","scarlet","cherry","rose","raspberry","ruby"],
  pink:    ["pink","blush","light pink","mauve","dusty pink","fuchsia","hot pink","salmon","peach","cream rose","dark pink"],
  brown:   ["brown","chocolate","mocha","espresso","chestnut","walnut","rust","sienna","amber","copper","dark brown"],
  purple:  ["purple","lavender","lilac","violet","plum","eggplant","mauve"],
  yellow:  ["yellow","mustard","gold","golden","amber","lemon","ochre"],
  orange:  ["orange","terracotta","burnt orange","tangerine","coral"],
  multi:   ["multi","multicolor","print","pattern","stripe","floral","check"],
};

function getColorFamily(p){
  const colors = (Array.isArray(p.colors)?p.colors:[p.color||""]).join(" ").toLowerCase();
  for(const [family, keywords] of Object.entries(COLOR_FAMILIES)){
    if(keywords.some(k => colors.includes(k))) return family;
  }
  // fallback: guess from name
  const name = (p.name||"").toLowerCase();
  for(const [family, keywords] of Object.entries(COLOR_FAMILIES)){
    if(keywords.some(k => name.includes(k))) return family;
  }
  return "neutral";
}

// Group by color family, sort within each group by name for stability
function groupByColor(products){
  const groups = {};
  for(const p of products){
    const f = getColorFamily(p);
    if(!groups[f]) groups[f]=[];
    groups[f].push(p);
  }
  // Sort each group by name for stable order
  for(const g of Object.values(groups)) g.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  return groups;
}

// Interleave color families so adjacent cards contrast nicely
// Pattern: white/cream → black/grey → beige/camel → blue/navy → pink/red → green/brown → repeat
const COLOR_ORDER = ["white","beige","black","blue","pink","grey","red","green","navy","brown","purple","yellow","orange","multi","neutral"];

function buildOrderedPool(groups){
  const ordered = [];
  const queues = {};
  for(const family of COLOR_ORDER){
    if(groups[family]?.length) queues[family] = [...groups[family]];
  }
  // Any families not in order
  for(const [f,arr] of Object.entries(groups)){
    if(!queues[f] && arr.length) queues[f]=[...arr];
  }
  const families = Object.keys(queues);
  let fi = 0;
  while(families.some(f=>queues[f]?.length)){
    const f = families[fi%families.length];
    if(queues[f]?.length) ordered.push(queues[f].shift());
    fi++;
    if(fi>10000) break;
  }
  return ordered;
}

// ── NORMCAT ───────────────────────────────────────────────────────────────────
function normCat(p){
  const r=String(p.category||"").trim().toLowerCase().replace(/[^a-z]/g,"");
  if(r.includes("dress")) return "dresses";
  if(r.includes("jacket")||r.includes("coat")||r.includes("blazer")) return "jackets";
  if(r.includes("trouser")||r.includes("pant")) return "trousers";
  if(r.includes("skirt")) return "skirts";
  if(r.includes("knit")||r.includes("sweater")) return "knitwear";
  const n=(p.name||"").toLowerCase();
  if(n.includes("dress")) return "dresses";
  if(n.includes("jacket")||n.includes("coat")) return "jackets";
  if(n.includes("trouser")) return "trousers";
  if(n.includes("skirt")) return "skirts";
  if(n.includes("knit")||n.includes("sweater")) return "knitwear";
  return "tops";
}

function isNew(p){
  return p.new_in===true||p.new_in===1||p.new_in==="true"||p.new_in==="checked"||
         p.newIn===true||p["New In"]===true;
}

// ── CARD BUILDERS ─────────────────────────────────────────────────────────────
function mc(p){
  if(!p) return `<div class="mc sk"></div>`;
  return `<a class="mc" href="/product.html?slug=${sl(p)}">
    <img src="${p.image}" alt="${tc(p.name)}" loading="lazy">
    <div class="mc-info">
      <div class="mc-name">${tc(p.name)}</div>
      <div class="mc-price">${fmt(p.price)}</div>
    </div>
  </a>`;
}

function pc(p){
  const color=Array.isArray(p.colors)&&p.colors.length?p.colors[0]:(p.color||"");
  return `<a class="pc" href="/product.html?slug=${sl(p)}">
    <div class="pc-img"><img src="${p.image}" alt="${tc(p.name)}" loading="lazy"></div>
    <div class="pc-name">${tc(p.name)}</div>
    ${color?`<div class="pc-color">${tc(color)}</div>`:""}
    <div class="pc-price">${fmt(p.price)}</div>
  </a>`;
}

// ── EDITORIAL TEXT PANELS (fixed, not products) ────────────────────────────
const editorials = [
  {lbl:"New In — SS26", h:"The New<br>Collection", p:"Refined silhouettes, considered fabrics and effortless style — curated for the Le Top Notch woman.", lnk:"Shop All New In", href:"/products.html?group=new-in"},
  {lbl:"Knitwear", h:"Soft<br>Textures", p:"This season's knitwear arrives in tonal shades and tactile weaves — pieces that feel as beautiful as they look.", lnk:"Explore Knitwear", href:"/products.html?group=new-in&category=knitwear"},
  {lbl:"Dresses", h:"New<br>Silhouettes", p:"From fluid midis to structured cuts — the new dress edit for a woman who moves through the world with intention.", lnk:"Discover Dresses", href:"/products.html?group=new-in&category=dresses"},
];
let editIdx = 0;

function editPanel(){
  const e = editorials[editIdx % editorials.length];
  editIdx++;
  return `<div class="pD-text">
    <div class="pD-lbl">${e.lbl}</div>
    <div class="pD-h">${e.h}</div>
    <div class="pD-p">${e.p}</div>
    <a href="${e.href}" class="pD-a">${e.lnk}</a>
  </div>`;
}

// ── MOSAIC BUILDER ────────────────────────────────────────────────────────────
// Fixed pattern sequence — products slot in deterministically
function buildMosaic(pool){
  let html="";
  let i=0;
  const n=pool.length;
  let patIdx=0;

  // Fixed pattern definitions: [name, productsConsumed]
  const patterns=[
    // 0: Big left + 2 stacked right (3 products)
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2]; i+=3;
      return `<div class="row pA">${mc(a)&&`<div class="big">${mc(a)}</div>`}<div class="stk">${mc(b)}${mc(c)}</div></div>`;
    },
    // 1: 3 equal portrait (3 products)
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2]; i+=3;
      return `<div class="row pB">${mc(a)}${mc(b)}${mc(c)}</div>`;
    },
    // 2: Editorial text + 1 product
    ()=>{
      const a=pool[i]; i+=1;
      return `<div class="row pD">${editPanel()}${mc(a)}</div>`;
    },
    // 3: 4 equal portrait (4 products)
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2],d=pool[i+3]; i+=4;
      return `<div class="row pC">${mc(a)}${mc(b)}${mc(c)}${mc(d)}</div>`;
    },
    // 4: Wide (62%) + 2 stacked (3 products)
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2]; i+=3;
      return `<div class="row pE"><div class="wide">${mc(a)}</div><div class="stk">${mc(b)}${mc(c)}</div></div>`;
    },
    // 5: 2 tall equal (2 products)
    ()=>{
      const a=pool[i],b=pool[i+1]; i+=2;
      return `<div class="row pF">${mc(a)}${mc(b)}</div>`;
    },
    // 6: 5 narrow (5 products)
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2],d=pool[i+3],e=pool[i+4]; i+=5;
      return `<div class="row pG">${mc(a)}${mc(b)}${mc(c)}${mc(d)}${mc(e)}</div>`;
    },
    // 7: Narrow (32%) + wide (3 products — 1 narrow, 2 stacked in wide slot)
    ()=>{
      const a=pool[i],b=pool[i+1]; i+=2;
      return `<div class="row pI"><div class="narrow">${mc(a)}</div><div class="wide">${mc(b)}</div></div>`;
    },
    // 8: 3 equal again
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2]; i+=3;
      return `<div class="row pB">${mc(a)}${mc(b)}${mc(c)}</div>`;
    },
    // 9: Editorial + product
    ()=>{
      const a=pool[i]; i+=1;
      return `<div class="row pD">${editPanel()}${mc(a)}</div>`;
    },
    // 10: 4 equal
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2],d=pool[i+3]; i+=4;
      return `<div class="row pC">${mc(a)}${mc(b)}${mc(c)}${mc(d)}</div>`;
    },
    // 11: Big left + 2 stacked
    ()=>{
      const a=pool[i],b=pool[i+1],c=pool[i+2]; i+=3;
      return `<div class="row pA"><div class="big">${mc(a)}</div><div class="stk">${mc(b)}${mc(c)}</div></div>`;
    },
  ];

  while(i < n){
    const pat = patterns[patIdx % patterns.length];
    // Check we have enough products left
    if(i >= n) break;
    html += pat();
    patIdx++;
    // Prevent infinite loop if a pattern didn't advance i
    if(i >= n) break;
  }
  return html;
}

// ── CATEGORY SECTION BUILDER ──────────────────────────────────────────────────
function buildCats(reserved){
  const defs=[
    {key:"tops",    title:"Tops",          href:"/products.html?group=new-in&category=tops"},
    {key:"dresses", title:"Dresses",       href:"/products.html?group=new-in&category=dresses"},
    {key:"knitwear",title:"Knitwear",      href:"/products.html?group=new-in&category=knitwear"},
    {key:"jackets", title:"Jackets & Coats",href:"/products.html?group=new-in&category=jackets"},
    {key:"trousers",title:"Trousers",      href:"/products.html?group=new-in&category=trousers"},
    {key:"skirts",  title:"Skirts",        href:"/products.html?group=new-in&category=skirts"},
  ];

  let html=`<div class="cats-intro">
    <div class="cats-intro-title">Shop by Category</div>
    <div class="cats-intro-sub">Discover the full new-in edit, organised by category — each piece a considered arrival for the new season.</div>
  </div>`;

  defs.forEach(({key,title,href})=>{
    const items=reserved[key]||[];
    if(!items.length) return;
    html+=`<div class="cat-sec">
      <div class="cat-head">
        <div class="cat-left">
          <div class="cat-lbl">New In</div>
          <div class="cat-ttl">${title}</div>
        </div>
        <a href="${href}" class="cat-lnk">Shop All ${title}</a>
      </div>
      <div class="cat-grid">${items.map(pc).join("")}</div>
    </div>`;
  });
  return html;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
async function load(){
  // Hero from assets
  try{
    const ar=await fetch(ASSETS);
    const assets=await ar.json();
    const h=assets["new-in-hero"]||assets["hero-new-in"]||assets["new-in-tile-shop-all"];
    if(h?.url) document.getElementById("heroImg").src=h.url;
  }catch(e){}

  // Products
  const res=await fetch(API);
  const all=await res.json();

  let pool=all.filter(p=>isNew(p)&&p.image);
  if(pool.length<8) pool=all.filter(p=>p.image);

  // Sort alphabetically by name for stable order (no randomness)
  pool.sort((a,b)=>(a.name||"").localeCompare(b.name||""));

  // Reserve 4 per category from the END of each color-sorted group
  // This ensures the same 4 always appear at bottom
  const cats=["tops","dresses","knitwear","jackets","trousers","skirts"];
  const reserved={};
  const reservedIds=new Set();

  // For each category, pick the last 4 alphabetically
  cats.forEach(cat=>{
    const catItems=pool.filter(p=>normCat(p)===cat);
    // Take last 4 (alphabetically latest names)
    reserved[cat]=catItems.slice(-4);
    reserved[cat].forEach(p=>reservedIds.add(p.id||p.slug||p.name));
  });

  // Mosaic pool: everything not reserved, color-sorted for visual harmony
  const mosaicPool=pool.filter(p=>!reservedIds.has(p.id||p.slug||p.name));
  const groups=groupByColor(mosaicPool);
  const orderedPool=buildOrderedPool(groups);

  // Build and inject
  document.getElementById("mosaic").innerHTML=buildMosaic(orderedPool);
  document.getElementById("cats").innerHTML=buildCats(reserved);
}

document.addEventListener("DOMContentLoaded",load);
window.addEventListener("pageshow",()=>{
  if(typeof ltn_updateCartCount==="function") ltn_updateCartCount();
});
</script>
</body>
</html>
