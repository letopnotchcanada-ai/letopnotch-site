<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Le Top Notch</title>
  <meta name="description" content="Your shopping cart" />
  <link rel="stylesheet" href="/mobile-fixes.css">
  <script src="/global.js"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --text: #171717;
      --muted: #6e675f;
      --line: #e7e0d7;
      --white: #ffffff;
      --max: 1600px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    /* ───────────────────────────────────────────────────────────────
       Main Container
    ─────────────────────────────────────────────────────────────── */
    .cart-container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      padding: 48px 0;
    }

    /* ───────────────────────────────────────────────────────────────
       Header
    ─────────────────────────────────────────────────────────────── */
    .cart-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .cart-title {
      font-size: clamp(32px, 4vw, 62px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    .cart-count {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ───────────────────────────────────────────────────────────────
       Empty State
    ─────────────────────────────────────────────────────────────── */
    .cart-empty {
      text-align: center;
      padding: 60px 20px;
    }

    .cart-empty-text {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .cart-empty-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 28px;
      background: #171717;
      color: var(--white);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .cart-empty-button:hover {
      opacity: 0.85;
    }

    /* ───────────────────────────────────────────────────────────────
       Cart Items
    ─────────────────────────────────────────────────────────────── */
    .cart-items {
      margin-bottom: 32px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .cart-item-image {
      width: 100px;
      height: 130px;
      object-fit: cover;
      background: #d9d2c8;
    }

    .cart-item-info h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .cart-item-info p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .cart-item-price {
      font-size: 14px;
      font-weight: 500;
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .cart-quantity {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      padding: 4px 8px;
    }

    .cart-quantity button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }

    .cart-quantity span {
      min-width: 20px;
      text-align: center;
      font-size: 13px;
    }

    .cart-remove {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .cart-remove:hover {
      color: var(--text);
    }

    /* ───────────────────────────────────────────────────────────────
       Cart Summary
    ─────────────────────────────────────────────────────────────── */
    .cart-summary {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid var(--line);
      background: var(--white);
    }

    .cart-summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 13px;
    }

    .cart-summary-row.total {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 16px;
      font-size: 16px;
      font-weight: 500;
    }

    .cart-checkout-button {
      width: 100%;
      min-height: 46px;
      background: #171717;
      color: var(--white);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border: none;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }

    .cart-checkout-button:hover {
      opacity: 0.85;
    }

    /* ───────────────────────────────────────────────────────────────
       Responsive
    ─────────────────────────────────────────────────────────────── */
    @media (max-width: 620px) {
      .cart-container {
        width: calc(100% - 28px);
        padding: 32px 0;
      }

      .cart-item {
        grid-template-columns: 80px 1fr;
        gap: 12px;
      }

      .cart-item-image {
        width: 80px;
        height: 105px;
      }

      .cart-item-actions {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>

  <!-- Inject global header -->
  <div id="ltn-header"></div>

  <main class="cart-container">
    <!-- Header -->
    <div class="cart-header">
      <h1 class="cart-title">Shopping Cart</h1>
      <p class="cart-count" id="cart-count-text">0 items</p>
    </div>

    <!-- Empty State -->
    <div id="cart-empty" class="cart-empty" style="display: none;">
      <p class="cart-empty-text">Your cart is empty</p>
      <a href="/shop.html" class="cart-empty-button">Continue Shopping</a>
    </div>

    <!-- Cart Content -->
    <div id="cart-content" style="display: none;">
      <div class="cart-items" id="cart-items-list"></div>

      <div class="cart-summary">
        <div class="cart-summary-row">
          <span>Subtotal</span>
          <span id="cart-subtotal">$0.00</span>
        </div>
        <div class="cart-summary-row">
          <span>Shipping</span>
          <span>Calculated at checkout</span>
        </div>
        <div class="cart-summary-row total">
          <span>Total</span>
          <span id="cart-total">$0.00</span>
        </div>
        <button class="cart-checkout-button" onclick="handleCheckout()">
          Proceed to Checkout
        </button>
      </div>
    </div>
  </main>

  <!-- Inject global footer -->
  <div id="ltn-footer"></div>

  <script>
    /**
     * Render the cart
     */
    function renderCart() {
      const cart = ltn_getCart();
      const count = cart.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);

      // Update count text
      document.getElementById('cart-count-text').textContent = 
        count + ' ' + (count === 1 ? 'item' : 'items');

      // Show empty or content
      if (cart.length === 0) {
        document.getElementById('cart-empty').style.display = 'block';
        document.getElementById('cart-content').style.display = 'none';
        return;
      }

      document.getElementById('cart-empty').style.display = 'none';
      document.getElementById('cart-content').style.display = 'block';

      // Render items
      const list = document.getElementById('cart-items-list');
      list.innerHTML = '';

      let subtotal = 0;

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        subtotal += itemTotal;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img class="cart-item-image" src="${ltn_img(item.image, 200)}" alt="${item.name}" />
          <div class="cart-item-info">
            <h3>${item.name}</h3>
            <p>Size: ${item.size || 'N/A'}</p>
            <p>Color: ${item.color || 'N/A'}</p>
            <div class="cart-item-actions">
              <div class="cart-quantity">
                <button onclick="updateQuantity(${index}, -1)">−</button>
                <span>${item.quantity}</span>
                <button onclick="updateQuantity(${index}, 1)">+</button>
              </div>
              <span class="cart-remove" onclick="removeItem(${index})">Remove</span>
            </div>
          </div>
          <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
        `;
        list.appendChild(div);
      });

      // Update totals
      document.getElementById('cart-subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('cart-total').textContent = '$' + subtotal.toFixed(2);
    }

    /**
     * Update quantity of an item
     */
    function updateQuantity(index, delta) {
      const cart = ltn_getCart();
      if (!cart[index]) return;

      cart[index].quantity = Math.max(1, cart[index].quantity + delta);
      localStorage.setItem(LTN.cartKey, JSON.stringify(cart));
      renderCart();
      ltn_updateCartCount();
    }

    /**
     * Remove an item from the cart
     */
    function removeItem(index) {
      const cart = ltn_getCart();
      cart.splice(index, 1);
      localStorage.setItem(LTN.cartKey, JSON.stringify(cart));
      renderCart();
      ltn_updateCartCount();
    }

    /**
     * Handle checkout (placeholder)
     */
    function handleCheckout() {
      alert('Checkout functionality coming soon!');
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();
    });
  </script>

</body>
</html>
