<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart — Le Top Notch</title>
  <script src="/global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f7f4ef;color:#171717;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%}
    button{font:inherit;border:none;background:none;cursor:pointer;}
    .page{width:min(1400px,calc(100% - 40px));margin:0 auto;padding:56px 0 80px;}
    .page-h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(42px,6vw,86px);font-weight:400;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:44px;text-align:center;}
    .cart-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:48px;align-items:start;}
    .cart-items{display:flex;flex-direction:column;gap:24px;}
    .cart-item{display:grid;grid-template-columns:140px 1fr auto;gap:20px;padding:24px;border:1px solid #e7e0d7;background:#fff;}
    .item-img{aspect-ratio:2/3;overflow:hidden;background:#f5f2ee;}
    .item-img img{width:100%;height:100%;object-fit:cover;}
    .item-info h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
    .item-info p{font-size:11px;color:#6e675f;margin-bottom:4px;}
    .item-price{font-size:11px;color:#6e675f;margin-top:8px;}
    .item-actions{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;}
    .item-qty{display:flex;align-items:center;gap:12px;}
    .item-qty button{width:28px;height:28px;border:1px solid #e7e0d7;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .2s;}
    .item-qty button:hover{background:#f5f2ee;}
    .item-qty span{font-size:12px;min-width:24px;text-align:center;}
    .item-remove{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#9a9186;text-decoration:underline;cursor:pointer;}
    .item-remove:hover{color:#171717;}
    .cart-summary{background:#fff;border:1px solid #e7e0d7;padding:32px;position:sticky;top:20px;}
    .summary-h3{font-size:12px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e7e0d7;}
    .summary-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:12px;}
    .summary-row.total{font-size:14px;font-weight:600;padding-top:16px;margin-top:16px;border-top:1px solid #e7e0d7;}
    .checkout-btn{width:100%;height:52px;background:#171717;color:#fff;font-size:10px;text-transform:uppercase;letter-spacing:.16em;margin-top:24px;transition:opacity .2s;}
    .checkout-btn:hover{opacity:.85;}
    .continue-link{display:block;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#6e675f;margin-top:20px;text-decoration:underline;}
    .continue-link:hover{color:#171717;}
    .empty-cart{text-align:center;padding:80px 20px;grid-column:1/-1;}
    .empty-cart h2{font-family:"Cormorant Garamond",Georgia,serif;font-size:36px;font-weight:400;margin-bottom:16px;}
    .empty-cart p{font-size:12px;color:#6e675f;margin-bottom:28px;}
    .empty-cart a{display:inline-flex;height:48px;align-items:center;padding:0 32px;background:#171717;color:#fff;font-size:10px;text-transform:uppercase;letter-spacing:.14em;}
    .empty-cart a:hover{opacity:.85;}
    @media(max-width:900px){
      .cart-grid{grid-template-columns:1fr;gap:32px;}
      .cart-summary{position:static;}
      .page{padding:36px 0 60px;}
      .page-h1{margin-bottom:32px;}
    }
    @media(max-width:600px){
      .cart-item{grid-template-columns:100px 1fr;gap:12px;padding:16px;}
      .item-actions{grid-column:1/-1;flex-direction:row;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #e7e0d7;}
      .item-img{width:100px;}
      .cart-summary{padding:24px;}
    }
  </style>
</head>
<body>
<div id="ltn-header"></div>
<div class="page">
  <h1 class="page-h1">Shopping Cart</h1>
  <div class="cart-grid" id="cartContent"></div>
</div>
<div id="ltn-footer"></div>
<script>
function fmt(v){const n=Number(v);return(!isFinite(n)||n<=0)?"":"CAD $"+n.toFixed(2).replace(".00","");}
function tc(v){return String(v||"").replace(/[-_]/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function getCart(){try{return JSON.parse(localStorage.getItem("ltn_cart")||"[]");}catch{return[];}}
function saveCart(cart){localStorage.setItem("ltn_cart",JSON.stringify(cart));if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();}
function updateQty(slug,delta){const cart=getCart();const item=cart.find(i=>i.slug===slug);if(item){item.qty=Math.max(1,item.qty+delta);saveCart(cart);render();}}
function removeItem(slug){const cart=getCart().filter(i=>i.slug!==slug);saveCart(cart);render();}
function render(){
  const cart=getCart();
  const content=document.getElementById("cartContent");
  if(!cart.length){
    content.innerHTML=`<div class="empty-cart"><h2>Your cart is empty</h2><p>Add some pieces to get started.</p><a href="/shop.html">Continue Shopping</a></div>`;
    return;
  }
  const subtotal=cart.reduce((sum,i)=>sum+(i.price*i.qty),0);
  const shipping=subtotal>=250?0:15;
  const tax=subtotal*0.14975;
  const total=subtotal+shipping+tax;
  const itemsHTML=cart.map(i=>`<div class="cart-item">
    <div class="item-img"><img src="${i.image}" alt="${tc(i.name)}"></div>
    <div class="item-info">
      <h3>${tc(i.name)}</h3>
      ${i.color?`<p>Color: ${tc(i.color)}</p>`:""}
      ${i.size?`<p>Size: ${i.size}</p>`:""}
      <div class="item-price">${fmt(i.price)} × ${i.qty} = ${fmt(i.price*i.qty)}</div>
    </div>
    <div class="item-actions">
      <div class="item-qty">
        <button onclick="updateQty('${i.slug}',-1)">−</button>
        <span>${i.qty}</span>
        <button onclick="updateQty('${i.slug}',1)">+</button>
      </div>
      <button class="item-remove" onclick="removeItem('${i.slug}')">Remove</button>
    </div>
  </div>`).join("");
  content.innerHTML=`<div class="cart-items">${itemsHTML}</div>
  <div class="cart-summary">
    <h3 class="summary-h3">Order Summary</h3>
    <div class="summary-row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
    <div class="summary-row"><span>Shipping</span><span>${shipping===0?"Free":fmt(shipping)}</span></div>
    <div class="summary-row"><span>Est. Tax (QC)</span><span>${fmt(tax)}</span></div>
    <div class="summary-row total"><span>Total</span><span>${fmt(total)}</span></div>
    <button class="checkout-btn" onclick="alert('Checkout integration coming soon')">Proceed to Checkout</button>
    <a href="/shop.html" class="continue-link">Continue Shopping</a>
  </div>`;
}
document.addEventListener("DOMContentLoaded",render);
window.addEventListener("pageshow",()=>{if(typeof ltn_updateCartCount==="function")ltn_updateCartCount();});
</script>
</body>
</html>
